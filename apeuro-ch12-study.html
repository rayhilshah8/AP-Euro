<script>
const CONCEPTS = [
  // Realpolitik & Napoleon III
  {cat:"Realpolitik & Napoleon III",q:"What is Realpolitik, and how does it differ from the liberal nationalism of 1848?",a:"Realpolitik ('politics of reality') is the practice of pursuing political goals through <strong>practical power — military force, diplomacy, economic leverage — rather than moral principles or ideological commitments</strong>. Where 1848 liberals tried to achieve nationalism through popular revolution and constitutional idealism, Realpolitik practitioners (Bismarck, Cavour, Napoleon III) achieved their goals through war, shrewd alliance-making, and manipulation of existing power structures. The end (national power) justified any means.",tip:"Realpolitik is the chapter's organizing concept. It explains why nationalism succeeded in the 1860s after failing in 1848: not because the popular will triumphed but because conservative statesmen instrumentalized nationalism for state power. Know: Realpolitik = pragmatic power politics, no moral constraints, associated with Bismarck above all."},
  {cat:"Realpolitik & Napoleon III",q:"Who was Napoleon III, and how did he use nationalism to consolidate power?",a:"Louis-Napoleon Bonaparte, elected president of the Second Republic (1848), staged a coup (December 1851) and proclaimed himself <strong>Emperor Napoleon III</strong> (1852–1870). He used plebiscites (popular votes) to legitimize authoritarian rule while associating himself with French national glory. He modernized Paris (Haussmann's renovation), promoted industrialization, and pursued an active foreign policy — but ultimately overextended in Mexico and was defeated by Prussia in 1870.",tip:"Napoleon III is a transitional figure: he used democratic forms (plebiscites) to legitimize authoritarian power — a model later called 'Bonapartism.' His domestic policy (modernizing Paris, promoting industry) shows the connection between national prestige and urban transformation. His fall to Prussia directly triggers the unification of Germany."},
  {cat:"Realpolitik & Napoleon III",q:"What was the Crimean War (1853–1856), and what were its consequences for European diplomacy?",a:"The Crimean War pitted Britain and France (defending the Ottoman Empire) against Russia, which sought to expand into Ottoman territory. Russia lost — exposing the military and economic <strong>backwardness of tsarist Russia</strong> and humiliating it diplomatically. Consequences: Russia was excluded from the Black Sea (Treaty of Paris, 1856); the Concert of Europe was effectively dead (Austria had stayed neutral despite owing Russia for 1849); and Austria was isolated — which Cavour exploited for Italian unification.",tip:"The Crimean War reshuffles the diplomatic deck for the 1860s. Know: Russia humiliated → forced modernization (emancipation of serfs, 1861); Austria isolated (neither Russia nor France was friendly); Concert of Europe broken. These conditions created the window for Italian and German unification. The war is the geopolitical precondition for everything that follows."},

  // Italian Unification
  {cat:"Italian Unification",q:"How did Italy achieve unification, and what were Cavour's methods?",a:"Italian unification (Risorgimento, completed 1861–1870) was engineered primarily by <strong>Count Camillo di Cavour</strong>, Prime Minister of Piedmont-Sardinia. His strategy: modernize Piedmont economically and militarily; ally with France (Napoleon III) against Austria at Plombières (1858); provoke war with Austria (1859), gaining Lombardy; allow <strong>Garibaldi's</strong> conquest of southern Italy (Two Sicilies, 1860) while steering it toward Piedmontese monarchy; incorporate remaining territories by exploiting Prussia's defeat of Austria (Veneto, 1866) and France (Rome, 1870).",tip:"Italian unification is a case study in Realpolitik. Cavour never relied on popular revolution — he used diplomacy (French alliance), war (against Austria), and managed Garibaldi's revolutionary energy into the Piedmontese state. The contrast between Cavour (realist) and Mazzini/Garibaldi (idealists) is the AP's key analytical tension in this story."},
  {cat:"Italian Unification",q:"What roles did Mazzini and Garibaldi play in Italian unification, and how did they differ from Cavour?",a:"<strong>Giuseppe Mazzini</strong> was the idealist — he founded Young Italy, dreamed of a democratic Italian republic, and inspired a generation of nationalists. His repeated uprisings always failed. <strong>Giuseppe Garibaldi</strong> was the romantic warrior — he conquered southern Italy with his 'Thousand' red-shirted volunteers (1860), then surrendered his conquests to King Victor Emmanuel II at Cavour's insistence. Both represent the idealist, popular nationalist tradition that Cavour — the realist — channeled and ultimately subordinated to the Piedmontese monarchy.",tip:"The Mazzini/Garibaldi vs. Cavour contrast is perfectly constructed for AP comparative essays: idealist nationalism (democratic, popular, revolutionary) vs. realist statecraft (monarchical, diplomatic, militarily managed). Know all three figures and their roles. The outcome — a constitutional monarchy, not a republic — reflects Cavour's dominance."},

  // German Unification
  {cat:"German Unification",q:"How did Bismarck achieve German unification, and what were his key methods?",a:"Otto von Bismarck, appointed Prussian Minister-President (1862), pursued unification through 'blood and iron' — military force backed by economic strength. Three wars achieved it: <strong>Danish War</strong> (1864, with Austria, gained Schleswig-Holstein); <strong>Austro-Prussian War</strong> (1866, 'Seven Weeks' War,' Austria decisively defeated, Prussia dominant in northern Germany — North German Confederation formed); <strong>Franco-Prussian War</strong> (1870–1871, France defeated, southern German states joined Prussia). German Empire proclaimed at Versailles (January 1871).",tip:"The three wars sequence is essential AP knowledge: 1864 (Denmark), 1866 (Austria), 1870–71 (France). Each war solved a specific problem: Denmark = Schleswig-Holstein; Austria = removing rival from German affairs; France = uniting north and south German states. Know the wars, their opponents, and their specific contributions to unification."},
  {cat:"German Unification",q:"What was Bismarck's ideology and governing style, and what made him a 'conservative revolutionary'?",a:"Bismarck was a Junker conservative who believed in Prussian monarchy, aristocratic power, and the primacy of state interest — but was willing to use revolutionary means (universal male suffrage in the North German Confederation, war, nationalism) to achieve conservative ends. He practiced Realpolitik absolutely — he had no permanent allies or enemies, only Prussian state interests. He <strong>manipulated nationalism</strong> as a tool for Prussian state power rather than pursuing it as an ideological commitment.",tip:"'Conservative revolutionary' is the key analytical phrase for Bismarck. He used democracy (universal male suffrage) and nationalism (popular emotion) to achieve conservative goals (Prussian monarchical power, Junker privilege). This makes him uniquely complex for the AP — he's the anti-liberal who used liberal instruments. Know this paradox."},
  {cat:"German Unification",q:"What was the Austro-Prussian War (1866), and why was it decisive for German unification?",a:"Bismarck deliberately provoked Austria into war over the administration of Schleswig-Holstein. Prussia's <strong>superior military technology</strong> (needle gun — a breech-loading rifle — and railways for rapid mobilization) crushed Austria in seven weeks at Königgrätz. The resulting Peace of Prague excluded Austria from German affairs permanently, established the <strong>North German Confederation</strong> under Prussian leadership, and made Prussia the unambiguous dominant power in central Europe.",tip:"The 1866 war settles the Austrian question once and for all: Austria is out of Germany. This is the pivotal moment in German unification. Know: needle gun + railways = Prussian military superiority; North German Confederation = Prussia dominant; Austria excluded. The speed of victory (seven weeks) shocked Europe and showed the power of Prussian military organization."},
  {cat:"German Unification",q:"How did the Franco-Prussian War (1870–1871) complete German unification?",a:"Bismarck manipulated the Ems Telegram to make France appear to have insulted Prussia, provoking France to declare war. French defeat was rapid and total — Emperor Napoleon III surrendered at Sedan, Paris was besieged. The southern German states (Bavaria, Baden, Württemberg) had allied with Prussia against France. In January 1871, the <strong>German Empire was proclaimed in the Hall of Mirrors at Versailles</strong> — Wilhelm I became Kaiser, with Bismarck as Chancellor. France lost Alsace-Lorraine, fueling French revanchism.",tip:"The Ems Telegram manipulation is the AP's clearest example of Bismarck's Realpolitik in action — he edited a diplomatic communication to provoke France into declaring war, then used the war to complete unification. Know: Ems Telegram, Napoleon III captured at Sedan, proclamation at Versailles (January 18, 1871), France loses Alsace-Lorraine (which becomes the grievance driving French foreign policy until 1914)."},

  // Other States
  {cat:"Other Nation-States",q:"What was the Austro-Hungarian Compromise (Ausgleich) of 1867, and what did it reveal about nationalism?",a:"After Austria's humiliating defeat in 1866, Hungarian nationalists (led by Deák) exploited the weakness to demand autonomy. The <strong>Dual Monarchy</strong> (Austria-Hungary) was created: two separate states with a common monarch (Franz Joseph), foreign policy, and military, but separate parliaments, governments, and administrations. It satisfied Hungarian nationalism while leaving other ethnic groups (Czechs, Croats, Slovaks) still subject — creating unresolved tensions that contributed to World War I.",tip:"Austria-Hungary is the AP's key example of how nationalism could be managed — but only partially. The Dual Monarchy satisfied Hungarians at the expense of other nationalities. Know: 1867, Franz Joseph, separate parliaments, shared monarchy. The unresolved nationalities question within Austria-Hungary is a direct cause of the assassination that triggered WWI."},
  {cat:"Other Nation-States",q:"How did Russia respond to the Crimean War defeat, and what were Alexander II's reforms?",a:"Defeat demonstrated that serfdom and autocracy made Russia militarily inferior to modern industrial states. Alexander II enacted major reforms: <strong>Emancipation of the Serfs</strong> (1861) — serfs freed but had to pay redemption payments for their land over 49 years; <strong>Zemstvo system</strong> (elected local councils for limited self-government); judicial reform (independent courts, jury trials); military reform (shorter service periods, modernized equipment). But political reform stopped short of constitutional government.",tip:"Alexander II's reforms are a classic case of 'reform from above' to prevent revolution from below. Know: emancipation 1861, redemption payments (which kept peasants poor), zemstvos (limited local government), no constitutional changes. His assassination in 1881 by revolutionary populists led to a sharp conservative reaction under Alexander III — reform followed by repression."},
  {cat:"Other Nation-States",q:"What characterized Victorian Britain's political and social development in the mid-19th century?",a:"Britain's 'Victorian consensus' combined <strong>gradual reform with political stability</strong>: the Reform Act of 1867 (Disraeli) extended voting rights to urban workers; Gladstone's ministries reformed education, the army, and the civil service; free trade (after Corn Laws repeal) made Britain the 'workshop of the world.' The <strong>two-party system</strong> (Liberals under Gladstone, Conservatives under Disraeli) channeled political competition constructively. No revolution — because Parliament could absorb reform demands.",tip:"Victorian Britain is the AP's alternative-to-revolution model. Its political system (two parties competing for reform) absorbed pressures that elsewhere produced revolution. Know: Reform Acts (1832, 1867), Gladstone vs. Disraeli, free trade dominance, gradual democratization. Britain's stability through this period contrasts sharply with continental instability."},

  // Science & Culture
  {cat:"Science & Culture",q:"What was Darwin's theory of evolution, and why was it culturally and intellectually revolutionary?",a:"Charles Darwin's <em>On the Origin of Species</em> (1859) proposed that species evolve through <strong>natural selection</strong>: individuals with traits better suited to their environment survive and reproduce at higher rates; over generations, this produces new species. Applied to humans in <em>The Descent of Man</em> (1871), it implied humans had evolved from earlier primates. This directly challenged literal biblical creation; it repositioned humans within nature rather than above it; and it provided a secular, materialist explanation for life's diversity.",tip:"Darwin is the scientific revolution of the 19th century. Know: On the Origin of Species (1859), natural selection, The Descent of Man (1871), challenge to biblical creation. Its cultural consequences were enormous: Social Darwinism (later) applied 'survival of the fittest' to society; it contributed to the materialist, scientific worldview of the age of Realism."},
  {cat:"Science & Culture",q:"What was Social Darwinism, and how was it misused?",a:"Social Darwinism applied Darwin's biological concepts (survival of the fittest, natural selection) to <strong>human society and between nations</strong> — arguing that social inequality, colonial conquest, and racial hierarchy were natural and inevitable expressions of biological competition. Associated with Herbert Spencer ('survival of the fittest' was Spencer's phrase, not Darwin's). Used to justify laissez-faire capitalism (the poor are naturally weaker), imperialism (stronger civilizations naturally dominate weaker ones), and racial hierarchy.",tip:"Social Darwinism is Darwin's theory misapplied. Darwin described natural processes; Social Darwinists used them to prescribe social policy. This misuse is intellectually dishonest but historically extremely influential — it shaped late 19th-century imperialism, racial thinking, and eugenics movements. Know it as a distortion of Darwin that had massive political consequences."},
  {cat:"Science & Culture",q:"What was positivism, and how did it shape 19th-century thought?",a:"Positivism (associated with <strong>Auguste Comte</strong>) held that the only valid knowledge is empirical scientific knowledge — observable, measurable, verifiable facts. It rejected metaphysics, theology, and abstract philosophy as pre-scientific. Comte argued society should be organized and reformed according to scientific principles by expert social scientists. Positivism shaped sociology, psychology, and historiography — and fed the materialist worldview of the age of Realism.",tip:"Positivism is the philosophical expression of the scientific age. Know: Comte, empirical knowledge only, social science as the highest knowledge form. It's the intellectual framework behind Realism (observe and depict reality as it is) and behind the emerging social sciences. It's also the secularizing force in intellectual life — if only scientific knowledge counts, religion loses epistemic authority."},
  {cat:"Science & Culture",q:"What was Realism in literature and art, and how did it differ from Romanticism?",a:"Realism (c. 1850–1880s) depicted <strong>ordinary life, social conditions, and everyday struggles</strong> without idealization or romantic embellishment. In literature: <strong>Gustave Flaubert</strong> (<em>Madame Bovary</em>), <strong>Charles Dickens</strong> (social criticism through individual stories), <strong>Leo Tolstoy</strong> (<em>War and Peace</em>), <strong>Émile Zola</strong> (naturalism, documenting industrial poverty with scientific precision). In art: <strong>Gustave Courbet</strong> painted peasants and workers rather than mythological or historical subjects.",tip:"Realism vs. Romanticism is a classic AP cultural contrast. Romanticism: emotion, nature, the heroic individual, idealized subjects. Realism: ordinary people, social conditions, documented with precision. The shift reflects the maturation of industrial urban society — artists turned their gaze to what industrialization actually produced. Know at least two authors and two artists."},
  {cat:"Science & Culture",q:"How did advances in health care and medicine change European society in this period?",a:"<strong>Louis Pasteur</strong>'s germ theory (1860s) proved that microorganisms cause infectious disease — overthrowing miasma theory and providing the scientific basis for antisepsis. <strong>Joseph Lister</strong> introduced antiseptic surgery (carbolic acid, 1865), dramatically reducing post-operative deaths. <strong>Florence Nightingale</strong> professionalized nursing during the Crimean War. Together these advances began the transformation of medicine from art to science, reducing mortality and laying the basis for modern public health.",tip:"Germ theory is the medical equivalent of heliocentrism — a paradigm shift that overturned the existing model (miasma) and had immediate practical consequences (antiseptic surgery, vaccination expansion, public health reform). Know Pasteur (germ theory), Lister (antiseptic surgery), and Nightingale (nursing professionalization). The connections to public health policy (sanitation, clean water) are AP-relevant."},

  // Broader Themes
  {cat:"Broader Themes",q:"How did nationalism change its character between 1848 and 1871?",a:"Before 1848, nationalism was primarily <strong>liberal</strong> — associated with constitutionalism, popular sovereignty, and the rights of peoples against dynastic empires. After 1848's failure, nationalism became the tool of <strong>conservative statesmen</strong> (Bismarck, Cavour) who used it for state power without democratic idealism. By 1871, nationalism had achieved its major European unifications — but through 'blood and iron,' not popular revolution. The lesson: powerful states could deploy nationalist emotion without granting liberal rights.",tip:"The liberal-to-authoritarian nationalism shift is one of the most important analytical transitions in the entire course. Know: 1848 = liberal nationalist failure; 1866–1871 = conservative nationalist success. Bismarck is the paradigm case. This shift explains why nationalism in the late 19th century became increasingly aggressive and less liberal — setting up the conditions for WWI."},
  {cat:"Broader Themes",q:"How did the unification of Germany shift the European balance of power, and what were the long-term consequences?",a:"The German Empire (1871) was immediately the <strong>most powerful state in continental Europe</strong> — larger population than France, rapidly industrializing, powerful military. France lost Alsace-Lorraine and became obsessed with revanche (revenge). Austria-Hungary was excluded from German affairs but remained multi-ethnic and unstable. Russia faced a new continental rival. Britain watched nervously. The balance of power that had been maintained since 1815 was fundamentally disrupted — Bismarck spent the rest of his career (1871–1890) trying to manage the anxieties his creation produced.",tip:"German unification's consequences cascade forward to 1914. Know: Germany = dominant continental power; France = revanchist (Alsace-Lorraine); Austria-Hungary = unstable multi-ethnic empire; Britain = anxious about continental dominance. These tensions, unresolved by Bismarck's diplomacy, eventually exploded into WWI. Always frame 1871 as the beginning of a new instability, not the end of one."}
];

const VOCAB = [
  {cat:"Concepts",term:"Realpolitik",pos:"noun (German)",def:"'Politics of reality' — the practice of pursuing political goals through <strong>practical power (military, economic, diplomatic)</strong> rather than moral principles or ideological commitments. Associated above all with Bismarck but also with Cavour and Napoleon III. Contrasts with the idealist liberal nationalism of 1848.",tip:"Realpolitik is the chapter's master concept. Every major political figure of the 1850s–1870s practices it. Know: pragmatic, power-based, no moral constraints, state interest above ideology. Bismarck is the paradigm: he used universal suffrage and nationalism (liberal tools) for conservative (Prussian/monarchical) ends."},
  {cat:"Concepts",term:"Blood and iron",pos:"noun phrase",def:"Bismarck's famous 1862 speech declaring that the great questions of the age would be decided not by speeches and majority votes but by <strong>'blood and iron'</strong> — military force and industrial/economic power. Encapsulates his Realpolitik approach to German unification.",tip:"'Blood and iron' is Bismarck's most quotable phrase and a perfect summary of his method. Contrast with 1848's liberals who tried speeches and parliamentary resolutions. Know: 1862 speech to Prussian parliament, means military force + Prussian industrial power, repudiation of liberal-nationalist method."},
  {cat:"Concepts",term:"Risorgimento",pos:"noun (Italian)",def:"'Resurgence' — the Italian nationalist movement for unification, spanning roughly 1815–1871. Associated with Mazzini's idealism (Young Italy), Garibaldi's military campaigns, and Cavour's diplomatic Realpolitik. Achieved formal unification in 1861 (Kingdom of Italy proclaimed), completed when Rome was incorporated in 1870.",tip:"Risorgimento is the umbrella term for Italian unification. Know it as a movement with multiple phases and leaders: Mazzini (idealist, republican), Garibaldi (military romantic), Cavour (realist, monarchist). The tension between these strands — republic vs. monarchy, popular revolution vs. diplomatic statecraft — is the story's analytical core."},
  {cat:"Concepts",term:"Revanchism",pos:"noun (French)",def:"The policy of seeking <strong>revenge and territorial recovery</strong> — specifically, France's desire to recover Alsace-Lorraine lost to Germany in 1871. French revanchism made France and Germany irreconcilable enemies from 1871 until WWI, and was a major cause of the alliance systems that made that war so catastrophic.",tip:"Revanchism explains French foreign policy from 1871 to 1918. France did not accept the loss of Alsace-Lorraine — it became a national obsession. Bismarck's entire post-1871 diplomatic system was built to prevent France from finding allies for revenge. When it collapsed after his dismissal (1890), France found its allies (Russia, Britain) — leading to the Triple Entente."},
  {cat:"Concepts",term:"Dual Monarchy (Austria-Hungary)",pos:"noun (proper)",def:"The constitutional arrangement created by the <strong>Ausgleich (Compromise) of 1867</strong>: the Habsburg Empire became two equal states (Austria and Hungary) sharing a common monarch (Emperor Franz Joseph), foreign policy, and military, but with separate parliaments and governments. A response to Hungarian nationalist pressure after the 1866 defeat.",tip:"The Dual Monarchy is a creative solution to the nationalism problem — but only for Hungarians. Czechs, Poles, Croats, Slovaks, and others remained subject nationalities. This unresolved nationalities question made Austria-Hungary a powder keg that eventually exploded in 1914. Know: Ausgleich, 1867, Franz Joseph, separate parliaments, unresolved minority nationalisms."},
  {cat:"Concepts",term:"Emancipation of the Serfs (1861)",pos:"noun (proper)",def:"Alexander II's decree freeing Russian serfs from bondage to noble land. However, freed serfs were required to <strong>pay redemption payments</strong> over 49 years for their allotted land (which was often less than they had farmed as serfs), keeping them economically constrained. A reform that fell far short of the liberals' hopes.",tip:"The emancipation is a perfect example of reform that doesn't go far enough: serfs are technically free but economically bound by redemption payments. Know: 1861, Alexander II, redemption payments, inadequate land allotments. Compare to the 1865 American emancipation (also a wartime reform with limited economic follow-through) — the AP may ask you to draw this comparison."},
  {cat:"Concepts",term:"Zemstvo",pos:"noun (Russian)",def:"Elected local councils established in Russia (1864) as part of Alexander II's reforms, giving limited <strong>self-government at the provincial and district level</strong> for roads, schools, public health, and welfare. The first representative institutions in Russian history — but without any national parliament.",tip:"Zemstvos are Russia's cautious step toward representative government. Know: 1864, Alexander II, local (not national) self-government, elected by property-owning citizens. They're evidence of limited reform from above — enough to modernize administration without threatening autocracy. The tension between zemstvo reformers wanting more and the tsar's autocracy is a source of the revolutionary movements that followed."},
  {cat:"People: Italy",term:"Count Cavour",pos:"noun (proper)",def:"Prime Minister of Piedmont-Sardinia (1852–1861), architect of Italian unification. Used <strong>economic modernization, diplomatic alliance with France, and managed warfare</strong> to expand Piedmont into Italy, channeling Garibaldi's revolutionary energy into the monarchical state. A paradigmatic Realpolitik practitioner.",tip:"Cavour is Italy's Bismarck — the conservative statesman who achieved nationalist ends through pragmatic means. Know: Piedmont-Sardinia, French alliance at Plombières (1858), wars against Austria (1859), management of Garibaldi. His contrast with Mazzini (idealist) and Garibaldi (romantic) is the chapter's key Italian analytical frame."},
  {cat:"People: Italy",term:"Giuseppe Garibaldi",pos:"noun (proper)",def:"Italian nationalist military leader (1807–1882) who conquered the Kingdom of the Two Sicilies (southern Italy) with ~1,000 red-shirted volunteers ('the Thousand') in 1860, then <strong>surrendered his conquests to King Victor Emmanuel II</strong> at Cavour's urging. Embodied the Romantic nationalist hero.",tip:"Garibaldi is the Romantic hero of Italian unification — popular, charismatic, militarily daring. His willingness to subordinate his republican ideals to monarchical unification (surrendering the south to Victor Emmanuel) is the decisive moment. Know: the Thousand (1860), conquest of Two Sicilies, surrender to Victor Emmanuel. His deferral to Cavour's realism is what made unification work."},
  {cat:"People: Italy",term:"Giuseppe Mazzini",pos:"noun (proper)",def:"Italian nationalist thinker (1805–1872) who founded <strong>Young Italy</strong> and articulated a vision of a democratic Italian republic unified by popular nationalist sentiment. His repeated uprisings (1830s–1848) all failed. He represents the idealist strand of nationalism — morally compelling but politically ineffective.",tip:"Mazzini = idealist nationalism that inspires but fails. Know: Young Italy, democratic republic vision, repeated failed uprisings. His ideas inspired a generation but his methods (popular revolution) never achieved unification. Cavour succeeded where Mazzini failed — by abandoning Mazzini's democratic idealism for diplomatic realism."},
  {cat:"People: Germany",term:"Otto von Bismarck",pos:"noun (proper)",def:"Prussian Minister-President and later German Chancellor (1862–1890), who unified Germany through three wars (1864, 1866, 1870–1871). A Junker conservative who used nationalism, universal male suffrage, and war as pragmatic tools for Prussian state power — the supreme practitioner of Realpolitik.",tip:"Bismarck is one of the most AP-tested figures of the entire course. Know: three wars (Denmark 1864, Austria 1866, France 1870–71), Ems Telegram manipulation, North German Confederation, German Empire proclaimed at Versailles (1871). The 'conservative revolutionary' paradox — using democratic instruments for conservative ends — is his defining analytical characteristic."},
  {cat:"People: Germany",term:"Kaiser Wilhelm I",pos:"noun (proper)",def:"King of Prussia (r. 1861–1888) and first German Emperor (Kaiser, 1871–1888). Declared German Emperor in the Hall of Mirrors at Versailles (January 18, 1871). A conservative Prussian monarch who relied heavily on Bismarck's guidance but symbolized the new German national state.",tip:"Wilhelm I is Bismarck's instrument — the monarch who needed the statesman. Know: first Kaiser, proclaimed at Versailles January 18, 1871. The Versailles location was deliberately humiliating to France (their own palace used for Germany's triumph). His grandson Wilhelm II dismissed Bismarck in 1890, beginning Germany's reckless course toward WWI."},
  {cat:"People: Germany",term:"Ems Telegram",pos:"noun (proper)",def:"A diplomatic communication between Bismarck and King Wilhelm I that Bismarck <strong>edited to make Prussia appear insulted by France</strong>, then released to the press. The manipulated version provoked France to declare war (Franco-Prussian War, 1870) — giving Prussia the moral high ground and triggering the southern German states' alliance with Prussia.",tip:"The Ems Telegram is Bismarck's most audacious Realpolitik maneuver. He didn't forge the telegram — he edited a genuine communication to change its tone. The result: France declared war (appearing aggressive), southern German states rallied to Prussia (completing unification). It's the perfect exam example of how Bismarck manipulated events rather than reacting to them."},
  {cat:"Science",term:"Charles Darwin",pos:"noun (proper)",def:"British naturalist (1809–1882) who proposed the theory of <strong>evolution by natural selection</strong> in <em>On the Origin of Species</em> (1859) and <em>The Descent of Man</em> (1871). His theory that species change through the differential survival of better-adapted individuals overturned biblical creation and repositioned humans within the natural world.",tip:"Darwin is the most consequential scientist of the 19th century for AP purposes — his ideas affected not just biology but religion, philosophy, social thought, and political ideology. Know: On the Origin of Species (1859), natural selection, The Descent of Man (1871), challenge to biblical creation, connection to Social Darwinism (a misapplication)."},
  {cat:"Science",term:"Natural selection",pos:"noun",def:"Darwin's mechanism of evolution: individuals with traits <strong>better adapted to their environment</strong> survive and reproduce at higher rates than those less well adapted. Over generations, better-adapted traits become more common in a population. The process that drives evolutionary change without any intentional design.",tip:"Natural selection is the mechanism — it's how evolution works. Distinguish from 'survival of the fittest' (Spencer's phrase, which implies intentional competition). Natural selection is unconscious and environmental. Know it as Darwin's core scientific contribution. Its implication: no God needed to explain biological diversity."},
  {cat:"Science",term:"Social Darwinism",pos:"noun",def:"The misapplication of Darwin's biological concepts to human society and between nations — arguing that social inequality, poverty, and colonial conquest reflect natural biological competition ('survival of the fittest'). Used to justify laissez-faire capitalism, imperialism, and racial hierarchy. Associated with Herbert Spencer.",tip:"Social Darwinism = Darwin's science distorted into political ideology. Darwin described nature; Social Darwinists prescribed social policy based on a misreading of nature. Know: Spencer (coined 'survival of the fittest'), justification of inequality + imperialism + racial hierarchy. It's one of the most consequential intellectual distortions in modern history."},
  {cat:"Science",term:"Positivism",pos:"noun",def:"Auguste Comte's philosophy that <strong>only empirically verifiable scientific knowledge</strong> is valid. It rejected metaphysics and theology. Comte argued society should be studied scientifically (sociology) and reformed by experts applying scientific principles. Became the dominant intellectual framework of mid-19th-century educated Europe.",tip:"Positivism is the philosophical mirror of Realism — both assert that reality as observed is the only legitimate subject of knowledge and art. Know: Comte, empirical knowledge only, social science, rejection of theology and metaphysics. Its influence: sociology, psychology, scientific history — all emerged from positivist frameworks."},
  {cat:"Science",term:"Germ theory",pos:"noun",def:"<strong>Louis Pasteur</strong>'s demonstration (1860s) that <strong>microorganisms (germs) cause infectious disease</strong>, overturning miasma theory. The scientific foundation for antiseptic medicine, vaccination, and public health infrastructure. One of the most consequential scientific advances in human history.",tip:"Germ theory = the scientific revolution in medicine. Know: Pasteur, 1860s, microorganisms cause disease. Its applications: Lister's antiseptic surgery (carbolic acid, 1865), improved vaccination (extending Jenner's smallpox work), public health reform (clean water, sewage systems). Germ theory eventually eliminated most infectious diseases that had killed millions throughout history."},
  {cat:"Culture",term:"Realism (literature/art)",pos:"noun",def:"A cultural movement (c. 1850–1880s) depicting <strong>ordinary life, social conditions, and everyday experience</strong> without idealization. In literature: Flaubert, Dickens, Tolstoy, Zola. In art: Courbet. Rejected Romanticism's idealized heroes and nature scenes in favor of factories, urban poverty, peasants, and provincial bourgeois life.",tip:"Realism is Romanticism's replacement as industrialization matures. Where Romanticism fled industrial society into nature and emotion, Realism turned the lens directly on industrial society. Know at least two authors and one painter. Flaubert's Madame Bovary and Zola's Germinal (mining) are the most AP-relevant literary examples; Courbet's peasant paintings for art."},
  {cat:"Culture",term:"Gustave Flaubert",pos:"noun (proper)",def:"French novelist (1821–1880) whose <em>Madame Bovary</em> (1857) epitomized literary Realism — precisely observed provincial bourgeois life, romantic illusions confronting mediocre reality, no moral judgment or idealization. Prosecuted for obscenity but acquitted.",tip:"Madame Bovary is the AP's paradigm of literary Realism. Know: Flaubert, 1857, provincial bourgeois life, precise observation without moral judgment. The novel's subject — a woman trapped by provincial marriage seeking romantic escape — connects to gender roles and the 'separate spheres' ideology of the period."},
  {cat:"Culture",term:"Émile Zola",pos:"noun (proper)",def:"French novelist (1840–1902) who developed 'naturalism' — an extreme form of Realism applying scientific (positivist) methods to fiction. His <em>Germinal</em> (1885) documented coal miners' lives with clinical precision. Later famous for his open letter <em>J'Accuse</em> defending Dreyfus (connecting to later chapters).",tip:"Zola = naturalism (scientific Realism). Know: Germinal (miners, 1885), naturalism as scientific method applied to literature, positivism's influence. His later Dreyfus affair involvement (J'Accuse, 1898) makes him relevant to Ch. 13 as well. Good evidence for how Realism addressed industrial working-class conditions."},
  {cat:"Culture",term:"Gustave Courbet",pos:"noun (proper)",def:"French painter (1819–1877) considered the founder of <strong>Realist painting</strong>. His works depicted peasants, workers, and everyday life at monumental scale traditionally reserved for historical or religious subjects (<em>The Stone Breakers</em>, <em>Burial at Ornans</em>). Declared himself a 'socialist' in art.",tip:"Courbet is Realism's champion in painting. Know: stone breakers and peasants as subjects, monumental scale for ordinary people, political implications (dignifying the working class). His rejection of the academic tradition (classical or Romantic subjects) was itself a political statement — ordinary people deserve art's attention."},
  {cat:"Culture",term:"Louis Pasteur",pos:"noun (proper)",def:"French chemist (1822–1895) who established <strong>germ theory</strong> (microorganisms cause disease), developed pasteurization (killing pathogens by heat), and created vaccines for chicken cholera, anthrax, and rabies. The father of modern microbiology and the scientific basis of modern medicine.",tip:"Pasteur is the scientist of the 19th century for medicine. Know: germ theory, pasteurization, vaccines. His work transformed medicine from clinical art to applied science. The public health consequences — sanitation, clean water, antiseptic surgery — eventually eliminated or controlled the infectious diseases that had plagued humanity."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
