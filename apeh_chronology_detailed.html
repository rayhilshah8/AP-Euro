<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEH Chronology</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f4ef;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --surface3: #e8e4da;
  --border: rgba(0,0,0,0.09);
  --border-med: rgba(0,0,0,0.14);
  --border-strong: rgba(0,0,0,0.22);
  --text: #18160f;
  --text2: #52503f;
  --text3: #9b9680;
  --text4: #c4c0ac;

  --c-intel: #433a9a;
  --c-intel-lt: #eeedfe;
  --c-art: #0c6248;
  --c-art-lt: #dff5ed;
  --c-relig: #872f14;
  --c-relig-lt: #faece7;
  --c-polit: #124f87;
  --c-polit-lt: #e4f0fb;
  --c-econ: #734208;
  --c-econ-lt: #faeeda;
  --c-mil: #8c2424;
  --c-mil-lt: #fbeaea;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border-med);
  padding: 2rem 2.5rem 1.25rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 6px;
}
.header-left p {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.06em;
  line-height: 1.7;
}
.header-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  align-items: center;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.03em;
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}
.leg-item.hidden { opacity: 0.35; }
.leg-swatch {
  width: 22px;
  height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* CONTROLS */
.controls {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0.6rem 2.5rem;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.ctrl-label {
  font-size: 9px;
  color: var(--text4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-right: 2px;
}
.era-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 11px;
  border-radius: 2px;
  border: 1px solid var(--border-med);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all .12s;
  letter-spacing: 0.02em;
}
.era-btn:hover { background: var(--surface2); border-color: var(--border-strong); }
.era-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

.sep { width: 1px; height: 18px; background: var(--border-med); margin: 0 4px; }

/* MAIN AREA */
.main { padding: 1.5rem 2.5rem 5rem; }

.timeline-outer {
  overflow-x: auto;
  border: 1px solid var(--border-med);
  background: var(--surface);
  border-radius: 5px;
}
.timeline-inner { min-width: 1400px; }

/* AXIS */
.axis-wrap {
  margin-left: 140px;
  display: flex;
  border-bottom: 1px solid var(--border-med);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}
.axis-century {
  flex: none;
  border-left: 2px solid var(--border-med);
  font-size: 8px;
  color: var(--text3);
  letter-spacing: 0.08em;
  padding: 5px 0 3px 5px;
  font-weight: 500;
}
.axis-decade {
  flex: none;
  border-left: 1px solid var(--border);
  font-size: 8px;
  color: var(--text4);
  letter-spacing: 0.04em;
  padding: 5px 0 3px 3px;
}

/* SECTION */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 4px 16px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.section-header:first-of-type { border-top: none; margin-top: 0; }
.section-title {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  font-weight: 500;
}

/* TRACK ROW */
.track-row {
  display: flex;
  min-height: 34px;
  align-items: stretch;
}
.track-label-cell {
  width: 140px;
  flex-shrink: 0;
  font-size: 9.5px;
  color: var(--text3);
  padding: 0 10px 0 16px;
  text-align: right;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding-top: 8px;
  line-height: 1.3;
  letter-spacing: 0.02em;
}
.track-body {
  flex: 1;
  position: relative;
  border-left: 1px solid var(--border);
}

/* BARS */
.bar {
  position: absolute;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 7px;
  font-size: 9px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.03em;
  height: 22px;
  top: 5px;
  transition: filter .1s, transform .1s;
  user-select: none;
}
.bar:hover { filter: brightness(1.1); transform: scaleY(1.04); }

/* POINT EVENTS */
.point-wrap {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  top: 3px;
  z-index: 2;
}
.point-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  border: 2px solid white;
}
.point-stem {
  width: 1px;
  height: 10px;
  opacity: 0.25;
}
.point-lbl {
  font-size: 8px;
  white-space: nowrap;
  color: var(--text3);
  transform: rotate(-40deg);
  transform-origin: top left;
  margin-left: 5px;
  margin-top: 1px;
  letter-spacing: 0.02em;
}

.row-gap { height: 5px; }
.section-gap { height: 10px; }

/* TOOLTIP */
.tt-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
}
.tt-backdrop.open { display: block; }

.tooltip {
  display: none;
  position: fixed;
  z-index: 400;
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
}
.tooltip.open { display: block; }

.tt-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.tt-track-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.tt-badge-dot {
  width: 7px;
  height: 7px;
  border-radius: 1px;
  flex-shrink: 0;
}
.tt-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 3px;
}
.tt-dates {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.04em;
}

.tt-body {
  padding: 14px 16px;
  max-height: 65vh;
  overflow-y: auto;
}

.tt-section {
  margin-bottom: 14px;
}
.tt-section:last-child { margin-bottom: 0; }
.tt-section-label {
  font-size: 8.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text4);
  font-weight: 500;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
}
.tt-section-text {
  font-family: 'Source Serif 4', serif;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.72;
}
.tt-section-text p { margin-bottom: 8px; }
.tt-section-text p:last-child { margin-bottom: 0; }

.tt-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 4px;
}
.tt-pill {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
  letter-spacing: 0.02em;
  line-height: 1.4;
}

.tt-keyevents { list-style: none; }
.tt-keyevents li {
  font-size: 12px;
  font-family: 'Source Serif 4', serif;
  color: var(--text2);
  padding: 4px 0 4px 12px;
  border-left: 2px solid var(--border-med);
  margin-bottom: 4px;
  line-height: 1.5;
}
.tt-keyevents li:last-child { margin-bottom: 0; }
.tt-keyevents li strong {
  font-weight: 600;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.02em;
  display: block;
  margin-bottom: 1px;
}

.tt-saq {
  background: var(--surface2);
  border-radius: 3px;
  padding: 10px 12px;
}
.tt-saq-q {
  font-size: 11.5px;
  font-family: 'Source Serif 4', serif;
  font-style: italic;
  color: var(--text2);
  line-height: 1.55;
  margin-bottom: 5px;
  padding-left: 8px;
  border-left: 2px solid var(--border-strong);
}
.tt-saq-q:last-child { margin-bottom: 0; }

.tt-close {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 16px;
  color: var(--text3);
  cursor: pointer;
  background: none;
  border: none;
  font-family: monospace;
  line-height: 1;
  padding: 2px 5px;
}
.tt-close:hover { color: var(--text); }

footer {
  text-align: center;
  padding: 2rem;
  font-size: 9.5px;
  color: var(--text4);
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>APEH — European History Chronology</h1>
    <p>1450 – 1991 &nbsp;·&nbsp; Click any bar or event to read full details &nbsp;·&nbsp; Scroll right to navigate &nbsp;·&nbsp; Toggle tracks in legend</p>
  </div>
  <div class="header-legend" id="legend"></div>
</header>

<div class="controls" id="controls">
  <span class="ctrl-label">Jump to</span>
  <button class="era-btn active" onclick="jumpTo(1450,this)">1450</button>
  <button class="era-btn" onclick="jumpTo(1550,this)">1550</button>
  <button class="era-btn" onclick="jumpTo(1618,this)">1618</button>
  <button class="era-btn" onclick="jumpTo(1680,this)">1680</button>
  <button class="era-btn" onclick="jumpTo(1750,this)">1750</button>
  <button class="era-btn" onclick="jumpTo(1789,this)">1789</button>
  <button class="era-btn" onclick="jumpTo(1815,this)">1815</button>
  <button class="era-btn" onclick="jumpTo(1848,this)">1848</button>
  <button class="era-btn" onclick="jumpTo(1871,this)">1871</button>
  <button class="era-btn" onclick="jumpTo(1914,this)">1914</button>
  <button class="era-btn" onclick="jumpTo(1939,this)">1939</button>
  <button class="era-btn" onclick="jumpTo(1945,this)">1945</button>
</div>

<div class="main">
  <div class="timeline-outer" id="scroller">
    <div class="timeline-inner" id="tl"></div>
  </div>
</div>

<div class="tt-backdrop" id="backdrop" onclick="closeTip()"></div>
<div class="tooltip" id="tt">
  <button class="tt-close" onclick="closeTip()">✕</button>
  <div class="tt-header">
    <div class="tt-track-badge" id="tt-badge">
      <span class="tt-badge-dot" id="tt-bdot"></span>
      <span id="tt-btext"></span>
    </div>
    <div class="tt-title" id="tt-title"></div>
    <div class="tt-dates" id="tt-dates"></div>
  </div>
  <div class="tt-body" id="tt-body"></div>
</div>

<footer>APEH Study Tool · 1450–1991 · All major intellectual, artistic, religious, political, economic & military developments</footer>

<script>
const START = 1450, END = 1991, SPAN = END - START;

const TRACKS = [
  {id:'intel', label:'Intellectual', color:'#433a9a', lt:'#eeedfe'},
  {id:'art',   label:'Art & culture', color:'#0c6248', lt:'#dff5ed'},
  {id:'relig', label:'Religion',      color:'#872f14', lt:'#faece7'},
  {id:'polit', label:'Political',     color:'#124f87', lt:'#e4f0fb'},
  {id:'econ',  label:'Economic',      color:'#734208', lt:'#faeeda'},
  {id:'mil',   label:'Wars',          color:'#8c2424', lt:'#fbeaea'},
];

// Each entry: track, start, end (or point:true), label, then rich fields:
// overview, context, significance, figures, keyEvents:[{date,text}], saq:[strings]
const DATA = [

  // ── INTELLECTUAL ──────────────────────────────────────────────
  {
    track:'intel', start:1350, end:1600, label:'Renaissance humanism',
    overview:'A fundamental reorientation of European intellectual life away from medieval scholasticism and toward human potential, classical antiquity, and the study of the natural world. Humanists argued that the proper object of study was the human being — his dignity, capacity for reason, and place in the world — rather than abstract theological questions.',
    context:'The Italian city-states provided the material conditions for humanism: merchant wealth funded patronage, trade with Byzantium brought Greek manuscripts westward, and the relative weakness of the Church in northern Italy allowed secular thought to flourish. The Black Death (1347–51) had already shaken confidence in the Church\'s authority, and a century of questioning had made space for new frameworks.',
    significance:'Humanism transformed education (studia humanitatis: grammar, rhetoric, history, poetry, moral philosophy), art (perspective, naturalism), political thought (Machiavelli), and eventually science. Its emphasis on reading primary texts — ad fontes — would directly fuel the Protestant Reformation when applied to the Bible. The printing press (1450) turned what had been a narrow elite phenomenon into a broad European movement.',
    figures:'Petrarch (father of humanism), Pico della Mirandola (Oration on the Dignity of Man), Erasmus (Christian humanism, In Praise of Folly), Machiavelli (The Prince, applied secular reason to politics), Thomas More (Utopia).',
    keyEvents:[
      {date:'1341', text:'Petrarch crowned poet laureate in Rome — symbolic start of humanist revival of classical culture.'},
      {date:'1397', text:'Manuel Chrysoloras teaches Greek in Florence — opens direct access to Greek texts.'},
      {date:'c.1450', text:'Gutenberg\'s printing press allows rapid, cheap reproduction of humanist texts across Europe.'},
      {date:'1486', text:'Pico della Mirandola\'s Oration on the Dignity of Man — high-water mark of Renaissance optimism about human potential.'},
      {date:'1509', text:'Erasmus publishes In Praise of Folly, targeting Church corruption through irony rather than open confrontation.'},
      {date:'1527', text:'Sack of Rome by Charles V\'s troops ends the High Renaissance in Italy.'},
    ],
    saq:['Explain one cause of Renaissance humanism in Italy.','Explain one way humanism differed from medieval scholasticism.','Explain one way the printing press changed the spread of humanist ideas.','Explain one connection between Renaissance humanism and the Protestant Reformation.'],
  },
  {
    track:'intel', start:1543, end:1700, label:'Scientific Revolution',
    overview:'A fundamental transformation in how Europeans understood and investigated the natural world. The authority of ancient texts (Aristotle, Galen, Ptolemy) was replaced by systematic observation, mathematical description, and experimental testing. By 1700, nature was understood as a machine governed by discoverable laws — a conception that had not existed a century and a half earlier.',
    context:'The Renaissance recovery of Greek texts created a community of scholars familiar with mathematical astronomy and ancient debates. Patronage courts funded "natural philosophers." New instruments — the telescope, microscope, thermometer, and air pump — made observation precise. Crucially, the printing press allowed rapid, international sharing of results so that findings could be checked and built upon.',
    significance:'The Scientific Revolution permanently changed the relationship between faith and reason. Copernicus\'s heliocentric model implied the Earth was not the center of creation; Galileo\'s condemnation showed the Church recognized the threat. Newton\'s synthesis unified terrestrial and celestial mechanics, suggesting God created a clockwork universe that ran by itself. These ideas fed directly into the Enlightenment\'s program of applying reason to human affairs.',
    figures:'Copernicus (heliocentric theory), Tycho Brahe (precise astronomical data), Kepler (elliptical orbits), Galileo (telescope, mechanics, trial 1633), Vesalius (human anatomy), Harvey (circulation of blood), Bacon (empirical method), Descartes (rationalism, coordinate geometry), Newton (Principia 1687, calculus, universal gravitation).',
    keyEvents:[
      {date:'1543', text:'Copernicus publishes De Revolutionibus — heliocentric model proposed. He delayed publication until death fearing Church reaction.'},

      {date:'1609', text:'Galileo turns telescope on the sky; discovers Jupiter\'s moons, mountains on the Moon. Kepler publishes elliptical orbit laws.'},
      {date:'1628', text:'Harvey publishes On the Motion of the Heart — blood circulates, not produced by the liver (contradicting Galen).'},
      {date:'1633', text:'Galileo condemned by the Inquisition and forced to recant heliocentrism. Placed under house arrest.'},
      {date:'1637', text:'Descartes publishes Discourse on Method — rationalist approach: doubt everything, build knowledge from clear and distinct ideas.'},
      {date:'1687', text:'Newton\'s Principia Mathematica — universal gravitation, three laws of motion. Synthesizes and explains all previous work in one mathematical framework.'},
    ],
    saq:['Explain one cause of the Scientific Revolution.','Explain one way the Scientific Revolution challenged Church authority.','Explain one way the Scientific Revolution contributed to the Enlightenment.','Explain one similarity or difference between Bacon\'s empiricism and Descartes\'s rationalism.'],
  },
  {
    track:'intel', start:1690, end:1789, label:'Enlightenment',
    overview:'A broad intellectual movement that applied the methods and optimism of the Scientific Revolution to human society, politics, religion, and morality. Enlightenment thinkers (philosophes) believed reason could identify the natural laws governing human affairs, just as Newton had revealed the laws of nature, and that applying those laws would produce human progress and happiness.',
    context:'The Enlightenment grew in a specific social context: the expansion of a literate public through coffeehouses, salons, reading clubs, and periodicals. The philosophes wrote not for universities but for this new "public sphere." France became the center, partly because royal absolutism and Church control were most oppressive there, making critique most urgent. The Encyclopédie (1751–72) was the movement\'s monument — a systematic summary of all human knowledge organized by reason rather than theology.',
    significance:'The Enlightenment provided the intellectual vocabulary for the American and French Revolutions. Its language of rights, consent, reason, and progress made the Old Regime\'s inequalities newly illegitimate. It also contributed to religious toleration, legal reform, prison reform, and the beginnings of abolitionism. However, its assumptions (universal reason, progress, human perfectibility) were also challenged — by Romanticism, by the Terror, and eventually by the 20th century\'s catastrophes.',
    figures:'Locke (natural rights, consent of governed), Montesquieu (separation of powers, Spirit of the Laws 1748), Voltaire (religious toleration, anti-clericalism), Rousseau (general will, Social Contract 1762, inequality), Hume (skepticism, empiricism), Kant (sapere aude — dare to know), Diderot (Encyclopédie editor), Adam Smith (Wealth of Nations 1776).',
    keyEvents:[

      {date:'1748', text:'Montesquieu\'s Spirit of the Laws — separation of powers into executive, legislative, judicial. Foundational for American Constitution.'},
      {date:'1751–72', text:'The Encyclopédie edited by Diderot — 28 volumes, 70,000 articles. Systematic organization of knowledge by reason. Repeatedly banned.'},
      {date:'1759', text:'Voltaire\'s Candide — satirizes optimism (Leibniz\'s "best of all possible worlds") and calls for practical reform.'},

    context:'Romanticism grew directly out of disillusionment with the French Revolution and the Terror. If pure reason led to the guillotine, something was wrong with Enlightenment assumptions. German Romanticism in particular emphasized the Volk — the particular cultural-historical identity of a people — as the true basis of social life, in contrast to Enlightenment universalism. This had enormous consequences for nationalism.',
    significance:'Romanticism fed directly into 19th-century nationalism by celebrating particular national cultures, languages, folk traditions, and histories. Herder\'s idea that each nation had its own unique spirit (Volksgeist) gave intellectual grounding to nationalist political movements. Romanticism also influenced historiography (history as narrative and organic process) and indirectly contributed to conservatism (Burke\'s critique of abstract reason in politics).',
    figures:'Herder (Volksgeist, cultural nationalism), Hegel (dialectical historical process, World Spirit), Fichte (Addresses to the German Nation), Wordsworth, Byron, Keats (English Romantic poetry), Goethe (Faust, The Sorrows of Young Werther), Schiller, Burke (Reflections on the Revolution in France — conservative Romanticism).',
    keyEvents:[

      {date:'1798', text:'Wordsworth and Coleridge\'s Lyrical Ballads — launches English Romanticism; celebrates nature, ordinary people, emotion.'},
      {date:'1806', text:'Fichte\'s Addresses to the German Nation — calls on Germans to unite around cultural identity after Napoleon\'s defeat of Prussia.'},
      {date:'1807', text:'Hegel\'s Phenomenology of Spirit — dialectical development of consciousness through history; massive influence on 19th-century thought including Marx.'},
      {date:'1832', text:'Goethe completes Faust Part II — Romantic exploration of the striving human spirit, knowledge, and the limits of reason.'},
    ],
    saq:['Explain one way Romanticism differed from Enlightenment thought.','Explain one connection between Romanticism and 19th-century nationalism.','Explain one way Romanticism can be seen as a response to the French Revolution.'],
  },
  {
    track:'intel', start:1830, end:1900, label:'Positivism & Social Darwinism',
    overview:'Two related intellectual currents that attempted to apply scientific methods and frameworks to human society. Auguste Comte\'s positivism argued that society, like nature, was governed by laws discoverable through scientific observation. Social Darwinism adapted Darwin\'s evolutionary biology to justify existing social hierarchies, laissez-faire capitalism, and European imperial expansion.',
    context:'The success of natural science in explaining the physical world created enormous pressure to extend scientific explanation to human society. The Industrial Revolution and its social dislocations made understanding social change urgent. Darwin\'s On the Origin of Species (1859) provided a powerful new framework; Social Darwinism was a selective misapplication of it to legitimize inequality.',

// ─── state & helpers ────────────────────────────────────────────
let visible = new Set(TRACKS.map(t=>t.id));

function pctL(y){ return ((Math.max(y,START)-START)/SPAN*100).toFixed(4)+'%'; }
function pctW(s,e){ return (Math.max(0,(Math.min(e,END)-Math.max(s,START))/SPAN*100)).toFixed(4)+'%'; }

// ─── legend ─────────────────────────────────────────────────────
function buildLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = '';
  TRACKS.forEach(t=>{
    const item = document.createElement('span');
    item.className = 'leg-item' + (visible.has(t.id)?'':' hidden');
    const sw = document.createElement('span');
    sw.className = 'leg-swatch';
    sw.style.background = t.color;
    item.appendChild(sw);
    item.appendChild(document.createTextNode(t.label));
    item.onclick = ()=>{
      if(visible.has(t.id)) visible.delete(t.id);
      else visible.add(t.id);
      buildLegend();
      buildTimeline();
    };
    el.appendChild(item);
  });
}

// ─── timeline ───────────────────────────────────────────────────
function buildTimeline(){
  const tl = document.getElementById('tl');
  tl.innerHTML = '';

  // axis
  const axWrap = document.createElement('div');
  axWrap.className = 'axis-wrap';
  for(let y=START;y<=END;y++){
    const tick = document.createElement('div');
    const isCentury = y%100===0;
    const isDecade = y%10===0;
    if(!isDecade) continue;
    tick.className = isCentury ? 'axis-century' : 'axis-decade';
    tick.style.width = (10/SPAN*100).toFixed(4)+'%';
    tick.textContent = y;
    axWrap.appendChild(tick);
  }
  tl.appendChild(axWrap);

  const sections = [
    {label:'Intellectual history', ids:['intel']},
    {label:'Art & culture', ids:['art']},
    {label:'Religion', ids:['relig']},
    {label:'Political history', ids:['polit']},
    {label:'Economic history', ids:['econ']},
    {label:'Wars & conflict', ids:['mil']},
  ];

  sections.forEach(sec=>{
    const activeIds = sec.ids.filter(id=>visible.has(id));
    if(!activeIds.length) return;

    const sh = document.createElement('div');
    sh.className = 'section-header';
    const st = document.createElement('span');
    st.className = 'section-title';
    st.textContent = sec.label;
    sh.appendChild(st);
    tl.appendChild(sh);

    activeIds.forEach(tid=>{
      const track = TRACKS.find(t=>t.id===tid);
      const trackItems = DATA.filter(d=>d.track===tid);

      const row = document.createElement('div');
      row.className = 'track-row';

      const lblCell = document.createElement('div');
      lblCell.className = 'track-label-cell';
      lblCell.textContent = track.label;
      row.appendChild(lblCell);

      const body = document.createElement('div');
      body.className = 'track-body';

      const laneEnd = [];

      trackItems.forEach(item=>{
        if(item.point){
          const pw = document.createElement('div');
          pw.className = 'point-wrap';
          pw.style.left = pctL(item.start);
          const dot = document.createElement('div');
          dot.className = 'point-dot';
          dot.style.background = track.color;
          const stem = document.createElement('div');
          stem.className = 'point-stem';
          stem.style.background = track.color;
          const lbl = document.createElement('div');
          lbl.className = 'point-lbl';
          lbl.textContent = item.label.length>22?item.label.slice(0,21)+'…':item.label;
          pw.appendChild(dot);
          pw.appendChild(stem);
          pw.appendChild(lbl);
          pw.addEventListener('click',e=>showTip(e,item,track));
          body.appendChild(pw);
          return;
        }

        let lane=0;
        while(laneEnd[lane]!==undefined && laneEnd[lane]>item.start+1) lane++;
        laneEnd[lane]=item.end;

        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.left = pctL(item.start);
        bar.style.width = pctW(item.start,item.end);
        bar.style.top = (5+lane*26)+'px';
        bar.style.background = track.color;
        bar.style.color = track.lt;
        bar.textContent = item.label;
        bar.addEventListener('click',e=>showTip(e,item,track));
        body.appendChild(bar);
      });

      const maxLane = Math.max(0,laneEnd.length-1);
      body.style.minHeight = (5+(maxLane+1)*26+8)+'px';

      row.appendChild(body);
      tl.appendChild(row);
    });

    const gap = document.createElement('div');
    gap.className = 'section-gap';
    tl.appendChild(gap);
  });
}

// ─── tooltip ────────────────────────────────────────────────────
const ttEl = document.getElementById('tt');
const backdrop = document.getElementById('backdrop');
let currentItem = null;

function showTip(e,item,track){
  e.stopPropagation();
  currentItem = item;

  document.getElementById('tt-bdot').style.background = track.color;
  document.getElementById('tt-btext').textContent = track.label;
  document.getElementById('tt-title').textContent = item.label;
  document.getElementById('tt-dates').textContent = item.point ? String(item.start) : item.start + ' – ' + item.end;

  const body = document.getElementById('tt-body');
  body.innerHTML = '';

  const sections = [
    {key:'overview', label:'Overview'},
    {key:'context', label:'Historical context'},
    {key:'significance', label:'Significance'},
    {key:'figures', label:'Key figures'},
  ];

  sections.forEach(s=>{
    if(!item[s.key]) return;
    const sec = document.createElement('div');
    sec.className = 'tt-section';
    const lbl = document.createElement('div');
    lbl.className = 'tt-section-label';
    lbl.textContent = s.label;
    sec.appendChild(lbl);
    const txt = document.createElement('div');
    txt.className = 'tt-section-text';
    item[s.key].split('\n').forEach(p=>{
      if(!p.trim()) return;
      const el = document.createElement('p');
      el.textContent = p;
      txt.appendChild(el);
    });
    sec.appendChild(txt);
    body.appendChild(sec);
  });

  if(item.keyEvents && item.keyEvents.length){
    const sec = document.createElement('div');
    sec.className = 'tt-section';
    const lbl = document.createElement('div');
    lbl.className = 'tt-section-label';
    lbl.textContent = 'Key events';
    sec.appendChild(lbl);
    const ul = document.createElement('ul');
    ul.className = 'tt-keyevents';
    item.keyEvents.forEach(ev=>{
      const li = document.createElement('li');
      const strong = document.createElement('strong');
      strong.textContent = ev.date;
      li.appendChild(strong);
      li.appendChild(document.createTextNode(ev.text));
      ul.appendChild(li);
    });
    sec.appendChild(ul);
    body.appendChild(sec);
  }

  if(item.saq && item.saq.length){
    const sec = document.createElement('div');
    sec.className = 'tt-section';
    const lbl = document.createElement('div');
    lbl.className = 'tt-section-label';
    lbl.textContent = 'SAQ prompts for this topic';
    sec.appendChild(lbl);
    const box = document.createElement('div');
    box.className = 'tt-saq';
    item.saq.forEach(q=>{
      const p = document.createElement('div');
      p.className = 'tt-saq-q';
      p.textContent = q;
      box.appendChild(p);
    });
    sec.appendChild(box);
    body.appendChild(sec);
  }

  ttEl.classList.add('open');
  backdrop.classList.add('open');

  // positioning
  const margin = 14;
  const ttW = 420, ttH = Math.min(window.innerHeight * 0.8, 700);
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if(x + ttW > window.innerWidth - margin) x = e.clientX - ttW - margin;
  if(y + ttH > window.innerHeight - margin) y = Math.max(margin, window.innerHeight - ttH - margin);
  ttEl.style.left = x+'px';
  ttEl.style.top = y+'px';
  ttEl.style.maxHeight = ttH+'px';
}

function closeTip(){
  ttEl.classList.remove('open');
  backdrop.classList.remove('open');
}

function jumpTo(year, btn){
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const scroller = document.getElementById('scroller');
  const inner = document.getElementById('tl');
  const frac = (year-START)/SPAN;
  scroller.scrollLeft = frac * inner.scrollWidth - 140;
}

buildLegend();
buildTimeline();
</script>
