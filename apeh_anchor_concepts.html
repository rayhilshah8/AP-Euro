<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEH Anchor Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --card: #fdfaf4;
  --ink: #1a1410;
  --muted: #6b5e4e;
  --faint: #a8997f;
  --rule: #d4c9b0;
  --shadow: 3px 3px 0 #c4b89a;
  --radius: 3px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 3rem 1.25rem 5rem;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

/* ── header ── */
header {
  text-align: center;
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 2px solid var(--rule);
}

.back-link {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--faint);
  text-decoration: none;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1px;
  margin-bottom: 1.25rem;
  transition: color 0.12s, border-color 0.12s;
}
.back-link:hover { color: var(--ink); border-color: var(--ink); }

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 0.5rem;
}

h1 {
  font-family: 'IM Fell English', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 0.5rem;
}

.subtitle {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ── era tabs ── */
.era-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 2rem;
}

.era-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--rule);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s, color 0.12s, background 0.12s;
}
.era-btn:hover { border-color: var(--ink); color: var(--ink); }
.era-btn.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* ── era label ── */
.era-label {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 1.25rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--rule);
}
.era-name {
  font-family: 'IM Fell English', serif;
  font-size: 1.15rem;
  color: var(--ink);
}
.era-dates {
  font-size: 11px;
  color: var(--faint);
  letter-spacing: 0.04em;
}

/* ── concept cards grid ── */
.concepts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 10px;
  margin-bottom: 0.5rem;
}

.concept-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.12s, box-shadow 0.12s, transform 0.12s;
}
.concept-card:hover {
  border-color: #b8a888;
  box-shadow: var(--shadow);
  transform: translate(-1px, -1px);
}
.concept-card.open {
  border-color: var(--ink);
}

.card-top {
  padding: 11px 13px 10px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.card-accent {
  width: 3px;
  flex-shrink: 0;
  border-radius: 2px;
  margin-top: 2px;
  align-self: stretch;
  min-height: 30px;
}

.card-meta { flex: 1; }

.card-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 3px;
}

.card-title {
  font-family: 'IM Fell English', serif;
  font-size: 14px;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 2px;
}

.card-date {
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 0.03em;
}

.card-chevron {
  font-size: 10px;
  color: var(--faint);
  flex-shrink: 0;
  margin-top: 3px;
  transition: transform 0.18s;
  user-select: none;
}
.concept-card.open .card-chevron { transform: rotate(180deg); }

/* ── expanded detail ── */
.card-detail {
  display: none;
  border-top: 1px solid var(--rule);
  padding: 12px 13px 14px 26px;
}
.concept-card.open .card-detail { display: block; }

.detail-block { margin-bottom: 12px; }
.detail-block:last-child { margin-bottom: 0; }

.detail-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  margin-bottom: 5px;
}

.detail-items { display: flex; flex-direction: column; gap: 4px; }

.detail-item {
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.55;
  padding-left: 10px;
  border-left: 2px solid var(--rule);
}

.saq-box {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 9px 11px;
}

.saq-item {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.55;
  padding: 3px 0;
  border-bottom: 1px solid var(--rule);
  font-style: italic;
}
.saq-item:last-child { border-bottom: none; padding-bottom: 0; }
.saq-item::before { content: '— '; color: var(--faint); font-style: normal; }

/* ── footer ── */
footer {
  text-align: center;
  margin-top: 3.5rem;
  font-size: 11px;
  color: var(--faint);
  letter-spacing: 0.06em;
}
</style>
</head>

let currentEra = 0;
const openCards = new Set();

function renderNav() {
  const nav = document.getElementById('era-nav');
  nav.innerHTML = '';
  eras.forEach((era, i) => {
    const btn = document.createElement('button');
    btn.className = 'era-btn' + (i === currentEra ? ' active' : '');
    btn.textContent = era.name;
    btn.style.setProperty('--era-color', era.color);
    btn.onclick = () => { currentEra = i; openCards.clear(); renderNav(); renderGrid(); };
    nav.appendChild(btn);
  });
}

function renderGrid() {
  const era = eras[currentEra];
  document.getElementById('era-name').textContent = era.name;
  document.getElementById('era-dates').textContent = era.dates;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  era.concepts.forEach((c, i) => {
    const key = currentEra + '-' + i;
    const isOpen = openCards.has(key);

    const card = document.createElement('div');
    card.className = 'concept-card' + (isOpen ? ' open' : '');

    const top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = `
      <div class="card-accent" style="background:${era.color}"></div>
      <div class="card-meta">
        <div class="card-label">${c.label}</div>
        <div class="card-title">${c.title}</div>
        <div class="card-date">${c.date}</div>
      </div>
      <div class="card-chevron">▼</div>
    `;
    top.onclick = () => {
      if (openCards.has(key)) openCards.delete(key);
      else openCards.add(key);
      renderGrid();
    };

    const detail = document.createElement('div');
    detail.className = 'card-detail';
    detail.innerHTML = `
      <div class="detail-block">
        <div class="detail-label">Causes</div>
        <div class="detail-items">${c.causes.map(x => `<div class="detail-item">${x}</div>`).join('')}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Consequences</div>
        <div class="detail-items">${c.consequences.map(x => `<div class="detail-item">${x}</div>`).join('')}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">Key turning points</div>
        <div class="detail-items">${c.turning_points.map(x => `<div class="detail-item">${x}</div>`).join('')}</div>
      </div>
      <div class="detail-block">
        <div class="detail-label">SAQ prompts</div>
        <div class="saq-box">${c.saq.map(q => `<div class="saq-item">${q}</div>`).join('')}</div>
      </div>
    `;

    card.appendChild(top);
    card.appendChild(detail);
    grid.appendChild(card);
  });
}

renderNav();
renderGrid();
