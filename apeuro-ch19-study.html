<script>
const CONCEPTS = [
  // 1968 & Cultural Revolution
  {cat:"1968 & Cultural Revolution",q:"What was the significance of 1968 as a year of protest, and what drove the revolts?",a:"1968 saw simultaneous upheavals across the world: <strong>France</strong> — student barricades in Paris (May '68), followed by a massive general strike of 10 million workers, nearly toppling de Gaulle; <strong>Czechoslovakia</strong> — the Prague Spring (reformist communism crushed by Soviet tanks in August); <strong>United States</strong> — anti-Vietnam War protests, assassination of Martin Luther King Jr. and Robert Kennedy; <strong>Mexico</strong> — student massacre at Tlatelolco. Driven by: the baby boom generation's size and university education; Cold War disillusionment; racial and colonial injustice; and opposition to the Vietnam War. A global generational revolt against both Western capitalism and Soviet authoritarianism.",tip:"1968 is the AP's paradigm for the 1960s–70s cultural revolution. Know: Paris May '68 (student revolt + workers' strike, nearly toppled de Gaulle), Prague Spring (crushed August 1968), Vietnam War protests. The simultaneity across different political systems shows a global generational revolt against authority, not just specific political grievances. De Gaulle survived but called early elections — and won, showing that French society was not revolutionary."},
  {cat:"1968 & Cultural Revolution",q:"What was the Paris May 1968 revolt, and what did it reveal about French society?",a:"In May 1968, French students occupied universities and erected barricades in Paris, inspired by opposition to the Vietnam War, bourgeois materialism, and authoritarian university culture. Workers then joined with a massive general strike (10 million workers) that temporarily paralyzed France. De Gaulle fled briefly to Germany to confirm army support, then returned, called elections, and <strong>won a landslide victory</strong>. The revolt revealed both the depth of social discontent (with Gaullist authoritarianism and bourgeois values) and the limits of the revolutionary left — when given the choice, most French voters preferred order.",tip:"May '68's paradox: the most dramatic social upheaval in France since 1871 ended with a conservative electoral victory. Know: student barricades + workers' general strike (10 million), de Gaulle's flight and return, his subsequent election victory. The lesson: radical cultural revolt doesn't necessarily translate into electoral revolution. The lasting consequences were cultural (sexual liberation, women's liberation, university reform) rather than political."},
  {cat:"1968 & Cultural Revolution",q:"What was the sexual revolution of the 1960s–70s, and what enabled it?",a:"The sexual revolution transformed Western sexual norms: premarital sex became more accepted; divorce rates rose; homosexuality was decriminalized in many countries (Britain 1967, Germany 1969); and sexual liberation became a cultural value. Key enablers: <strong>the contraceptive pill</strong> (separating sex from reproduction); <strong>second-wave feminism</strong> (challenging traditional gender roles); the <strong>youth counterculture's</strong> rejection of bourgeois Victorian morality; and legal changes (abortion rights in France 1975, Britain 1967). The sexual revolution was genuinely transformative but also generated conservative backlash.",tip:"The sexual revolution connects medical technology (the pill) to cultural change (rejection of traditional morality) to legal reform (decriminalization of homosexuality, abortion rights). Know: the pill as the key enabling technology, Britain decriminalizing homosexuality (1967), second-wave feminism as the ideological driver. The AP may ask about continuity and change in gender and sexuality — the sexual revolution is the change."},

  // Eastern Europe
  {cat:"Eastern Europe",q:"What was the Prague Spring (1968), and why was it crushed?",a:"Alexander Dubček's reformist government in Czechoslovakia introduced 'socialism with a human face' — press freedom, multiparty politics, relaxation of political repression. The <strong>Brezhnev Doctrine</strong> justified Soviet intervention: any threat to communist rule in a Warsaw Pact state threatened all. In August 1968, <strong>500,000 Soviet and Warsaw Pact troops invaded Czechoslovakia</strong>; Dubček was removed. The Prague Spring's crushing ended the hope that communism could reform itself from within — a lesson with enormous consequences for the later collapse of 1989.",tip:"Prague Spring is the most important Eastern European event of this period. Know: Dubček, 'socialism with a human face,' August 1968 invasion (500,000 troops), Brezhnev Doctrine. Its significance: it proved that Soviet-style communism could not be reformed — only replaced. This conclusion, drawn by many reform communists after 1968, shaped the thinking of Gorbachev's generation (who would try again in the 1980s, with different results)."},
  {cat:"Eastern Europe",q:"What was the Brezhnev Doctrine, and what were its implications?",a:"The Brezhnev Doctrine (articulated after the 1968 Czechoslovak invasion) held that <strong>the Soviet Union had the right and duty to intervene militarily</strong> in any socialist state where socialism was threatened, to protect the collective interests of the Soviet bloc. It was the ideological justification for the 1968 invasion and for the continued Soviet grip on Eastern Europe. Reagan called it the 'Brezhnev Doctrine of frozen stagnation.' It was effectively reversed by Gorbachev in 1989 (sometimes called the 'Sinatra Doctrine' — 'do it your way').",tip:"The Brezhnev Doctrine is the AP's key concept for understanding Soviet control of Eastern Europe. Know: right to intervene if socialism threatened, justification for 1968 invasion, contrast with Gorbachev's reversal (1989). The doctrine's reversal is what made the 1989 revolutions possible — when Eastern European governments knew Soviet tanks wouldn't come, they could negotiate rather than repress."},
  {cat:"Eastern Europe",q:"What was Poland's Solidarity movement, and why was it significant?",a:"Founded in 1980 at the Lenin Shipyard in Gdańsk under electrician <strong>Lech Wałęsa</strong>, Solidarity (<em>Solidarność</em>) was a massive <strong>independent trade union</strong> that quickly became a broad social movement with 10 million members — a third of Poland's adult population. It negotiated the Gdańsk Accords with the communist government, gaining the right to independent unions and free speech. General Jaruzelski declared martial law (December 1981) under Soviet pressure, driving Solidarity underground — but it survived to lead Poland's transition to democracy in 1989.",tip:"Solidarity is the AP's most important Eastern European resistance movement before 1989. Know: Gdańsk (Danzig), Wałęsa, 1980, 10 million members, Gdańsk Accords (independent unions + free speech), martial law (December 1981). Its survival underground and eventual electoral victory (1989) shows how civil society can outlast authoritarian repression. It's also evidence that the Catholic Church (Solidarity's institutional support) remained a force for resistance in communist Poland."},

  // Détente
  {cat:"Détente",q:"What was détente, and what agreements defined it?",a:"Détente (French: 'relaxation') was the policy of reducing Cold War tensions through negotiation, recognizing spheres of influence, and expanding economic and cultural ties between East and West (c. 1969–1979). Key agreements: <strong>SALT I</strong> (Strategic Arms Limitation Talks, 1972 — Nixon and Brezhnev agreed to limit nuclear weapons); <strong>Ostpolitik</strong> (West German Chancellor Willy Brandt's normalization of relations with East Germany and Eastern Europe, 1969–1975); <strong>Helsinki Accords</strong> (1975 — recognized existing European borders but also committed signatories to respect human rights — a provision that emboldened Eastern European dissidents).",tip:"Détente is the 1970s Cold War phase of managed competition. Know: SALT I (1972), Ostpolitik (Brandt), Helsinki Accords (1975). The Helsinki Accords' human rights provisions were the most consequential long-term element — they gave Eastern European dissidents international legal standing to demand rights, energizing movements like Solidarity and Charter 77 (Czechoslovakia). Know détente as both a reduction of tensions and a recognition of realities."},
  {cat:"Détente",q:"What was Ostpolitik, and why was it historically significant?",a:"Willy Brandt's 'Eastern Policy' (1969–1975) normalized West Germany's relations with East Germany and Eastern European states by acknowledging the post-WWII territorial realities (recognizing the Oder-Neisse line as Poland's western border; recognizing East Germany's existence). Brandt's symbolic gesture: <strong>kneeling at the Warsaw Ghetto Memorial</strong> (1970) — acknowledging German guilt for the Holocaust. Earned Brandt the Nobel Peace Prize (1971). Ostpolitik reduced Cold War tensions in central Europe and opened trade and cultural exchange.",tip:"Ostpolitik is the AP's key example of the shift from Cold War confrontation to détente in European diplomacy. Know: Brandt, 1969–75, recognition of East Germany and post-WWII borders, Warsaw kneeling (1970). Its significance: it normalized relations that Adenauer's government had refused to accept, reducing tensions in the most dangerous part of Europe. The Warsaw kneeling is one of the most powerful gestures of historical reckoning in postwar history."},
  {cat:"Détente",q:"What were the Helsinki Accords (1975), and why did their human rights provisions matter?",a:"The Helsinki Accords were signed by 35 states (including the USSR and all European countries) at the Conference on Security and Cooperation in Europe. They recognized existing European borders (what the USSR wanted) and committed all signatories to respect <strong>human rights and fundamental freedoms</strong> (what the West wanted). Eastern European dissidents used the human rights provisions as legal standing to form monitoring groups (Charter 77 in Czechoslovakia; human rights committees throughout Eastern Europe) that kept international attention on communist abuses.",tip:"Helsinki's human rights provisions are the Accords' most consequential element. Know: 1975, 35 states, borders recognized + human rights committed, Charter 77 (Czechoslovakia) and other dissident groups used them. The USSR signed expecting legitimization of its Eastern European borders — and inadvertently gave dissidents an international legal weapon. This is a case of unintended consequences: a Soviet diplomatic victory created the tools for Soviet bloc's eventual peaceful dissolution."},

  // Western Europe & Social Movements
  {cat:"Western Social Change",q:"What new social movements emerged in the late 1960s and 1970s, and what did they challenge?",a:"A wave of new social movements: <strong>Second-wave feminism</strong> — challenged workplace discrimination, demanded abortion rights and equal pay; <strong>LGBTQ+ rights</strong> (Stonewall Inn rebellion, NYC 1969; decriminalization spreading across Europe); <strong>environmental/Green movements</strong> — responding to industrial pollution, nuclear power concerns, pesticide fears (Rachel Carson's <em>Silent Spring</em>); <strong>anti-nuclear movements</strong> (CND in Britain, massive demonstrations across Europe in the early 1980s against NATO's deployment of cruise missiles). All challenged the postwar growth consensus and the assumption that progress meant industrial expansion.",tip:"The new social movements of the 1960s–70s are a major AP topic. Know: second-wave feminism (equal pay, abortion rights), LGBTQ+ rights (Stonewall 1969, European decriminalization), Green movements (environmental protection, anti-nuclear), anti-nuclear protests (1980s). They share a common thread: questioning the postwar growth consensus and challenging authorities (government, corporations, traditional norms) that prioritized economic growth over social justice or environmental health."},
  {cat:"Western Social Change",q:"How did the women's movement advance in Europe during this period, and what was achieved?",a:"Women made significant legal and political gains: abortion rights (France 1975 — Simone Veil's law; Britain 1967; Italy 1978); equal pay legislation across EEC countries; maternity leave protections; growing representation in parliaments (though still minority); and election to high office (Margaret Thatcher as Britain's first female Prime Minister, 1979). The contraceptive pill expanded reproductive autonomy. However, the 'second shift' (domestic labor in addition to paid work) persisted; wage gaps remained; and women were still underrepresented in leadership positions.",tip:"Women's progress in this period follows a pattern of formal legal gains + persistent practical inequalities. Know: abortion rights (France 1975 — Simone Veil, Britain 1967), equal pay laws, Thatcher (1979 — first female PM, though a Conservative who opposed many feminist causes). The tension between formal legal equality and practical inequality is the AP's key analytical point for women's history in this period."},
  {cat:"Western Social Change",q:"What was the oil crisis of 1973, and what were its consequences for Western Europe?",a:"The Arab OPEC states embargoed oil exports to Western nations that had supported Israel in the Yom Kippur War (October 1973), causing oil prices to quadruple. The consequences: <strong>stagflation</strong> (simultaneous inflation + unemployment + stagnation — which Keynesian economics couldn't explain); the end of the postwar growth era; energy conservation measures (speed limits, odd-even gas rationing); nuclear power expansion; and political destabilization (contributing to Thatcher's rise in Britain, questioning social democratic consensus). The oil crisis ended the postwar 'golden age.'",tip:"The 1973 oil crisis is the AP's turning point between the postwar golden age and the crisis-ridden 1970s. Know: 1973 Arab oil embargo, prices quadrupled, stagflation (inflation + unemployment simultaneously), Keynesian model collapsed (couldn't explain stagflation). Its political consequence: opened space for neoliberal alternatives (Thatcher, Reagan) that rejected Keynesian demand management in favor of supply-side economics and market deregulation."},

  // Culture & Thought
  {cat:"Culture & Thought",q:"What is postmodernism, and how did it challenge modernist assumptions?",a:"Postmodernism (c. 1960s–1990s) rejected the modernist belief in objective truth, universal values, and rational progress. It argued that all 'grand narratives' (Enlightenment reason, Marxism, liberalism, science as progress) are power constructs that impose particular perspectives as universal truth. Key thinkers: <strong>Jacques Derrida</strong> (deconstruction — texts contain contradictions that undermine their stated meanings); <strong>Michel Foucault</strong> (power/knowledge — knowledge claims always serve power interests); <strong>Jean-François Lyotard</strong> (defined postmodernism as 'incredulity toward metanarratives'). In art: pastiche, irony, self-reference, rejection of originality.",tip:"Postmodernism is the intellectual response to the perceived failures of modernism's confidence in reason and progress. Know: Derrida (deconstruction), Foucault (power/knowledge), Lyotard ('incredulity toward metanarratives'). Its AP significance: it's the philosophical expression of the period's disillusionment — if even science and reason are power constructs, what authority remains? Postmodernism's political implications are contested: it can support liberation (challenging dominant narratives) or relativism (no narrative is truer than any other)."},
  {cat:"Culture & Thought",q:"How did environmental consciousness develop in this period, and what political forms did it take?",a:"Rachel Carson's <em>Silent Spring</em> (1962) documented pesticide damage to ecosystems, launching the modern environmental movement. The 1970s saw: <strong>Earth Day</strong> (April 22, 1970 — first mass environmental demonstration); major environmental legislation (Clean Air Acts, EPA in the USA); nuclear disasters raising fears (Three Mile Island 1979, Chernobyl 1986 in the next decade); and the emergence of <strong>Green parties</strong> (Germany's Die Grünen, founded 1980 — first Green party to win parliamentary seats). Environmentalism challenged the postwar growth consensus from a different direction than socialism.",tip:"Green politics is a new political force in this period. Know: Rachel Carson (Silent Spring, 1962), Earth Day (1970), German Green Party (Die Grünen, 1980 — first Greens in parliament). The AP significance: Green parties represented a 'post-materialist' politics — arguing that quality of life and environmental health mattered more than economic growth. They challenged both capitalism (environmental destruction) and traditional socialism (focused only on economic distribution, not ecology)."},

  // Broader Themes
  {cat:"Broader Themes",q:"What does the period 1965–1985 reveal about the relationship between prosperity and protest?",a:"The paradox: the most prosperous generation in European history was also the most rebellious. The 1960s protests occurred during the economic miracle's peak — not during Depression-era poverty. This suggests that <strong>rising expectations outpaced what existing institutions could deliver</strong>: university-educated baby boomers expected meaningful participation; women with legal equality expected practical equality; colonial peoples expected self-determination. The pattern is familiar from European history (the revolution of rising expectations): it's not the poorest who revolt but those whose expectations exceed their reality.",tip:"'Revolution of rising expectations' is the AP's analytical framework for the 1960s social revolts. The key insight: prosperity doesn't prevent protest — it enables it by raising expectations and creating the leisure time and education to articulate grievances. This connects to a long theme in the course: the French Revolution, 1848, and 1968 all occurred during periods of rising rather than declining expectations."},
  {cat:"Broader Themes",q:"How did the period 1965–1985 begin to reveal the structural weaknesses of Soviet communism?",a:"Multiple indicators of Soviet systemic failure: <strong>economic stagnation</strong> (the Soviet economy grew only in heavy industry; consumer goods remained scarce; agricultural productivity chronic failure); <strong>technological lag</strong> (the USSR fell further behind the West in computers, electronics, and consumer technology); <strong>political rigidity</strong> (the Brezhnev era's corruption and gerontocracy); <strong>ideological exhaustion</strong> (few believed in communist ideology anymore — 'real existing socialism' substituted cynical accommodation for genuine belief); and the <strong>arms race</strong> consuming enormous resources. The Prague Spring's crushing made reform from within impossible; pressures accumulated toward the eventual implosion of 1989.",tip:"This is the bridge to Ch. 20 (collapse of communism). Know the systemic failures: economic stagnation, technological lag, political corruption (Brezhnev's stagnation), ideological exhaustion. The key insight: Soviet communism didn't collapse suddenly in 1989 — it had been failing for decades, held together only by coercion. When Gorbachev removed that coercion, the system dissolved rapidly because it had no genuine popular support."}
];

const VOCAB = [
  {cat:"Culture",term:"1968 (year of revolutions)",pos:"noun (proper)",def:"The year of simultaneous global upheavals: student revolts in France (May '68), Prague Spring (crushed August), anti-Vietnam War protests, racial justice uprisings in the USA. A <strong>global generational revolt</strong> against authority, Cold War structures, colonialism, and bourgeois materialism.",tip:"1968 is a year, not a single event. Know the key episodes: Paris May '68 (student barricades + workers' strike), Prague Spring (socialist reform crushed by Soviet tanks), Vietnam War protests. The simultaneity across different political systems is the AP's key point — this was a global generational phenomenon, not a specific political program."},
  {cat:"Culture",term:"May 1968 (Paris)",pos:"noun (proper)",def:"The month-long crisis in France when student protests at universities escalated to barricades in Paris streets, then triggered a general strike of <strong>10 million workers</strong>. De Gaulle briefly fled to Germany to confirm army support, then returned and called elections — winning a conservative majority. The revolt's consequences were cultural (sexual liberation, feminist consciousness) rather than political.",tip:"May '68 is the AP's paradigm for the 1960s cultural revolution in Europe. Know: student barricades, 10 million workers' strike, de Gaulle's flight + return + election victory. The paradox: the most dramatic French upheaval since the Commune ended with a conservative electoral victory. Cultural revolution ≠ political revolution."},
  {cat:"Culture",term:"Sexual revolution",pos:"noun",def:"The transformation of Western sexual norms in the 1960s–70s: increased acceptance of premarital sex, rising divorce rates, decriminalization of homosexuality, and legal abortion. Enabled by <strong>the contraceptive pill</strong>, second-wave feminism, youth counterculture, and legal reforms. Generated significant conservative backlash.",tip:"The sexual revolution connects technology (pill), law (decriminalization, abortion rights), and culture (rejection of Victorian morality). Know: pill (key enabling technology), Britain decriminalizes homosexuality (1967), France legalizes abortion (1975, Simone Veil). The AP may ask about continuity and change in gender/sexuality — the sexual revolution is the change; conservative backlash shows continuity of traditional values."},
  {cat:"Culture",term:"Counterculture",pos:"noun",def:"The youth movement of the 1960s–70s that <strong>rejected mainstream bourgeois values</strong> — consumerism, conformity, Cold War militarism, racial hierarchy — in favor of communal living, psychedelic experience, rock music, anti-war activism, and alternative lifestyles. Most visible in the USA (Woodstock, 1969) but present across Western Europe.",tip:"The counterculture is the cultural dimension of the 1960s revolt. Know: rejection of bourgeois materialism, anti-Vietnam War, rock music as cultural statement, communal alternatives. Its European expression was less 'hippie' than the American version — more intellectualized (existentialism, Marxist-influenced student politics). May '68 in France was intellectually sophisticated; Woodstock was culturally expressive. Both rejected the postwar consensus."},
  {cat:"Eastern Europe",term:"Prague Spring (1968)",pos:"noun (proper)",def:"The period of political liberalization in Czechoslovakia (January–August 1968) under Alexander Dubček, who introduced 'socialism with a human face': press freedom, multiparty politics, reduced censorship. <strong>Crushed by Soviet and Warsaw Pact invasion</strong> (August 20–21, 1968 — 500,000 troops). Ended the hope of reformed communism.",tip:"Prague Spring is the Eastern bloc's equivalent of May '68 — a rebellion against the existing order, but one with very different consequences. Know: Dubček, 'socialism with a human face,' August 1968 invasion, 500,000 troops, Brezhnev Doctrine invoked. Its significance: proved that communism could not be reformed from within — a conclusion that shaped reformers' thinking for two decades until Gorbachev tried again."},
  {cat:"Eastern Europe",term:"Brezhnev Doctrine",pos:"noun (proper)",def:"The Soviet policy (articulated after the 1968 Czechoslovak invasion) asserting that the USSR had the <strong>right and duty to intervene militarily</strong> in any socialist state where socialism was threatened. The justification for Soviet control of Eastern Europe until Gorbachev effectively reversed it in 1989.",tip:"The Brezhnev Doctrine is the legal-ideological foundation of Soviet Eastern European control. Know: 1968, right to intervene if socialism threatened, applies to all Warsaw Pact states, reversed by Gorbachev (1989 — 'Sinatra Doctrine'). Its reversal is what made the 1989 revolutions bloodless — Eastern European governments knew no Soviet tanks were coming, so they negotiated rather than repressed."},
  {cat:"Eastern Europe",term:"Solidarity (Solidarność)",pos:"noun (proper)",def:"The Polish <strong>independent trade union and social movement</strong> founded at the Gdańsk shipyard (1980) under Lech Wałęsa, with 10 million members. It negotiated the Gdańsk Accords (independent unions, free speech) with the communist government. Driven underground when General Jaruzelski imposed martial law (December 1981) but survived to lead Poland's democratic transition (1989).",tip:"Solidarity is the AP's paradigm for organized civil society resistance to communism. Know: Gdańsk shipyard, Wałęsa, 1980, 10 million members, Gdańsk Accords, martial law (1981), underground survival, 1989 electoral victory. The Catholic Church's support for Solidarity (Pope John Paul II was Polish) was crucial — it gave the movement institutional protection the communist state couldn't fully suppress."},
  {cat:"Eastern Europe",term:"Lech Wałęsa",pos:"noun (proper)",def:"Polish electrician and labor activist (1943–present) who led the <strong>Solidarity trade union</strong> movement at the Gdańsk shipyard from 1980. Won the Nobel Peace Prize (1983). Led Solidarity's underground survival during martial law. Became Poland's first democratically elected president (1990).",tip:"Wałęsa is Solidarity's human face — the working-class leader who challenged a communist state. Know: Gdańsk shipyard, Nobel Peace Prize (1983), president of Poland (1990). His significance: he represents how ordinary workers (not just intellectuals) challenged communism, and how the transition from communist rule to democracy could be led by people from below."},
  {cat:"Détente",term:"Détente",pos:"noun (French)",def:"The policy of <strong>reducing Cold War tensions</strong> through negotiation and recognition of spheres of influence (c. 1969–1979). Key agreements: SALT I (1972), Ostpolitik (1969–75), Helsinki Accords (1975). Ended by the Soviet invasion of Afghanistan (1979) and Reagan's confrontational approach (1981).",tip:"Détente = managed competition replacing confrontation. Know: SALT I (arms limits), Ostpolitik (Brandt, normalizing German-Eastern bloc relations), Helsinki Accords (borders + human rights). Its limits: the USSR and USA continued competing in proxy wars and the arms race even during détente. Its end: Soviet invasion of Afghanistan (1979) → Carter's grain embargo → Reagan's arms buildup → 'Second Cold War' before Gorbachev's reforms."},
  {cat:"Détente",term:"SALT I (1972)",pos:"noun (proper)",def:"The Strategic Arms Limitation Talks agreement between Nixon and Brezhnev (1972) placing <strong>limits on nuclear weapons delivery systems</strong> — ICBMs and submarine-launched ballistic missiles. Did not reduce existing arsenals but froze their growth. Accompanied by the Anti-Ballistic Missile Treaty (limiting missile defense systems).",tip:"SALT I is the AP's key arms control agreement. Know: 1972, Nixon + Brezhnev, limited nuclear delivery systems (not warheads), arms control rather than arms reduction. Its significance: the first major nuclear arms control agreement — proved the superpowers could negotiate limits even at the height of Cold War competition. SALT II (1979) was never ratified after the Soviet Afghanistan invasion."},
  {cat:"Détente",term:"Ostpolitik",pos:"noun (German)",def:"West German Chancellor Willy Brandt's 'Eastern Policy' (1969–1975): normalizing relations with East Germany and Eastern European states by acknowledging post-WWII territorial realities. Brandt's <strong>kneeling at the Warsaw Ghetto Memorial</strong> (1970) became a symbol of German historical reckoning. Won the Nobel Peace Prize (1971).",tip:"Ostpolitik is the AP's example of European-initiated détente — separate from the US-Soviet superpower dynamic. Know: Brandt, 1969–75, recognition of East Germany and Oder-Neisse line (Poland's western border), Warsaw kneeling (1970). The kneeling gesture is one of history's most powerful symbols of national contrition — compare to Japan's continued difficulties with similar acknowledgment of WWII atrocities."},
  {cat:"Détente",term:"Helsinki Accords (1975)",pos:"noun (proper)",def:"Agreements signed by 35 states at the Conference on Security and Cooperation in Europe. The USSR won recognition of existing borders; all signatories committed to respecting <strong>human rights and fundamental freedoms</strong>. Eastern European dissidents used the human rights provisions as legal standing to form monitoring groups (Charter 77, Solidarity).",tip:"The Helsinki human rights provisions are the Accords' most consequential element. Know: 1975, 35 states, borders + human rights, Charter 77 (Czechoslovakia) emerged from them. The AP key insight: the USSR signed for the border recognition and inadvertently handed dissidents an international legal weapon. Unintended consequences producing the opposite of what was intended."},
  {cat:"Social Movements",term:"Second-wave feminism",pos:"noun",def:"The feminist movement of the 1960s–70s challenging not just legal inequality but <strong>social and cultural inequality</strong>: workplace discrimination, the 'second shift' (domestic labor burden), reproductive rights (abortion, contraception), sexual harassment, and male dominance in politics and culture. Key figures: Simone de Beauvoir (<em>The Second Sex</em>), Betty Friedan (<em>The Feminine Mystique</em>), Gloria Steinem.",tip:"Second-wave feminism goes beyond first-wave (voting rights) to challenge everyday inequality. Know: de Beauvoir, Friedan, abortion rights, equal pay, the 'second shift.' Its achievements: abortion rights in France (1975), Britain (1967), Italy (1978); equal pay legislation; growing workforce participation. Its limits: wage gaps persisted; the 'second shift' continued; underrepresentation in leadership remained. The AP may ask about what changed and what continued."},
  {cat:"Social Movements",term:"Green movement",pos:"noun",def:"The environmental movement that emerged in the 1970s opposing industrial pollution, nuclear power, and the destruction of natural ecosystems. Developed from single-issue campaigns into organized <strong>Green political parties</strong> (Germany's Die Grünen, founded 1980 — first Green party to win parliamentary representation).",tip:"The Green movement is a 'post-materialist' politics — arguing that quality of life and environmental health matter more than economic growth. Know: Rachel Carson (Silent Spring, 1962), Earth Day (1970), Die Grünen (Germany, 1980). The Greens represented a new political axis (environment vs. growth) that cut across the traditional left-right spectrum, anticipating contemporary climate politics."},
  {cat:"Social Movements",term:"Anti-nuclear movement",pos:"noun",def:"Mass protest movements across Western Europe in the late 1970s–early 1980s opposing both nuclear weapons (NATO's deployment of cruise and Pershing missiles) and nuclear power (Chernobyl concerns, Three Mile Island 1979). Millions marched in London, Bonn, Amsterdam, and Rome.",tip:"The anti-nuclear movement is the largest mass protest movement in Western European history up to that point. Know: late 1970s–early 1980s, protests against NATO cruise/Pershing missiles, anti-nuclear power (Three Mile Island 1979). Its connection to the Green movement: both challenged the postwar growth and security consensus. The movement's eventual failure (NATO missiles were deployed) showed the limits of mass protest against determined governments."},
  {cat:"Economics",term:"Stagflation",pos:"noun",def:"The simultaneous occurrence of <strong>stagnation (high unemployment) and inflation</strong> — which Keynesian economics couldn't explain (its models said unemployment and inflation moved in opposite directions). Triggered by the 1973 oil crisis. Discredited Keynesian demand management and opened space for neoliberal alternatives (Thatcher, Reagan).",tip:"Stagflation is the economic concept that ended the postwar Keynesian consensus. Know: stagnation + inflation simultaneously, caused by 1973 oil shock, Keynesian model couldn't explain it. Its political consequence: opened space for Thatcher (1979) and Reagan (1981) to argue that Keynesian economics had failed and that supply-side economics (deregulation, tax cuts, union-busting) was the alternative."},
  {cat:"Economics",term:"Oil crisis (1973)",pos:"noun (proper)",def:"The Arab OPEC states' oil embargo against nations that supported Israel in the Yom Kippur War, causing oil prices to quadruple (October 1973). It triggered <strong>stagflation</strong> across Western economies, ended the postwar growth era, and accelerated the search for energy alternatives (nuclear power, North Sea oil, conservation).",tip:"The 1973 oil crisis is the economic turning point of the era. Know: Arab OPEC embargo, prices quadrupled, stagflation, end of postwar golden age. Its political consequences: weakened social democratic governments that had promised perpetual growth; strengthened neoliberal critics of Keynesianism; boosted nuclear power and energy independence as political priorities."},
  {cat:"Thought",term:"Postmodernism",pos:"noun",def:"Intellectual movement (c. 1960s–1990s) rejecting modernism's belief in objective truth, universal values, and rational progress. Argued all 'grand narratives' are power constructs. Key figures: <strong>Foucault</strong> (power/knowledge), <strong>Derrida</strong> (deconstruction), <strong>Lyotard</strong> ('incredulity toward metanarratives').",tip:"Postmodernism is the intellectual expression of disillusionment with Enlightenment certainties. Know: Foucault, Derrida, Lyotard, rejection of grand narratives and objective truth. Its cultural expression: pastiche, irony, self-reference in art and literature. Its political implications: can liberate (challenging dominant narratives) or paralyze (if no narrative is truer than another, how do you justify political action?)."},
  {cat:"Thought",term:"Michel Foucault",pos:"noun (proper)",def:"French philosopher and historian (1926–1984) who analyzed how <strong>knowledge and power are inseparable</strong> — dominant institutions (prisons, hospitals, schools) produce knowledge that reinforces their power. Works include <em>Discipline and Punish</em> (prison system as metaphor for modern social control) and <em>The History of Sexuality</em>.",tip:"Foucault is postmodernism's most politically influential thinker. Know: power/knowledge (they're inseparable), Discipline and Punish, The History of Sexuality. His significance: he showed how apparently neutral knowledge claims (medicine, criminology, psychiatry) always serve power interests. This framework influenced feminist theory, LGBTQ+ studies, postcolonial theory — all asking: whose knowledge claims dominate, and why?"},
  {cat:"Thought",term:"Charter 77",pos:"noun (proper)",def:"A Czechoslovak human rights manifesto (January 1977) signed by intellectuals, artists, and former Communist Party members, citing the Helsinki Accords' human rights provisions as the basis for demanding the communist government respect its citizens' rights. Led by Václav Havel. Became the organizational backbone of Czechoslovak dissent until 1989.",tip:"Charter 77 is the AP's key example of how the Helsinki Accords enabled Eastern European dissent. Know: 1977, Czechoslovakia, Václav Havel, cited Helsinki human rights provisions, backbone of Czech dissent. Havel went from Charter 77 signatory to first president of democratic Czechoslovakia (1989) — the arc of intellectual resistance becoming political leadership is AP-significant."},
  {cat:"Thought",term:"Václav Havel",pos:"noun (proper)",def:"Czech playwright and dissident (1936–2011) who signed Charter 77, was repeatedly imprisoned, and became the <strong>moral voice of Czechoslovak resistance</strong> to communism. His essay 'The Power of the Powerless' (1978) argued that individuals could resist totalitarianism by 'living in truth.' First president of democratic Czechoslovakia (1989).",tip:"Havel is the AP's paradigm for the intellectual dissident who becomes a democratic leader. Know: Charter 77, 'living in truth' ('Power of the Powerless'), repeated imprisonment, first democratic Czech president (1989). 'Living in truth' — refusing to participate in the regime's required performances of loyalty — is his key concept. It explains how individuals can resist totalitarianism without political organization: simply refusing to pretend."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
