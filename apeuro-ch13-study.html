<script>
const CONCEPTS = [
  // Second Industrial Revolution
  {cat:"Second Industrial Revolution",q:"What was the Second Industrial Revolution, and how did it differ from the first?",a:"The Second Industrial Revolution (c. 1870–1914) was characterized by <strong>new industries and technologies</strong>: steel (Bessemer process), chemicals (synthetic dyes, fertilizers, pharmaceuticals), electricity (Edison, Siemens), and petroleum (internal combustion engine). Where the first revolution was powered by steam and coal and centered on textiles, the second was more science-based, more geographically spread (Germany and the United States rivaled Britain), and produced a wider range of consumer goods. It created the infrastructure of modern life: electrical grids, telephones, streetcars.",tip:"First vs. Second Industrial Revolution is a key AP distinction. First: steam, coal, textiles, Britain dominant. Second: electricity, steel, chemicals, internal combustion, Germany + USA rivaling Britain. The shift from artisanal invention (Watt, Arkwright) to organized scientific research (corporate laboratories) is as important as the new products."},
  {cat:"Second Industrial Revolution",q:"How did new technologies create mass consumption and a consumer economy?",a:"The Second Industrial Revolution produced affordable goods at mass scale: <strong>department stores</strong> (Bon Marché in Paris) offered fixed prices and product variety; <strong>advertising</strong> created desire for new products; <strong>railways and steamships</strong> reduced food prices by integrating global markets (Argentine beef, American grain, Indian tea). Rising real wages for workers (at least in western Europe) enabled the purchase of consumer goods — bicycles, clocks, cheap cotton clothing. <strong>Consumerism</strong> as a cultural practice emerged.",tip:"The consumer economy is the social consequence of the Second Industrial Revolution. Know: department stores as temples of consumption (Bon Marché), advertising's role in creating desire, falling food prices from global trade, rising real wages enabling purchase. This connects to the 'standard of living debate' from Ch. 10 — by the 1880s, real wages were clearly rising in western Europe."},
  {cat:"Second Industrial Revolution",q:"What new industries and technologies defined the Second Industrial Revolution?",a:"Key innovations: <strong>Steel</strong> (Bessemer process, 1856 — cheap steel for railways, buildings, ships); <strong>Electricity</strong> (Edison's light bulb 1879, power stations; Siemens's electric streetcar); <strong>Chemicals</strong> (synthetic dyes, explosives, fertilizers, pharmaceuticals — German dominance); <strong>Internal combustion engine</strong> (Daimler, Benz — automobiles by 1880s); <strong>Telephone</strong> (Bell, 1876). Germany surpassed Britain in chemicals and electrical industries — Britain's industrial lead was fading.",tip:"Know the key technologies and who led each: steel (Bessemer, Britain), electricity (Edison/US, Siemens/Germany), chemicals (Germany), internal combustion (Germany). Germany's rise as an industrial power is AP-significant — it explains German economic confidence and imperial ambition going into Ch. 14."},

  // Mass Society
  {cat:"Mass Society",q:"What was 'mass society,' and what conditions produced it?",a:"Mass society refers to the <strong>emergence of large urban populations integrated by shared institutions</strong>: mass education (compulsory schooling spread literacy and national identity), mass media (cheap newspapers, penny press), mass politics (expanded voting rights created mass political parties), mass leisure (public parks, spectator sports, music halls), and mass consumption. It replaced the fragmented, local, oral culture of pre-industrial life with a national, print-based, commercially organized culture.",tip:"'Mass society' is the chapter's organizing concept. Know its components: mass education (literacy, national identity), mass media (cheap press), mass politics (broader suffrage), mass leisure (football, music halls, cycling), mass consumption (department stores). Together they mark the transition from local/elite culture to national/popular culture — an enormous social transformation."},
  {cat:"Mass Society",q:"How did European cities transform between 1871 and 1900, and what drove urban redesign?",a:"Industrial cities were redesigned for the mass age: <strong>Haussmann's renovation of Paris</strong> (wide boulevards, sewers, gas lighting) was the model — creating modern urban infrastructure while also enabling military control of crowds. London, Vienna, and other capitals followed with public parks, underground railways (London's Metropolitan Line, 1863), sewerage systems (Joseph Bazalgette's London sewers), and electric streetcars. Urban redesign served public health (cholera prevention), social order, and national prestige.",tip:"Haussmann's Paris renovation is the AP's paradigm for urban transformation. Know: wide boulevards (military + commercial), sewers (public health), Baron Haussmann (Napoleon III's prefect). The dual purpose — public health AND crowd control — is the key analytical point. Urban redesign was simultaneously progressive (preventing disease) and conservative (preventing revolution)."},
  {cat:"Mass Society",q:"How did the social structure of mass society differ from earlier class structures?",a:"Mass society had a more complex social structure than early industrial society. The <strong>middle class diversified</strong>: a 'lower middle class' of clerks, salespeople, and managers grew enormously, distinct from both the wealthy bourgeoisie and the working class. The <strong>working class improved</strong> materially (rising real wages) but remained politically and socially subordinate. The <strong>aristocracy</strong> lost economic ground but retained political influence, often marrying into the bourgeoisie. Social mobility increased but class remained fundamental.",tip:"The emergence of the lower middle class (white-collar workers) is AP-significant because it complicated the simple bourgeoisie/proletariat Marxist model. These clerks and salespeople aspired to middle-class respectability while earning wages — their ambiguous class position made them susceptible to nationalist and later fascist appeals. Know them as a new social category."},
  {cat:"Mass Society",q:"How did mass education and literacy transform European society?",a:"Compulsory primary education spread across Europe in the 1870s–1890s (Forster Education Act, Britain 1870; Jules Ferry's laws, France 1880s). By 1900, <strong>literacy rates exceeded 90%</strong> in most of western Europe. Mass literacy created audiences for cheap newspapers (penny press), popular novels, and political propaganda. It also served nationalist purposes — schools taught the national language and history, turning 'peasants into Frenchmen' (Eugen Weber's phrase for France's national integration).",tip:"Mass education is both an intellectual development (literacy, access to ideas) and a political tool (nationalism, social control). Know: compulsory education 1870s–80s, Jules Ferry (France), literacy and the penny press. The nationalist use of education — teaching the national language and history — is the cultural dimension of the nation-building from Ch. 12."},

  // Women & Gender
  {cat:"Women & Gender",q:"What was 'the woman question,' and how did it develop in the late 19th century?",a:"'The woman question' debated women's proper role in modern industrial society. <strong>Bourgeois ideology</strong> promoted the 'cult of domesticity' (woman as wife, mother, and moral guardian of the home — separate from the public male sphere). But industrialization created contradictions: women were needed as factory workers, teachers, nurses, and clerks. <strong>Feminist movements</strong> emerged demanding education, property rights, divorce reform, and (from the 1880s) suffrage. Working-class women had always worked; the debate was primarily about middle-class women's public roles.",tip:"'The woman question' is the AP's umbrella term for gender debates of the period. Know its contradictions: bourgeois ideology promoted domesticity but economic reality required women's work; feminist movements pushed back; working-class women never had the luxury of domesticity. The emergence of organized feminism (suffrage movements) is the political expression of this tension."},
  {cat:"Women & Gender",q:"What new employment opportunities did the Second Industrial Revolution create for women, and what were the limits?",a:"The Second Industrial Revolution created new 'respectable' employment for middle-class women: <strong>teaching</strong> (feminized as men sought better-paid industrial work), <strong>nursing</strong> (professionalized by Florence Nightingale), <strong>clerical work</strong> (typewriter + telephone created office jobs), and <strong>retail</strong> (department store clerks). These were low-paid, often dead-end positions and came with expectations of leaving work upon marriage. Working-class women continued in factories, domestic service, and sweated trades.",tip:"New women's employment is evidence of both progress and limits. Progress: more respectable public employment options. Limits: lower pay than men, expectation of leaving upon marriage, sex-segregated occupations. The typewriter literally created a new female occupation — know this as evidence of how technology changed gender and work simultaneously."},
  {cat:"Women & Gender",q:"What were the main demands and tactics of the early feminist/suffrage movement?",a:"First-wave feminism pursued: <strong>property rights</strong> (married women's property laws); <strong>education access</strong> (university admission — Girton College, Cambridge, 1869); <strong>divorce reform</strong>; and eventually <strong>women's suffrage</strong>. The International Council of Women (1888) coordinated across nations. In Britain, the <strong>suffragettes</strong> (Emmeline Pankhurst's Women's Social and Political Union, 1903 — though this is slightly after the chapter's period) escalated to militant tactics. Most countries didn't grant women's suffrage until after WWI.",tip:"First-wave feminism's demands and tactics are frequently AP-tested. Know: property rights → education → suffrage as the sequence of demands; legal reform before political. The British suffrage movement's militancy (suffragettes vs. suffragists) connects to Ch. 14's pre-WWI tensions. Most Western countries granted women's suffrage 1918–1920 as a reward for wartime service."},

  // Political Movements
  {cat:"Political Movements",q:"How did socialism evolve in the late 19th century, and what were the main divisions?",a:"By the 1880s–1890s, socialism split into competing strands: <strong>Revolutionary Marxism</strong> held that capitalism must be overthrown by revolution; <strong>Revisionism/democratic socialism</strong> (Eduard Bernstein, <em>Evolutionary Socialism</em>, 1899) argued that capitalism was gradually improving workers' conditions and that socialist goals could be achieved through parliamentary reform without revolution; <strong>Anarchism</strong> (Bakunin, Kropotkin) rejected all state authority and advocated direct action, including assassination ('propaganda of the deed'); <strong>Syndicalism</strong> advocated revolutionary industrial unions (general strike) to overthrow capitalism.",tip:"The socialist spectrum is AP-essential for this period. Know all four strands: revolutionary Marxism, revisionism (Bernstein — evolution not revolution), anarchism (no state, direct action), syndicalism (general strike). The revisionism debate is most analytically important: it split socialist parties between those who believed in working within the system and those who demanded revolution."},
  {cat:"Political Movements",q:"What were the major political parties and movements that emerged in western Europe?",a:"Mass politics produced organized parties: <strong>Social Democratic parties</strong> (German SPD, founded 1875 — the largest socialist party in the world by 1912); <strong>Liberal parties</strong> defending free trade, civil liberties, and moderate reform; <strong>Conservative parties</strong> defending monarchy, Church, and property; <strong>Catholic parties</strong> (Germany's Centre Party, Belgium's Catholic Party) mobilizing Catholic voters; and <strong>labor/trade union parties</strong>. Mass suffrage created the need for party organization, newspapers, and voter mobilization — the infrastructure of modern democratic politics.",tip:"The emergence of mass political parties is itself a social transformation as important as industrialization. Parties required organizations, newspapers, local chapters, and voter mobilization — creating new forms of political participation. The German SPD is the AP's paradigm: it was the world's largest socialist party, entirely legal, working within the parliamentary system — evidence for Bernstein's revisionism over Marxist revolution."},
  {cat:"Political Movements",q:"What was anarchism, and how did it manifest in the late 19th century?",a:"Anarchism (associated with Mikhail Bakunin and Peter Kropotkin) rejected all state authority as inherently oppressive and advocated a society of voluntary cooperation without government. Its extreme wing ('propaganda of the deed') used political assassination to destabilize governments — assassinations of Tsar Alexander II (1881), French President Carnot (1894), U.S. President McKinley (1901), and others. Anarchism was strongest in Russia, Spain, and Italy — countries where workers had little access to parliamentary reform.",tip:"Anarchism is the most extreme left-wing response to industrial capitalism. Know: Bakunin (theoretical anarchism), 'propaganda of the deed' (assassination), and why it was strongest in non-parliamentary states. The assassination of Tsar Alexander II (1881) is the most AP-relevant act — it led directly to Alexander III's repressive reaction and delayed Russian reform by a generation."},

  // National State Responses
  {cat:"National State Responses",q:"What was Bismarck's Kulturkampf, and why did it fail?",a:"Bismarck's 'culture struggle' (1871–1878) against the Catholic Church in Germany: he expelled Jesuits, required civil marriage, and asserted state control over Catholic education and clergy appointments. He aimed to subordinate the Church to the German state and undermine the Catholic Centre Party. It failed: Catholic resistance strengthened the Centre Party rather than weakening it; Pope Pius IX's intransigence made compromise impossible. Bismarck eventually abandoned the Kulturkampf to form an alliance with Catholics against the socialist threat.",tip:"The Kulturkampf shows the limits of Bismarckian state power: even the Iron Chancellor couldn't overcome organized Catholic resistance. Its failure also shows Bismarck's pragmatism — he abandoned it when it didn't work. Know: 1871–1878, anti-Catholic, ultimately failed, abandoned for alliance against socialists. It foreshadows the limits of state power against organized civil society."},
  {cat:"National State Responses",q:"What was the Anti-Socialist Law (1878), and what does it reveal about Bismarck's governing approach?",a:"After two assassination attempts on Kaiser Wilhelm I (neither by socialists), Bismarck pushed through the Anti-Socialist Law (1878), banning socialist meetings, newspapers, and organizations. It failed to destroy the SPD, which continued operating through trade unions and local elections. <strong>Simultaneously, Bismarck introduced state socialist reforms</strong> (1883–1889): health insurance, accident insurance, and old-age pension — the first welfare state legislation — to undercut socialist appeal by having the state provide what socialists promised.",tip:"Bismarck's combination of repression + welfare legislation is the paradigmatic 'carrot and stick' approach to the working class. Know: Anti-Socialist Law (1878, stick), social insurance laws (1883–1889, carrot). The welfare state legislation is arguably Bismarck's most lasting domestic legacy — it established the principle that the state is responsible for workers' welfare, which all modern welfare states trace to."},
  {cat:"National State Responses",q:"How did Britain's political system evolve toward greater democracy in the late 19th century?",a:"Britain extended voting rights progressively: the <strong>Reform Act of 1867</strong> (Disraeli) gave urban workers the vote; the <strong>Reform Act of 1884</strong> (Gladstone) extended it to rural workers — giving about 60% of adult males the vote. The <strong>secret ballot</strong> (1872) protected workers from employer pressure. <strong>Gladstone's Liberal ministries</strong> reformed education (1870), the army (competitive entry replacing purchase), and the civil service (merit over patronage). The <strong>Irish Question</strong> (Gladstone's Home Rule proposals, twice defeated) dominated late Victorian politics.",tip:"Britain's gradual democratization is the alternative to revolution — reform acts extend voting rights without overturning the system. Know: 1867 (urban workers), 1884 (rural workers), secret ballot 1872. Gladstone's reforms show the Liberal Party actively expanding democracy. The Irish Question is the unresolved problem — Home Rule defeated 1886 and 1893 — that will eventually produce violence (Easter Rising 1916)."},
  {cat:"National State Responses",q:"How did the French Third Republic stabilize and what were its key challenges?",a:"The Third Republic (established 1870 after Napoleon III's defeat) faced repeated crises: the Paris Commune (1871 — radical workers' government crushed by the army); anti-republican movements (Boulangism, 1886–1889 — General Boulanger nearly led a coup); the <strong>Dreyfus Affair</strong> (1894–1906 — Jewish army officer falsely convicted of treason, exposing antisemitism and anti-republican forces). Despite these, republicans consolidated power through compulsory secular education (Jules Ferry), separation of church and state, and mass political organization.",tip:"The Third Republic's survival despite constant crisis is the AP's example of how democratic republics can be resilient. Know: Paris Commune (1871), Boulanger crisis (1886–89), Dreyfus Affair (1894–1906). The Dreyfus Affair is the most AP-relevant — it exposed antisemitism, mobilized the left (Zola's J'Accuse) and right, and hardened the secular-clerical divide that defined French politics."},

  // Broader Themes
  {cat:"Broader Themes",q:"What is the significance of this period for understanding the origins of WWI?",a:"The period 1871–1894 created the conditions for WWI: <strong>German industrial and military power</strong> upset the European balance; <strong>mass nationalism</strong> (via mass education and media) made populations willing to fight for national causes; <strong>socialist and anarchist movements</strong> created fears of social revolution that made conservative elites prefer foreign war to domestic reform; <strong>mass armies</strong> (conscription, reserves) made war larger in scale; and the <strong>alliance systems</strong> Bismarck built were fragile enough to snap under pressure.",tip:"This is the synthesis card connecting Ch. 13 to Ch. 14. Mass society created mass war: mass nationalism provided the sentiment; mass armies provided the force; mass media spread propaganda. The social tensions of mass society (class conflict, feminist demands, ethnic nationalism) that couldn't be resolved domestically were ultimately channeled outward in 1914."},
  {cat:"Broader Themes",q:"How did the gap between western and eastern Europe widen during this period?",a:"Western Europe (Britain, France, Germany, Belgium) experienced the full transformation of mass society: rising wages, compulsory education, political democracy, social insurance, and consumer goods. <strong>Eastern Europe and Russia</strong> remained dominated by subsistence agriculture, serfdom's economic legacy (redemption payments in Russia), land hunger, periodic famines, and autocratic politics with no mass franchise. Mass emigration from eastern Europe (to western Europe and the Americas) reflected this gap — millions of Poles, Ukrainians, Jews, and Italians fled poverty and persecution.",tip:"East-West divergence is the great continuity thread of the course, from Ch. 1 (Black Death serfdom) through Ch. 8 (second serfdom) through Ch. 10 (delayed industrialization) to Ch. 13 (mass emigration). The gap between modernizing west and agricultural east explains the emigration patterns that transformed North America — and the political radicalism (anarchism, revolutionary socialism) that flourished where parliamentary reform was absent."}
];

const VOCAB = [
  {cat:"Second Industrial Revolution",term:"Second Industrial Revolution",pos:"noun",def:"The phase of industrialization (c. 1870–1914) characterized by <strong>steel, electricity, chemicals, and internal combustion</strong> — more science-based than the first, geographically spread beyond Britain to Germany and the USA, and producing a wider range of consumer goods. Led to mass production and mass consumption.",tip:"First vs. Second Industrial Revolution is a recurring AP distinction. Know: First = steam/coal/textiles/Britain; Second = steel/electricity/chemicals/Germany+USA. The shift from artisanal invention to corporate scientific research laboratories is the institutional change. Germany's rise in chemicals and electrical industries is the geopolitical consequence."},
  {cat:"Second Industrial Revolution",term:"Bessemer process",pos:"noun (proper)",def:"A method developed by Henry Bessemer (1856) for producing <strong>inexpensive steel</strong> by blowing air through molten pig iron to remove impurities. Dramatically reduced the cost of steel, enabling railways, iron-frame buildings, and ships to be built at scale.",tip:"The Bessemer process is to steel what the steam engine was to energy. Cheap steel = affordable railways, iron-frame skyscrapers, steel ships, and industrial machinery at scale. Know: Bessemer, 1856, cheap steel, foundation of second industrial revolution infrastructure."},
  {cat:"Second Industrial Revolution",term:"Electricity",pos:"noun",def:"The transformative energy source of the Second Industrial Revolution. Thomas Edison developed the first practical incandescent light bulb (1879) and electric power station (1882, New York). Werner Siemens built the first electric streetcar (Berlin, 1881). Electricity powered factories, lit cities, and enabled new communications (telegraph, telephone).",tip:"Electricity is the master technology of the Second Industrial Revolution, as steam was of the first. Know: Edison (light bulb 1879, power station 1882), Siemens (electric streetcar). Its applications — factory power, urban lighting, transportation — transformed daily life in ways as fundamental as steam had done a century earlier."},
  {cat:"Second Industrial Revolution",term:"Department store",pos:"noun",def:"A large retail establishment offering a wide variety of goods at <strong>fixed prices</strong> in specialized departments under one roof. The Bon Marché (Paris, 1850s–1870s) was the model. Department stores democratized consumption by making goods accessible to the middle class and created modern advertising and retail culture.",tip:"The department store is the institution of mass consumption. Know: Bon Marché (Paris) as the paradigm, fixed prices (replacing bargaining), wide variety, middle-class accessibility. It's the physical expression of the consumer revolution — a cathedral of capitalism, as contemporaries called it. Zola's novel Au Bonheur des Dames fictionalizes the Bon Marché."},
  {cat:"Mass Society",term:"Mass society",pos:"noun",def:"A social formation characterized by <strong>large urban populations integrated through shared institutions</strong>: compulsory education, mass media, mass politics, mass leisure, and mass consumption. Replaced fragmented local cultures with national, commercially organized culture. Emerged in western Europe c. 1871–1914.",tip:"Mass society is the chapter's organizing concept. Its key features: mass education (literacy), mass media (cheap press), mass politics (expanded suffrage), mass leisure (sports, music halls), mass consumption (department stores). Together they mark the transition from elite/local to popular/national culture."},
  {cat:"Mass Society",term:"Compulsory education",pos:"noun",def:"Government-mandated schooling for children, spreading across western Europe in the 1870s–1880s. Britain (Forster Act, 1870), France (Jules Ferry's laws, 1880s), and Germany all established universal primary education. By 1900, literacy exceeded 90% in most of western Europe. Schools taught national language and history, creating national identity.",tip:"Compulsory education simultaneously modernized and nationalized populations. Know: 1870s–80s, Forster Act (Britain), Jules Ferry (France), literacy + nationalism. The school as nation-builder ('turning peasants into Frenchmen') is the AP's most important interpretive frame for mass education. It also expanded the female teaching profession."},
  {cat:"Mass Society",term:"Penny press",pos:"noun",def:"Cheap, mass-produced newspapers sold for a penny, made possible by high-speed rotary printing presses, rising literacy, and advertising revenue. Created <strong>mass media</strong> for the first time — shared information, opinion, and entertainment reaching millions of ordinary people daily.",tip:"The penny press is the media revolution of the 19th century. Know: cheap, mass, advertising-supported, nationally distributed. Its consequences: shared national culture, political mobilization, propaganda capability (relevant for WWI), and sensationalism. Mass literacy + cheap printing = modern journalism — with all its power and dangers."},
  {cat:"Mass Society",term:"Cult of domesticity",pos:"noun",def:"The 19th-century bourgeois ideology prescribing that <strong>women's proper sphere is the home</strong> — as wife, mother, and moral guardian — while men occupy the public sphere of work, politics, and commerce. Also called the 'separate spheres' ideology. Idealized the middle-class household as a refuge from the competitive market.",tip:"The cult of domesticity was an ideology (prescriptive) not a description of reality. Working-class women always worked outside the home. Middle-class women were increasingly constrained by this ideology even as economic change drew them into clerical and teaching work. Know it as the cultural context that first-wave feminism was challenging."},
  {cat:"Mass Society",term:"First-wave feminism",pos:"noun",def:"The organized feminist movements of the 19th–early 20th century demanding women's legal equality, education access, property rights, and eventually political rights (suffrage). Distinguished from later feminist waves by its focus on formal legal equality rather than broader cultural change.",tip:"First-wave feminism's sequence: property rights → education → divorce reform → suffrage. Know this progression. The suffrage demand came last because it was most radical. Most Western countries granted women's suffrage 1918–1920 — after WWI demonstrated women's contribution to the war effort. Britain granted limited suffrage in 1918, full equality in 1928."},
  {cat:"Mass Society",term:"Suffragettes",pos:"noun (plural)",def:"Members of Emmeline Pankhurst's <strong>Women's Social and Political Union</strong> (WSPU, founded 1903) who used militant tactics to demand women's suffrage: chaining themselves to railings, breaking windows, hunger strikes when imprisoned. Distinguished from the more moderate 'suffragists' who pursued parliamentary means.",tip:"Suffragettes (militant) vs. suffragists (moderate) is a key distinction. Know: Pankhurst, WSPU, militant tactics, hunger strikes. The government's 'Cat and Mouse Act' (releasing hunger strikers before death, then re-arresting them) shows the brutal dynamic. WWI temporarily suspended the campaign — then women received the vote as partial recognition of their wartime service."},
  {cat:"Socialism",term:"Revisionism (democratic socialism)",pos:"noun",def:"Eduard Bernstein's argument (<em>Evolutionary Socialism</em>, 1899) that capitalism was <strong>gradually improving workers' conditions</strong> and that socialist goals could be achieved through parliamentary reform, trade unions, and electoral politics — without revolution. Also called 'evolutionary socialism.'",tip:"Revisionism vs. revolutionary Marxism is the defining split in 19th-century socialism. Bernstein said: capitalism is getting better, work within the system. Revolutionary Marxists (Luxemburg, Lenin) said: capitalism can't reform itself, revolution is necessary. The German SPD debated this intensely — its practical behavior was revisionist even while its official ideology remained revolutionary."},
  {cat:"Socialism",term:"Anarchism",pos:"noun",def:"The political philosophy rejecting <strong>all state authority</strong> as inherently oppressive, advocating a society of voluntary cooperation without government. Associated with Mikhail Bakunin and Peter Kropotkin. Its extreme wing used assassination ('propaganda of the deed') to destabilize states.",tip:"Anarchism is the most radical left-wing ideology. Know: Bakunin (anti-state, anti-Marx), Kropotkin (cooperative anarchism), 'propaganda of the deed' (political assassination). Strongest in countries without parliamentary traditions (Russia, Spain, Italy). The assassination of Alexander II (1881) is the most AP-relevant act."},
  {cat:"Socialism",term:"Syndicalism",pos:"noun",def:"A form of radical labor movement advocating the <strong>revolutionary general strike</strong> as the means to overthrow capitalism, replacing the state with industrial unions (syndicats) as the organizing units of society. Associated with Georges Sorel (<em>Reflections on Violence</em>, 1908). Strongest in France and Spain.",tip:"Syndicalism is the trade union version of anarchism — use the general strike rather than parliament or assassination to overthrow capitalism. Know: general strike as revolutionary weapon, industrial unions replacing the state, France/Spain. It influenced the labor movement and contributed to fears of working-class revolution that shaped elite politics before WWI."},
  {cat:"Socialism",term:"German Social Democratic Party (SPD)",pos:"noun (proper)",def:"The German socialist party founded in 1875, the <strong>world's largest socialist party</strong> by 1912 (receiving 34% of German votes). Officially Marxist but practically revisionist — it built trade unions, consumer cooperatives, and a mass organization working within the imperial system while nominally committed to revolution.",tip:"The SPD is the AP's paradigm for mass socialist politics. Know: founded 1875, largest socialist party globally, official Marxism vs. practical revisionism. Its co-existence with Bismarck's anti-socialist law shows both repression and resilience. The gap between its revolutionary rhetoric and parliamentary practice is exactly what Bernstein's revisionism tried to theorize."},
  {cat:"Germany",term:"Kulturkampf",pos:"noun (German)",def:"'Culture struggle' — Bismarck's campaign (1871–1878) against the Catholic Church in Germany: expelling Jesuits, requiring civil marriage, asserting state control over clergy appointments and education. Intended to subordinate the Church to the German state and weaken the Catholic Centre Party. Ultimately <strong>failed and was abandoned</strong>.",tip:"The Kulturkampf's failure is as important as its existence. It shows that even Bismarck's state power couldn't overcome organized religious civil society. His pragmatic abandonment (allying with Catholics against socialists) shows Realpolitik in domestic politics. Know: 1871–1878, anti-Catholic, failed, abandoned for anti-socialist alliance."},
  {cat:"Germany",term:"Bismarck's social insurance laws",pos:"noun (plural)",def:"Three laws creating <strong>Germany's (and the world's first) welfare state</strong>: health insurance (1883), accident insurance (1884), and old-age/disability pension (1889). Funded by employer and employee contributions. Intended to undercut socialist appeal by having the conservative state provide social security.",tip:"These laws are Bismarck's 'carrot' to accompany the 'stick' of the Anti-Socialist Law. Know: health (1883), accident (1884), old-age pension (1889) — in that order. They established the principle that the state is responsible for workers' welfare. Every modern welfare state traces conceptually to these laws. Bismarck's motive (defeating socialism) doesn't make them less significant."},
  {cat:"France",term:"Dreyfus Affair",pos:"noun (proper)",def:"The 1894 wrongful conviction of Captain Alfred Dreyfus (a Jewish French army officer) for treason based on forged evidence. His case revealed deep antisemitism in the French army and Catholic Church. Emile Zola's open letter <em>J'Accuse</em> (1898) exposed the cover-up. Dreyfus was exonerated in 1906. The affair polarized France between republicans/secularists (Dreyfusards) and conservatives/Catholics/antisemites (anti-Dreyfusards).",tip:"The Dreyfus Affair is the AP's key event for: antisemitism in late 19th-century Europe; the conflict between republican and reactionary forces in France; and Zola's role as public intellectual (J'Accuse is the model of the intellectual speaking truth to power). It also inspired Theodor Herzl to found Zionism — know this consequence."},
  {cat:"France",term:"Paris Commune (1871)",pos:"noun (proper)",def:"A radical workers' government that controlled Paris for two months (March–May 1871) after France's defeat in the Franco-Prussian War. The Commune was <strong>brutally crushed by the French army</strong> ('Bloody Week,' May 1871) — approximately 10,000 Communards killed. The most violent episode of class conflict in 19th-century European history.",tip:"The Paris Commune is the AP's most dramatic example of revolutionary class conflict in this period. Know: 1871, workers' government, crushed by army, ~10,000 killed. Marx celebrated it as the first workers' government; conservatives used it to justify repressing socialism. It defined French politics for a generation — republicans had to prove they weren't Communards; conservatives used the memory to justify repression."},
  {cat:"France",term:"Jules Ferry",pos:"noun (proper)",def:"French Republican politician (1832–1893) who as Prime Minister and Education Minister established <strong>compulsory, free, and secular primary education</strong> in France (1880s) — removing the Church from public schools. His 'Ferry Laws' created a secular republican school system that formed French national identity and weakened clerical influence.",tip:"Jules Ferry is the AP's key figure for French republican education policy. Know: compulsory, free, secular — the three adjectives. His school reform was simultaneously nationalist (creating French citizens) and anti-clerical (removing Church from schools). He also promoted French imperialism in Africa and Asia — connecting to Ch. 14."},
  {cat:"Society",term:"Emigration",pos:"noun",def:"The large-scale movement of people from Europe to the Americas and other destinations, peaking c. 1880–1914. Primarily from <strong>eastern and southern Europe</strong> (Poles, Ukrainians, Italians, Jews fleeing pogroms) seeking economic opportunity and escape from persecution. About 40 million Europeans emigrated 1850–1914.",tip:"Mass emigration is the human face of the east-west gap. Know: from eastern/southern Europe primarily, to Americas (US, Argentina, Brazil), c. 1880–1914 peak. It shows both the poverty/persecution of eastern Europe and the economic opportunity of the Americas. For the AP, it's evidence of the uneven distribution of industrialization's benefits."},
  {cat:"Society",term:"Mass leisure",pos:"noun",def:"The emergence of organized <strong>recreational activities for ordinary working people</strong> — spectator sports (football/soccer became a mass sport; cricket in England), music halls, cycling, bank holidays, seaside resorts, and public parks. Facilitated by reduced working hours, rising real wages, and railway access to leisure destinations.",tip:"Mass leisure is evidence of improving working-class conditions (rising wages, shorter hours). Know: football (soccer became a working-class mass sport in 1880s–90s), music halls, cycling craze, bank holidays. It also shows how capitalism incorporated the working class into consumer culture — channeling potential radicalism into organized leisure. Marx might have called it 'bread and circuses.'"},
  {cat:"Society",term:"Theodor Herzl",pos:"noun (proper)",def:"Austrian Jewish journalist (1860–1904) who, shocked by the Dreyfus Affair's antisemitism, concluded that Jews could never achieve equality in Europe and founded <strong>Zionism</strong> — the movement for a Jewish national homeland (in Palestine). His <em>Der Judenstaat</em> ('The Jewish State', 1896) articulated the program.",tip:"Herzl is the founder of political Zionism, and the Dreyfus Affair is the direct cause. Know: Herzl, Zionism, Der Judenstaat (1896), Jewish national homeland in Palestine. This is a case where a single event (Dreyfus) produced a world-historical consequence (Zionism → eventually Israel). Good evidence for how antisemitism in this period had long-term consequences."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
