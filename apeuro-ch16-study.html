<script>
const CONCEPTS = [
  // Postwar Instability
  {cat:"Postwar Instability",q:"What were the major problems facing Europe in the early 1920s, and how were they partially addressed?",a:"Postwar Europe faced: <strong>hyperinflation</strong> (Germany, 1923 — printing money to pay reparations destroyed savings and the middle class); <strong>political instability</strong> (failed coups, street violence, communist uprisings); <strong>territorial disputes</strong> (new borders cutting across ethnic lines); and <strong>security anxieties</strong> (France feared German resurgence). Partial solutions: the <strong>Dawes Plan</strong> (1924 — American loans to Germany allowed reparations payments, stabilizing German economy); the <strong>Locarno Treaties</strong> (1925 — Germany accepted western borders, admitted to League of Nations — the 'spirit of Locarno'); and the <strong>Kellogg-Briand Pact</strong> (1928 — outlawing war as policy).",tip:"The early 1920s problems and partial solutions follow a pattern the AP loves: crisis → attempted stabilization → fragile calm → new crisis (Depression). Know: hyperinflation (1923), Dawes Plan (1924), Locarno (1925), Kellogg-Briand (1928). These were genuine attempts at stability — but all depended on American economic engagement that evaporated in 1929."},
  {cat:"Postwar Instability",q:"What caused the Great Depression, how did it spread to Europe, and what were its political consequences?",a:"The American stock market crash (October 1929) triggered a global depression: <strong>U.S. banks called in loans to Germany</strong> (which had borrowed heavily under the Dawes Plan), collapsing the German financial system. American markets for European goods contracted. Unemployment soared: 6 million in Germany (1932), 3 million in Britain. Governments initially cut spending (austerity) making things worse. Political consequences: <strong>extremist parties gained support</strong> (Nazis in Germany, fascists elsewhere); democratic governments appeared helpless; welfare systems were overwhelmed.",tip:"The Depression's political consequences are the most AP-important aspect. Know: U.S. loans recalled → German financial collapse → unemployment surge → political radicalization → Nazi rise. The Depression didn't cause Nazism — it provided the crisis conditions that gave the Nazis mass electoral support they had previously lacked. Always connect economic collapse to political extremism."},

  // Fascism
  {cat:"Fascism",q:"What is fascism, and what are its defining characteristics?",a:"Fascism is a right-wing <strong>totalitarian ideology</strong> that combines: extreme nationalism (the nation as supreme value); rejection of liberalism and Marxism; glorification of the state and its leader; militarism and violence as positive forces; anti-intellectualism; and mass mobilization through propaganda and symbols. Unlike conservatism (which preserves tradition), fascism is revolutionary — it seeks to transform society by mobilizing mass emotion. Unlike communism (which is internationalist and class-based), fascism is intensely nationalist and cross-class.",tip:"Fascism's definition is AP-essential. Know its key characteristics and how it differs from: conservatism (fascism is revolutionary, not just preserving); communism (fascism is nationalist, not internationalist); liberalism (fascism rejects individual rights and parliamentary government). The AP frequently asks you to compare totalitarian systems — know fascism's defining features against which to compare Stalinism."},
  {cat:"Fascism",q:"How did Mussolini take power in Italy, and what kind of regime did he build?",a:"Benito Mussolini founded the Fascist Party (1919) appealing to WWI veterans, nationalists, and those fearing communist revolution. His blackshirt squads violently suppressed socialist organizations. The <strong>March on Rome</strong> (October 1922) threatened a coup; King Victor Emmanuel III invited Mussolini to form a government. Mussolini's regime: eliminated political opposition, controlled the press, established the Lateran Accords with the Catholic Church (1929), promoted economic nationalism (<em>autarky</em>), and built a cult of personality ('Il Duce'). Italy was less totalitarian than Nazi Germany — the Church, monarchy, and military retained some independence.",tip:"Italy's fascism is the model — and the contrast. Know: March on Rome (1922), blackshirts, Lateran Accords (1929), autarky, Il Duce. Key distinction: Mussolini's Italy was authoritarian but not fully totalitarian — the Church, monarchy, and military limited his power. This contrasts with Hitler's more complete control. The AP frequently asks you to compare fascism in Italy and Germany."},
  {cat:"Fascism",q:"How did Hitler come to power in Germany, and what were the structural conditions that enabled Nazism?",a:"Hitler's rise required specific conditions: <strong>Weimar Republic's structural weaknesses</strong> (proportional representation + lack of democratic culture + war guilt resentment); <strong>Great Depression's economic devastation</strong> (6 million unemployed by 1932 — Nazis' electoral support rose from 2.6% in 1928 to 37.4% in July 1932); <strong>elite calculation</strong> (conservatives believed they could use Hitler and control him); and <strong>Hitler's appointment</strong> as Chancellor by President Hindenburg (January 30, 1933). Hitler then used the <strong>Reichstag Fire</strong> (February 1933) and the <strong>Enabling Act</strong> (March 1933) to establish legal dictatorship.",tip:"Hitler's rise has three components: structural conditions (Weimar, Depression), mass electoral support (Depression provided), and elite miscalculation (Hindenburg/conservatives thought they could control him). Know: January 30, 1933 (appointed Chancellor), Reichstag Fire (February 27 — blamed on communists), Enabling Act (March 23 — gave Hitler decree powers). The AP expects you to explain why Nazism succeeded, not just describe it."},
  {cat:"Fascism",q:"What were the key elements of Nazi ideology, and how did Hitler implement it?",a:"Nazi ideology combined: <strong>extreme racism</strong> (Aryan racial superiority, antisemitism as the core worldview); <strong>Lebensraum</strong> ('living space' — expansion eastward at Slavic peoples' expense); <strong>anti-Marxism</strong>; <strong>ultranationalism</strong>; and the <strong>Führerprinzip</strong> (leadership principle — absolute obedience to Hitler). Implementation: Nuremberg Laws (1935 — stripped Jews of citizenship); Kristallnacht (November 1938 — organized pogrom); Hitler Youth and League of German Girls (indoctrinating children); Gestapo (secret police) and concentration camps; and rearmament in violation of Versailles.",tip:"Nazi ideology's core is racial antisemitism — this distinguishes it from Italian fascism (which was not originally antisemitic). Know: Aryan race ideology, Lebensraum, Führerprinzip, Nuremberg Laws (1935), Kristallnacht (1938). The Holocaust was the ultimate implementation of Nazi racial ideology — its roots were in the ideology from the beginning, not an improvised wartime decision."},
  {cat:"Fascism",q:"What is totalitarianism, and how did Nazi Germany and Fascist Italy exemplify or fall short of it?",a:"Totalitarianism is a political system in which the state seeks <strong>total control over all aspects of life</strong> — political, economic, social, cultural, and private — through propaganda, terror, a single party, and mass mobilization. <strong>Nazi Germany</strong> came closer to true totalitarianism: the SS and Gestapo terrorized society; the Hitler Youth mobilized the young; racial ideology permeated every institution; and the state eliminated alternative loyalties (Church was pressured, though not eliminated). <strong>Fascist Italy</strong> was more authoritarian than truly totalitarian — the Church (Lateran Accords), monarchy, and military retained real independence.",tip:"Totalitarianism is the chapter's most analytically complex concept. Know: the definition (total state control over all aspects of life), what makes Nazi Germany more totalitarian than Fascist Italy (SS/Gestapo vs. retained Church/monarchy). Compare with Stalinist USSR — all three share: single party, propaganda, terror, suppression of dissent, but differ in ideology (nationalist/racial vs. communist) and degree of control."},

  // Stalinist USSR
  {cat:"Stalinist USSR",q:"How did Stalin consolidate power in the Soviet Union after Lenin's death, and what were the instruments of his rule?",a:"After Lenin's death (1924), Stalin outmaneuvered rivals (Trotsky, Zinoviev, Bukharin) through his control of the party apparatus. By 1929 he had achieved dominance. His rule rested on: <strong>forced collectivization</strong> (1929–1933 — eliminating the kulak class, causing ~5–7 million deaths in the Ukrainian famine/Holodomor); <strong>Five-Year Plans</strong> (rapid industrialization at enormous human cost); the <strong>Great Purge/Terror</strong> (1936–1938 — show trials and execution of ~750,000 party members, military officers, and ordinary citizens, millions more to the Gulag); and the <strong>NKVD</strong> (secret police, enforcing terror).",tip:"Stalin's consolidation follows a sequence: party apparatus control → defeat of rivals → collectivization (1929) → Five-Year Plans → Great Purge (1936–38). Know all these phases and their human costs. The Ukrainian famine (Holodomor) killed 3–5 million Ukrainians — a deliberate policy consequence. The Great Purge decapitated the Red Army (killing most senior officers) — a factor in early WWII Soviet defeats."},
  {cat:"Stalinist USSR",q:"What was forced collectivization, and what were its consequences?",a:"Stalin abolished private farming (New Economic Policy's concession) and forced peasants into collective farms (<em>kolkhozy</em>) controlled by the state. <strong>Kulaks</strong> (wealthier peasants) were 'liquidated as a class' — arrested, shot, or deported to Siberia. Peasant resistance led to reduced grain output; the state requisitioned grain anyway, causing massive famine (1932–1933). The <strong>Ukrainian famine (Holodomor)</strong> killed an estimated 3–5 million Ukrainians — now recognized by many countries as a genocide. Agricultural production collapsed and only recovered by the late 1930s.",tip:"Forced collectivization is one of the 20th century's greatest atrocities. Know: 1929–1933, kolkhozy (collective farms), kulak elimination, Holodomor (Ukrainian famine, 3–5 million dead). Its purpose: eliminate peasant independence, collectivize agriculture under state control, and extract resources to fund industrialization. The human cost was catastrophic; the agricultural results were disastrous."},
  {cat:"Stalinist USSR",q:"What was the Great Purge, and what were its political and military consequences?",a:"The Great Purge (1936–1938) was Stalin's campaign of mass political repression: <strong>show trials</strong> of old Bolsheviks (Zinoviev, Bukharin) who confessed to impossible crimes under torture and were executed; purge of the Red Army officer corps (three of five marshals, ~35,000 officers killed or imprisoned); and mass arrests of ordinary citizens (~750,000 executed, millions to the Gulag). The purge eliminated all real or potential rivals to Stalin's absolute power.",tip:"The Great Purge's military consequence is AP-critical: the purge of the Red Army officer corps decimated Soviet military leadership, explaining the catastrophic Soviet defeats in the early phase of WWI (1941–1942). Hitler calculated the purge had fatally weakened the USSR — he was nearly right. Know: show trials (old Bolsheviks), military purge (35,000 officers), ~750,000 executed."},

  // Democratic Responses
  {cat:"Democratic Responses",q:"How did Britain and France respond to the Depression and the rise of fascism, and why did they pursue appeasement?",a:"Britain and France responded to the Depression with inadequate austerity policies that prolonged suffering. Facing the rise of Germany under Hitler, both pursued <strong>appeasement</strong> — making concessions to satisfy Hitler's demands, hoping to preserve peace. Reasons: genuine fear of another catastrophic war; belief that Germany's Versailles grievances were legitimate; hope that a rearmed Germany would block Soviet expansion; and domestic political pressure (pacifist public opinion). The Munich Agreement (September 1938 — giving Hitler the Sudetenland) was appeasement's high point and its fatal failure.",tip:"Appeasement is AP-essential as both policy and analytical concept. Know: Munich Agreement (1938), Chamberlain ('peace for our time'), Sudetenland given to Hitler. The AP usually asks: was appeasement rational? Arguments for: war-weary populations, legitimate Versailles grievances, buying time to rearm. Arguments against: emboldened Hitler, showed Western weakness. The historical judgment: it failed, but it was not simply cowardice."},
  {cat:"Democratic Responses",q:"What was the Popular Front, and what does it reveal about left-wing politics in the 1930s?",a:"Popular Fronts were <strong>electoral alliances of communists, socialists, and liberals</strong> against fascism, organized after the Soviet Comintern shifted strategy (1935) from attacking social democrats ('social fascists') to uniting with them. Successful in France (1936 — Léon Blum's government enacted labor reforms: 40-hour week, paid holidays) and Spain (winning 1936 elections — triggering Franco's nationalist revolt and the Spanish Civil War). Popular Fronts showed that the left could unite against fascism — but were often undermined by internal divisions and Soviet manipulation.",tip:"The Popular Front strategy is important for understanding 1930s left-wing politics. Know: communist-socialist-liberal alliance against fascism, France (Blum, labor reforms 1936), Spain (triggered Civil War). The Spanish Civil War (1936–1939) is an AP-relevant event: Germany and Italy supported Franco; Soviet Union supported the Republic; Western democracies did not intervene (Non-Intervention Agreement) — foreshadowing WWII appeasement dynamics."},

  // Culture & Thought
  {cat:"Culture & Thought",q:"What was the cultural atmosphere of the interwar period, and who were the 'Lost Generation'?",a:"The 'Lost Generation' described writers and intellectuals who came of age during WWI and were permanently marked by its disillusionment. <strong>Ernest Hemingway</strong> (<em>A Farewell to Arms</em>), <strong>Erich Maria Remarque</strong> (<em>All Quiet on the Western Front</em>), and <strong>F. Scott Fitzgerald</strong> expressed alienation, disenchantment with pre-war ideals, and the futility of traditional values. The interwar years saw: Dadaism (nihilistic art rejecting all meaning), Surrealism (dreamlike art exploring the unconscious — Dalí, Magritte), and Existentialism (Sartre — humans create their own meaning in an absurd universe).",tip:"Lost Generation + interwar cultural movements are AP-testable as evidence of how WWI transformed culture. Know: Lost Generation (Hemingway, Remarque), Dadaism (nihilism), Surrealism (unconscious/dreamlike — Dalí), Existentialism (Sartre). The connection to Freud's unconscious and the rejection of rational certainty runs through all of these — the war confirmed that reason and progress were insufficient guides."},
  {cat:"Culture & Thought",q:"What was Surrealism, and how did it reflect the interwar cultural moment?",a:"Surrealism (founded by André Breton, 1924) sought to access the <strong>unconscious mind</strong> through dreamlike imagery, irrational juxtapositions, and automatic writing — bypassing rational control. Key artists: <strong>Salvador Dalí</strong> (<em>The Persistence of Memory</em> — melting clocks questioning rational time); <strong>René Magritte</strong> (<em>The Treachery of Images</em> — a pipe labeled 'This is not a pipe'). Surrealism drew explicitly on Freud's unconscious and challenged the assumption that reality is what reason perceives.",tip:"Surrealism is the art movement most directly connected to Freud and the interwar crisis of reason. Know: Breton (founder), Dalí and Magritte (key artists), unconscious/dreamlike imagery, irrational juxtaposition. It's the visual counterpart to stream-of-consciousness literature and the philosophical assertion that rational surface reality is not the deepest truth."},
  {cat:"Culture & Thought",q:"How did mass culture (radio, cinema) shape interwar society, and how was it used by totalitarian regimes?",a:"Radio and cinema became mass cultural forces in the 1920s–1930s, creating shared cultural experiences across class and regional divides. <strong>Totalitarian regimes recognized their propaganda potential</strong>: Nazi Germany's Joseph Goebbels controlled all media (Volksempfänger — cheap radios distributed to every household); Leni Riefenstahl's <em>Triumph of the Will</em> (1935) glorified the Nazi movement cinematically; Stalin's socialist realist films and art promoted communist ideals. Democratic societies also used radio (Roosevelt's 'fireside chats') but without compulsion. Mass media's ability to reach millions simultaneously was unprecedented and transformative for political mobilization.",tip:"Mass media's role in totalitarianism is an AP favorite. Know: Goebbels (Nazi propaganda minister), Volksempfänger (Nazi radios), Riefenstahl (Triumph of the Will), socialist realism (Soviet art policy). The key analytical point: mass media created the infrastructure for mass political mobilization that earlier authoritarian regimes lacked. This is what makes 20th-century totalitarianism different from pre-modern tyranny."},

  // Broader Themes
  {cat:"Broader Themes",q:"What distinguishes totalitarianism from traditional authoritarianism, and why did both emerge in the interwar period?",a:"Traditional <strong>authoritarianism</strong> (conservative dictatorships) limits political opposition but doesn't seek total control of society — the Church, family, economy may retain autonomy. <strong>Totalitarianism</strong> seeks control over all aspects of life through mass mobilization, propaganda, terror, and ideology. It emerged in the interwar period because: mass society (literacy, media, mass organizations) made total mobilization possible for the first time; the WWI experience showed how effectively states could mobilize populations; and the Depression discredited liberal democracy, creating space for radical alternatives.",tip:"Authoritarianism vs. totalitarianism is a sophisticated AP distinction. Know: authoritarianism limits politics but leaves society some autonomy; totalitarianism seeks to control everything. Interwar conditions that enabled totalitarianism: mass literacy, radio, mass organizations, WWI precedent for state mobilization, Depression discrediting democracy. This is why 20th-century totalitarianism is historically novel — pre-mass-society regimes lacked the tools for true total control."},
  {cat:"Broader Themes",q:"How does the interwar period represent a 'twenty-year armistice' (Foch's phrase) rather than a genuine peace?",a:"French Marshal Foch reportedly said of Versailles: 'This is not a peace. It is an armistice for twenty years.' He was almost exactly right (war began 20 years and 65 days later). The interwar period failed to create stable peace because: Versailles left Germany resentful but not permanently weakened; the League of Nations lacked enforcement power; the Depression destabilized democracies; and appeasement emboldened Hitler. The period should be understood not as an era of peace between two wars but as an <strong>unstable interlude in which the unresolved problems of 1919 incubated toward a second catastrophe</strong>.",tip:"Foch's 'twenty-year armistice' is the AP's big-picture interpretive frame for the interwar period. Everything in Ch. 16 should be understood as building toward WWII: the Depression, the rise of fascism, appeasement, the failures of collective security. The interwar period is not a separate era but the second act of a 1914–1945 European crisis. Know this framing for synthesis questions."}
];

const VOCAB = [
  {cat:"Economics",term:"Great Depression",pos:"noun (proper)",def:"The global economic crisis triggered by the <strong>American stock market crash (October 1929)</strong>: U.S. banks recalled loans to Europe, international trade collapsed, unemployment soared (6 million in Germany, 3 million in Britain). Governments' initial austerity responses deepened the crisis. Politically: discredited liberal democracy, enabled extremist parties, and contributed directly to Hitler's rise.",tip:"The Depression's political consequences are more AP-important than its economic mechanics. Know: 1929 crash → US loans recalled → European financial collapse → unemployment → political radicalization. In Germany: 6 million unemployed by 1932 + Weimar's political dysfunction = conditions for Nazi electoral breakthrough. Always connect the Depression to fascism's rise."},
  {cat:"Economics",term:"Dawes Plan (1924)",pos:"noun (proper)",def:"An American-brokered agreement (named after Charles Dawes) restructuring Germany's reparations payments and providing <strong>American loans to Germany</strong>. Stabilized the German economy, enabling the 'golden years' of 1924–1929. But it created a cycle: American loans → Germany pays reparations → Britain/France repay war debts to USA. When American loans stopped after 1929, the cycle collapsed.",tip:"The Dawes Plan created the fragile stability of the late 1920s — but also created a cycle of dependency on American capital. Know: 1924, American loans to Germany, enabled reparations payments. Its failure mode: the cycle collapsed when the Depression caused American banks to recall loans. The 'golden years' (1924–1929) were built on borrowed money and borrowed time."},
  {cat:"Economics",term:"Hyperinflation (Germany, 1923)",pos:"noun",def:"The catastrophic inflation in Germany (1923) when the government printed money to pay reparations and war debts. At its peak, prices doubled every few days — a loaf of bread cost billions of marks. The <strong>middle class's savings were wiped out</strong>, creating lasting resentment of the Weimar Republic and making the middle class vulnerable to Nazi appeal.",tip:"German hyperinflation (1923) is the first economic catastrophe of the interwar period (the Depression was the second). Know: printing money → worthless currency → middle class savings destroyed. The psychological impact on the German middle class was lasting — they became the most reliable Nazi voters in 1930–1932, having been economically ruined twice (hyperinflation, then Depression)."},
  {cat:"Economics",term:"Locarno Treaties (1925)",pos:"noun (proper)",def:"A series of agreements in which Germany accepted its <strong>western borders</strong> (with France and Belgium) as permanent, France and Britain guaranteed these borders, and Germany was admitted to the League of Nations. Created the 'spirit of Locarno' — a moment of European optimism. But Germany did NOT accept its eastern borders as permanent — a significant omission.",tip:"Locarno's significance and its fatal limit: Germany accepted western borders (Alsace-Lorraine stays French) but not eastern borders (Poland Corridor remained contested). Know: 1925, western borders accepted, League admission. The eastern border omission means Hitler's later eastward expansion (reoccupying Rhineland, annexing Austria, demanding Sudetenland) didn't technically violate Locarno — a legal loophole with catastrophic consequences."},
  {cat:"Fascism",term:"Fascism",pos:"noun",def:"A right-wing <strong>totalitarian ideology</strong> combining extreme nationalism, rejection of liberalism and Marxism, glorification of the state and leader, militarism, and mass mobilization. Revolutionary (seeks to transform society) rather than conservative (which preserves it). Nationalist rather than internationalist (unlike communism).",tip:"Know fascism's definition and how it differs from: conservatism (fascism is revolutionary), communism (fascism is nationalist, not internationalist), liberalism (fascism rejects individual rights and parliamentary government). The AP frequently asks you to compare totalitarian systems — fascism's defining characteristic is its fusion of extreme nationalism with totalitarian state power."},
  {cat:"Fascism",term:"Benito Mussolini",pos:"noun (proper)",def:"Italian fascist leader (1883–1945), founder of the Fascist Party and Prime Minister/dictator ('Il Duce') from 1922. Came to power via the <strong>March on Rome</strong> (1922); established one-party state; made peace with the Catholic Church (Lateran Accords, 1929); promoted economic nationalism (<em>autarky</em>). Less totalitarian than Hitler — Church, monarchy, and military retained some independence.",tip:"Mussolini is fascism's prototype — Hitler studied him. Know: March on Rome (1922), Il Duce, Lateran Accords (1929), autarky. Key contrast with Hitler: Mussolini's Italy was authoritarian but not fully totalitarian — institutions retained independence. His alliance with Hitler (Rome-Berlin Axis, 1936) proved fatal — he depended on German military power and was eventually killed by Italian partisans (1945)."},
  {cat:"Fascism",term:"March on Rome (1922)",pos:"noun (proper)",def:"The threat of a fascist coup (October 1922) in which Mussolini's blackshirt militia marched on Rome. King Victor Emmanuel III, fearing civil war, <strong>invited Mussolini to form a government</strong> rather than ordering the army to disperse the marchers. Mussolini came to power legally — then dismantled the legal system from within.",tip:"The March on Rome shows how fascism came to power through a combination of threatened force and elite miscalculation — the king thought he could use Mussolini. This pattern repeats in Germany: conservatives thought they could use Hitler. In both cases, the fascists used their initial legal position to destroy the institutions that had given it to them. Know: 1922, blackshirts, king invited Mussolini."},
  {cat:"Fascism",term:"Adolf Hitler",pos:"noun (proper)",def:"Austrian-born German Nazi leader (1889–1945) who rose from failed artist to Chancellor (January 30, 1933) and Führer (1934). His ideology combined extreme racial antisemitism, Lebensraum (eastward expansion), anti-Marxism, and ultranationalism. He rebuilt the German military, began the Holocaust, and launched WWII — resulting in his suicide in 1945 as Soviet forces took Berlin.",tip:"Hitler is the most consequential figure of the 20th century for AP purposes. Know his rise (Depression + Weimar weakness + elite miscalculation), key dates (Chancellor January 30, 1933; Führer August 1934 after Hindenburg's death), ideology (racial antisemitism, Lebensraum, Führerprinzip), and key laws (Nuremberg Laws 1935). His appointment by Hindenburg — not an election — is the legal mechanism of his rise."},
  {cat:"Fascism",term:"Enabling Act (1933)",pos:"noun (proper)",def:"The legislation passed by the German Reichstag (March 23, 1933) giving Hitler the power to <strong>rule by decree for four years</strong> without Reichstag approval, effectively ending the Weimar Republic. Passed after the Reichstag Fire gave Hitler pretext to arrest Communist MPs, eliminating enough opposition to achieve the two-thirds majority required.",tip:"The Enabling Act is how Hitler established legal dictatorship. Know: March 23, 1933, rule by decree, Reichstag Fire pretext (February 27), Communist MPs arrested → two-thirds majority achieved. It shows Hitler's method: using legal mechanisms to destroy legality. His claim that he came to power legally is technically true — he then used that legal power to establish dictatorship."},
  {cat:"Fascism",term:"Nuremberg Laws (1935)",pos:"noun (proper)",def:"German racial laws stripping Jews of German citizenship, prohibiting marriage or sexual relations between Jews and non-Jews, and defining 'Jewishness' by grandparentage. The legal foundation for the escalating persecution that culminated in the Holocaust.",tip:"The Nuremberg Laws are the legal mechanism of Nazi racial antisemitism. Know: 1935, stripped citizenship, prohibited intermarriage, defined Jewishness by ancestry. They show how the Holocaust was built step by step through legal-administrative measures before mass murder began. The AP expects you to trace the escalation: Nuremberg Laws (1935) → Kristallnacht (1938) → genocide (1941–45)."},
  {cat:"Fascism",term:"Kristallnacht (1938)",pos:"noun (proper)",def:"The 'Night of Broken Glass' (November 9–10, 1938): organized <strong>Nazi pogrom</strong> in which SA and SS members attacked Jewish businesses, homes, and synagogues across Germany and Austria. ~100 Jews killed, ~30,000 arrested and sent to concentration camps. Named for the shattered glass covering streets.",tip:"Kristallnacht marks the escalation from legal discrimination to organized violence against Jews. Know: November 9–10, 1938, organized (not spontaneous) pogrom, ~30,000 arrested. Its significance: it was the first mass organized violence — a step toward genocide. International reaction was muted, which taught the Nazis that the world would not intervene. Know the escalation sequence: Nuremberg Laws → Kristallnacht → Holocaust."},
  {cat:"Fascism",term:"Lebensraum",pos:"noun (German)",def:"'Living space' — Hitler's concept that the German people needed to expand eastward into <strong>Slavic territories</strong> (Poland, Ukraine, Russia) to secure agricultural land and resources. The conquered Slavic peoples would be enslaved or eliminated to make room for German settlement. A core Nazi ideological commitment that drove WWII's eastward character.",tip:"Lebensraum explains the specific direction and character of Nazi expansion. Know: eastward expansion, Slavic peoples' territory, agricultural land for German settlement. It explains why the war in the East was uniquely brutal — it was not just conquest but intended permanent colonization and population replacement. Connect to WWII: the invasion of Poland (1939) and the USSR (1941) were direct implementations of Lebensraum."},
  {cat:"Stalinist USSR",term:"Five-Year Plans",pos:"noun (plural)",def:"Stalin's programs of rapid <strong>state-directed industrialization</strong> (First Plan: 1928–1932; Second: 1933–1937). The state set production targets for every factory and farm; workers were mobilized like soldiers; heavy industry (steel, coal, machinery) was prioritized over consumer goods. The USSR industrialized at enormous speed — and enormous human cost (labor camp workers, dangerous conditions, food deprivation).",tip:"The Five-Year Plans are Stalin's economic counterpart to collectivization. Know: state-directed, heavy industry priority, rapid pace, enormous human cost. Their significance: the USSR industrialized in a decade what took Britain a century, making it capable of producing the weapons that eventually defeated Nazi Germany. But the human cost was staggering. The industrial base built in the 1930s won WWII in the 1940s."},
  {cat:"Stalinist USSR",term:"Gulag",pos:"noun",def:"The system of Soviet <strong>forced labor camps</strong> (Главное управление лагерей — Main Camp Administration) spread across the USSR, particularly Siberia and Central Asia. Millions were sent to the Gulag for political crimes, real or fabricated. Deaths from overwork, cold, malnutrition, and execution numbered in the millions.",tip:"The Gulag is the Soviet equivalent of Nazi concentration camps — though primarily for forced labor rather than systematic extermination. Know: forced labor, millions imprisoned, political crimes (real or fabricated), Siberia. Alexander Solzhenitsyn's The Gulag Archipelago (1973) documented the system. The Gulag was not just punishment — it was economic: Gulag labor built canals, railways, and cities."},
  {cat:"Stalinist USSR",term:"Great Purge (1936–1938)",pos:"noun (proper)",def:"Stalin's mass political repression: <strong>show trials</strong> of old Bolsheviks (Zinoviev, Bukharin — confessed under torture, then executed); purge of the Red Army (most senior officers killed or imprisoned); and mass arrests (~750,000 executed, millions to the Gulag). Eliminated all real or potential rivals to Stalin's absolute power.",tip:"The Great Purge's military consequence is AP-critical: decimating the Red Army's officer corps explains catastrophic Soviet defeats in 1941–42 (Operation Barbarossa). Hitler gambled that the purge had permanently weakened the USSR — nearly correct. Know: show trials (old Bolsheviks), military purge (35,000+ officers), ~750,000 executed. The Purge shows Stalinist totalitarianism at its most brutal and irrational."},
  {cat:"Stalinist USSR",term:"Socialist realism",pos:"noun",def:"The official Soviet artistic doctrine mandating that art, literature, and music must <strong>depict the struggle toward communist ideals</strong> in an optimistic, realistic style accessible to workers. Art that was abstract, pessimistic, or 'formalist' was suppressed. Artists who refused faced persecution. Created a state-controlled cultural sphere that eliminated artistic freedom.",tip:"Socialist realism is the Soviet equivalent of Nazi propaganda art — both demanded that art serve the state's ideological needs. Know: optimistic, realistic style, depicts communist struggle, abstract art suppressed. Its significance: the state's control of culture is the cultural dimension of totalitarianism. Compare with Nazi degenerate art (Entartete Kunst) — both regimes attacked modernist art as decadent."},
  {cat:"Diplomacy",term:"Appeasement",pos:"noun",def:"The policy (primarily British, under Neville Chamberlain) of making <strong>concessions to Hitler's demands</strong> to avoid war, based on the belief that Germany's Versailles grievances were legitimate and that satisfying them would preserve peace. The Munich Agreement (September 1938 — ceding the Sudetenland to Germany) was appeasement's high point and its most catastrophic failure.",tip:"Appeasement is AP-essential. Know: Chamberlain, Munich Agreement (September 1938), 'peace for our time,' Sudetenland ceded. Arguments for appeasement: war-weary populations, legitimate Versailles grievances, buying rearmament time. Arguments against: emboldened Hitler, showed Western weakness. Historically: it failed. But was it rational at the time? AP essays that engage this complexity score better than those that simply condemn it as cowardice."},
  {cat:"Diplomacy",term:"Munich Agreement (1938)",pos:"noun (proper)",def:"The agreement among Britain (Chamberlain), France (Daladier), Germany (Hitler), and Italy (Mussolini) — without Czechoslovakia's participation — ceding the <strong>Sudetenland</strong> (Czechoslovakia's German-speaking region) to Germany (September 1938). Chamberlain returned declaring 'peace for our time.' Hitler occupied the rest of Czechoslovakia six months later.",tip:"Munich is appeasement's most famous act and greatest failure. Know: September 1938, Sudetenland ceded, Czechoslovakia not at the table, Chamberlain's 'peace for our time.' Its lesson: Hitler's promises were worthless — when he occupied the rest of Czechoslovakia in March 1939, even Chamberlain recognized appeasement had failed. Britain began serious rearmament only after Munich."},
  {cat:"Diplomacy",term:"Spanish Civil War (1936–1939)",pos:"noun (proper)",def:"Civil war between the <strong>Republican government</strong> (supported by the Soviet Union and international brigades) and <strong>General Franco's Nationalist forces</strong> (supported by Germany and Italy). Britain and France adopted a Non-Intervention Agreement (which Germany and Italy ignored). Franco won; Spain became a fascist dictatorship. The war was a dress rehearsal for WWII — Germany tested new weapons and tactics (Guernica bombing).",tip:"The Spanish Civil War is the prelude to WWII. Know: Republicans vs. Nationalists (Franco), Soviet support for Republicans, German/Italian support for Franco, Western non-intervention, Guernica bombing (German air power test). Its significance: Germany and Italy openly intervened for a fascist cause while democracies stood aside — the same dynamic that would operate in WWII's early stages. Picasso's Guernica is the war's iconic artistic response."},
  {cat:"Culture",term:"Surrealism",pos:"noun",def:"An artistic and literary movement (1920s–1930s, founded by André Breton) using <strong>dreamlike imagery, irrational juxtaposition, and automatic writing</strong> to access the unconscious mind. Key artists: Salvador Dalí (<em>The Persistence of Memory</em>), René Magritte (<em>The Treachery of Images</em>). Drew explicitly on Freud's theories of the unconscious.",tip:"Surrealism connects Freud's unconscious to interwar art. Know: Breton (founder), Dalí and Magritte (key artists), dreamlike/irrational imagery, Freudian influence. It's the visual expression of the interwar rejection of rational certainty — if the unconscious drives behavior and dreams reveal truths reason conceals, art should access that irrational substrate."},
  {cat:"Culture",term:"Existentialism",pos:"noun",def:"A philosophical movement (associated with Jean-Paul Sartre, Albert Camus — fully developed after WWII but roots in interwar period) asserting that <strong>existence precedes essence</strong> — humans are not born with a fixed nature or purpose; they must create meaning in an inherently absurd universe. Freedom and responsibility are fundamental. Grew from the sense that traditional meaning-systems (religion, nationalism, progress) had been destroyed by WWI.",tip:"Existentialism is the philosophical response to the interwar crisis of meaning. Know: Sartre ('existence precedes essence'), Camus (the absurd), human freedom + responsibility for self-created meaning. It emerged from the ruins of pre-war certainties — if God is dead (Nietzsche) and reason failed (WWI), humans must create their own meaning. This makes it the philosophical companion to Lost Generation literature and Surrealist art."},
  {cat:"Culture",term:"Propaganda",pos:"noun",def:"The systematic use of <strong>media, symbols, and emotional appeals to shape public opinion</strong> and political behavior. Totalitarian regimes (Nazi Germany's Goebbels, Soviet socialist realism) perfected propaganda as a tool of mass political control. Radio, cinema, and mass rallies (Nuremberg) gave propaganda unprecedented reach and emotional power.",tip:"Propaganda is the instrument of totalitarian mass mobilization. Know: Goebbels (Nazi propaganda minister), Volksempfänger (Nazi radios), Triumph of the Will (Riefenstahl), Nuremberg rallies. The AP key point: mass media (radio, cinema) made 20th-century propaganda qualitatively different from earlier political communication. It could reach millions simultaneously with emotional intensity no pamphlet or speech could match."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
