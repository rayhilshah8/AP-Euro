<script>
const CONCEPTS = [
  // Modern Science & Thought
  {cat:"Modern Science & Thought",q:"How did Einstein's theory of relativity challenge the Newtonian worldview, and what were its broader cultural implications?",a:"Albert Einstein's special relativity (1905) and general relativity (1915) showed that <strong>space, time, and mass are relative to the observer's frame of reference</strong> — not fixed, absolute quantities as Newton assumed. Energy and mass are interchangeable (E=mc²). The Newtonian universe of predictable, absolute motion was replaced by one in which observations depend on perspective. Culturally, relativity contributed to a sense that even scientific 'truth' was not absolute — feeding the anxiety and relativism of modernist culture.",tip:"Einstein's relativity is cultural as much as scientific for AP purposes. Know: space and time are relative (not absolute), E=mc², challenges Newtonian certainty. The cultural implication: if even physics has no absolute reference point, what certainties remain? This fed artistic modernism and contributed to pre-WWI intellectual anxiety."},
  {cat:"Modern Science & Thought",q:"What was Freud's contribution to understanding human behavior, and why was it culturally significant?",a:"Sigmund Freud (1856–1939) argued that human behavior is largely driven by <strong>unconscious desires and drives</strong> — especially sexual — that the conscious mind represses. The ego (rational, conscious), id (primitive drives), and superego (internalized moral rules) are in constant conflict. Neurosis results from failed repression. His 'talking cure' (psychoanalysis) aimed to bring unconscious conflicts to consciousness. Freud's implication: humans are not rational beings in control of their behavior — they are driven by forces they don't understand.",tip:"Freud's significance for AP is cultural, not clinical. He undermined the Enlightenment's rational human subject — the confident, self-directed individual. If unconscious irrational drives govern behavior, Enlightenment optimism about human reason and progress looks naive. Know: id/ego/superego, unconscious, sexuality, psychoanalysis. His ideas influenced art, literature, and political thought."},
  {cat:"Modern Science & Thought",q:"How did Nietzsche challenge conventional morality and religion, and what was his cultural influence?",a:"Friedrich Nietzsche (1844–1900) declared 'God is dead' — meaning that the Enlightenment had destroyed the metaphysical foundations of Christian morality without replacing them. He attacked 'slave morality' (humility, meekness, equality) as life-denying and advocated the <strong>'will to power'</strong> and the ideal of the Übermensch (Superman) — the exceptional individual who creates their own values beyond conventional good and evil. His work influenced both artistic modernism and (through crude misreading) fascism.",tip:"Nietzsche is the philosopher of cultural crisis — he named the problem (God is dead, morality groundless) without providing a reassuring solution. Know: 'God is dead,' will to power, Übermensch, slave morality. His influence on modernism is through the attack on tradition and convention. His misuse by the Nazis (his sister manipulated his work) is important — know he was not an antisemite."},
  {cat:"Modern Science & Thought",q:"What was Bergson's philosophy and how did it reflect the modernist critique of rationalism?",a:"Henri Bergson (1859–1941) argued that rational, scientific analysis cannot capture the fundamental nature of reality — especially the experience of <strong>time as continuous flow (durée)</strong> rather than measurable segments. True knowledge comes from intuition, not reason. His philosophy validated subjective, non-rational experience as a form of knowledge, influencing artists and writers who sought to capture interior consciousness rather than external reality.",tip:"Bergson is less tested than Freud or Nietzsche but represents the same anti-rationalist turn. His durée concept connects directly to stream-of-consciousness literature (Virginia Woolf, James Joyce). Know: intuition over reason, time as felt experience not measured quantity, influence on modernist literature."},

  // Modernist Culture
  {cat:"Modernist Culture",q:"What was Modernism in literature, and who were its key figures?",a:"Literary modernism rejected traditional narrative forms (linear plot, omniscient narrator, resolution) in favor of <strong>stream of consciousness, fragmented perspective, interior monologue, and ambiguity</strong>. Key figures: <strong>James Joyce</strong> (<em>Ulysses</em>) — stream of consciousness, dense allusions, a single day in Dublin; <strong>Virginia Woolf</strong> — subjective interior experience, time as felt; <strong>Franz Kafka</strong> — alienation, bureaucratic absurdity, the individual vs. incomprehensible systems; <strong>Marcel Proust</strong> — memory and time, the interior self.",tip:"Modernist literature's formal innovations mirror the period's intellectual changes: if reality is relative (Einstein), if the unconscious drives behavior (Freud), then novels can't pretend to omniscient clarity. Know the key authors and their techniques. Joyce and Kafka are most AP-relevant. The form IS the content — fragmented narrative = fragmented modern experience."},
  {cat:"Modernist Culture",q:"What was Impressionism and Post-Impressionism, and how did they break with artistic tradition?",a:"Impressionism (1860s–1880s) broke from academic tradition by capturing <strong>light, atmosphere, and fleeting sensation</strong> rather than precise detail — Monet, Renoir, Degas. Post-Impressionism moved further: <strong>Cézanne</strong> used geometric structure to depict multiple perspectives simultaneously (anticipating Cubism); <strong>Van Gogh</strong> used intense color and brushwork to express emotional states; <strong>Gauguin</strong> sought primitive authenticity outside Western civilization. These movements paved the way for fully abstract 20th-century art.",tip:"Impressionism → Post-Impressionism → Modernism is the art history sequence. Know the shift from depicting external reality (Realism) to depicting perception (Impressionism) to expressing interior states (Van Gogh) to analyzing form itself (Cézanne). Each step moves further from objective representation toward subjective expression — mirroring the intellectual turn away from objective certainty."},
  {cat:"Modernist Culture",q:"What were the major modernist innovations in early 20th-century art, and who led them?",a:"Early 20th-century art movements: <strong>Fauvism</strong> (Matisse — wild color divorced from natural appearances); <strong>Cubism</strong> (Picasso, Braque — depicting multiple perspectives simultaneously, deconstructing three-dimensional space); <strong>Expressionism</strong> (Munch's <em>The Scream</em> — exaggerated form to convey emotional disturbance); <strong>Abstraction</strong> (Kandinsky — pure color and form with no representational content). All rejected the assumption that art should represent visible reality.",tip:"Know at least three modernist art movements and their key artists. Picasso's Cubism is most AP-relevant (deconstructing perspective = deconstructing single fixed viewpoint = intellectual pluralism). Munch's The Scream is the image of pre-WWI anxiety. Fauvism's wild color reflects the post-Nietzschean liberation from convention."},
  {cat:"Modernist Culture",q:"How did modernism manifest in music, and what made it revolutionary?",a:"Musical modernism rejected the harmonic system of Western tonal music: <strong>Igor Stravinsky</strong>'s <em>Rite of Spring</em> (1913) — its premiere caused a riot for its dissonance, irregular rhythms, and primitivism. <strong>Arnold Schoenberg</strong> developed atonalism (no fixed tonal center) and later the twelve-tone system. <strong>Claude Debussy</strong> used unconventional harmonies and blurred structures (Impressionism in music). All challenged the expectation that music should resolve tension into harmonious consonance.",tip:"Stravinsky's Rite of Spring is the AP's paradigm for modernist music — its premiere riot shows how violently audiences resisted the break with tradition. Know: dissonance, atonalism (Schoenberg), primitivism (Stravinsky), break from harmonic resolution. Music's shift from resolution to tension mirrors the era's intellectual anxiety — no satisfying answers, only questions."},

  // Politics & Society
  {cat:"Politics & Society",q:"What was the Russian Revolution of 1905, and what caused and followed it?",a:"The 1905 Revolution was triggered by Russia's humiliating defeat to Japan (Russo-Japanese War), economic hardship, and the massacre of peaceful petitioners on <strong>Bloody Sunday</strong> (January 9, 1905). Nationwide strikes and revolts forced Tsar Nicholas II to issue the <strong>October Manifesto</strong>, promising a Duma (elected legislature) and civil liberties. However, once the crisis passed, Nicholas withdrew most concessions. The Duma was given minimal power; political reform was blocked. The revolution failed but exposed the regime's fragility.",tip:"1905 is the dress rehearsal for 1917. Know: Russo-Japanese War defeat → Bloody Sunday → October Manifesto → Duma (limited) → concessions withdrawn. The pattern — promise reform under pressure, withdraw when crisis passes — shows Tsarist Russia's inability to reform itself. Lenin called 1905 'the great rehearsal.' The AP frequently asks why Russia failed to reform and how that leads to 1917."},
  {cat:"Politics & Society",q:"What were the major prewar tensions within European states, and which were most dangerous?",a:"Key domestic tensions: <strong>Germany</strong> — rapid industrialization created a powerful socialist party (SPD) while the Kaiser's 'personal rule' and military dominated policy; Junker class resisted democratization. <strong>Austria-Hungary</strong> — unresolved nationalities question (Slavs, Czechs, Romanians seeking autonomy). <strong>France</strong> — Dreyfus Affair's aftermath left deep secular-clerical division; revanchism over Alsace-Lorraine. <strong>Britain</strong> — Irish Home Rule crisis threatened civil war; suffragette militancy intensified. <strong>Russia</strong> — failed 1905 revolution left revolutionary movements simmering.",tip:"Domestic tensions within each major power are the internal dimension of the road to war. Know the specific tension in each state. Germany's is most important: a militarized monarchy facing a democratic socialist challenge — the internal contradiction that made German leaders more willing to risk war in 1914 as a way to rally national unity."},
  {cat:"Politics & Society",q:"How was antisemitism intensifying in Europe, and what forms did it take?",a:"Late 19th-century antisemitism moved from religious (Jews as Christ-killers) to racial pseudoscience (Jews as biologically inferior/dangerous). In <strong>Russia</strong>, state-sponsored pogroms (1881–1884, 1903–1906) killed thousands and drove mass Jewish emigration. In <strong>France</strong>, the Dreyfus Affair exposed institutional antisemitism. In <strong>Germany and Austria</strong>, antisemitic political parties gained electoral success. <strong>Theodor Herzl</strong> concluded Jews could never be safe in Europe — founding Zionism. The Holocaust was not inevitable, but the conditions for it were being constructed.",tip:"Antisemitism's intensification is AP-essential as context for both WWII and the creation of Israel. Know its forms: religious (old), racial pseudoscience (new), pogroms (Russia), political parties (Germany/Austria), Dreyfus Affair (France). The shift from religious to racial antisemitism is crucial — racial antisemitism provided the pseudo-scientific justification for genocide that religious antisemitism did not."},
  {cat:"Politics & Society",q:"What was the women's suffrage movement's state by 1914, and what tactics were being used?",a:"By 1914 women had won the vote in New Zealand (1893), Australia (1902), Finland (1906), and Norway (1913). In Britain, the <strong>suffragettes</strong> (WSPU, Emmeline Pankhurst) escalated to militant tactics: window-smashing, arson, hunger strikes when imprisoned. The government responded with the 'Cat and Mouse Act' (releasing hunger strikers before death, re-arresting when recovered). Most major European countries still denied women's suffrage — which most granted 1918–1920 as recognition of women's wartime contributions.",tip:"The suffrage movement's pre-WWI state is important context. Know: some countries already granted (Scandinavia, Australia), Britain's suffragettes using militant tactics, government repression (Cat and Mouse Act). WWI is the turning point — women's suffrage came partly as recognition of wartime service, not only as a result of pre-war campaigning. Know this as a historical cause-and-effect."},

  // New Imperialism
  {cat:"New Imperialism",q:"What caused the 'New Imperialism' of the late 19th century, and how did it differ from earlier colonialism?",a:"The New Imperialism (c. 1880–1914) involved rapid <strong>territorial conquest and formal colonization</strong> — different from earlier informal economic influence. Causes: economic (need for raw materials, markets, investment outlets for surplus capital); strategic/military (naval bases, coaling stations); nationalist prestige (empire as proof of national greatness); Social Darwinist ideology (superior races' right and duty to civilize 'inferior' peoples — the 'white man's burden'); and missionary/humanitarian impulses. European states divided most of Africa and much of Asia among themselves in two decades.",tip:"New Imperialism causation is a classic AP multi-factor question. Know all five causes: economic, strategic, nationalist prestige, Social Darwinist ideology, missionary. The most analytically rich cause is Social Darwinism — it provided the ideological justification that made conquest seem not just profitable but morally obligatory. Always distinguish New Imperialism from earlier colonialism: it's faster, more competitive, and more geographically comprehensive."},
  {cat:"New Imperialism",q:"What was the 'Scramble for Africa,' and what were its methods and consequences?",a:"The Berlin Conference (1884–1885) regulated European powers' division of Africa — <strong>without African participation</strong>. By 1914, only Ethiopia (defeated Italy at Adwa, 1896) and Liberia remained independent. Methods varied: British indirect rule (using local leaders as administrators); French assimilation (imposing French culture and administration); Belgian extraction (the Congo Free State — King Leopold II's brutal rubber extraction killed an estimated 10 million Congolese). Consequences: arbitrary borders cutting across ethnic groups (creating conflicts persisting today); economic extraction; destruction of existing political structures.",tip:"The Scramble for Africa is the AP's paradigm for New Imperialism. Know: Berlin Conference (1884–85), Africa divided without Africans present, Ethiopia's resistance (Adwa 1896), Congo Free State atrocities (Leopold II). The AP increasingly expects you to address both European perspectives (economic/strategic/ideological) and African perspectives (resistance, consequences of colonialism)."},
  {cat:"New Imperialism",q:"How did Asian peoples respond to European imperialism, and with what results?",a:"Responses varied: <strong>India</strong> — Indian National Congress (1885) pressed for reforms within the British system; early nationalists like Tilak advocated independence. <strong>China</strong> — the Boxer Rebellion (1900) attempted to expel all foreigners; crushed by an international force, China was forced to pay massive indemnities. <strong>Japan</strong> — uniquely successful: modernized rapidly (Meiji Restoration), defeated Russia (1905), colonized Korea and Taiwan. The Russo-Japanese War shocked the world by demonstrating a non-European power could defeat a European one — inspiring nationalists across Asia and Africa.",tip:"Asian responses to imperialism show a spectrum from accommodation to armed resistance. Japan's success (modernization → military victory over Russia) is most AP-significant. Know: India (INC, moderate nationalism), China (Boxer Rebellion, failure), Japan (Meiji, defeated Russia 1905). Japan's 1905 victory is often cited as the event that began undermining European racial superiority claims."},
  {cat:"New Imperialism",q:"What were the long-term consequences of the New Imperialism?",a:"For colonized peoples: <strong>economic extraction</strong> (raw materials taken, little industrial development permitted), <strong>cultural disruption</strong> (missionary education, language suppression), <strong>demographic damage</strong> (violence, forced labor), and <strong>arbitrary borders</strong> creating multi-ethnic states poorly suited for stable governance. For Europe: raw material access, new markets, national prestige — but also <strong>imperial rivalry</strong> that increased great-power tensions (Moroccan Crises). The decolonization conflicts of the 20th century were direct consequences of the New Imperialism's methods.",tip:"Long-term consequences of imperialism is an AP perspective question. Know both sides: European benefits (materials, markets, prestige) and colonial costs (extraction, cultural damage, borders). The AP increasingly expects the colonized perspective. The connection between arbitrary borders and 20th-century conflicts (in Africa especially) is AP-relevant for synthesis questions."},

  // Road to WWI
  {cat:"Road to WWI",q:"What was the Bismarckian alliance system, and how did its collapse create the conditions for war?",a:"After 1871, Bismarck built a defensive alliance system to isolate France: the <strong>Three Emperors' League</strong> (Germany, Austria-Hungary, Russia, 1873); the <strong>Triple Alliance</strong> (Germany, Austria-Hungary, Italy, 1882); the secret <strong>Reinsurance Treaty</strong> with Russia (1887). This complex web kept France isolated and prevented a two-front war. When Kaiser Wilhelm II dismissed Bismarck (1890) and let the Reinsurance Treaty lapse, Russia was free to ally with France — the <strong>Franco-Russian Alliance</strong> (1894) was the first step toward the two alliances that would fight WWI.",tip:"The alliance system is the structural precondition for WWI. Know: Bismarck's system (isolate France, keep Russia), Wilhelm II's dismissal of Bismarck (1890) as the turning point, Franco-Russian Alliance (1894) as Bismarck's worst nightmare realized. The subsequent Triple Entente (France + Russia + Britain) against the Triple Alliance (Germany + Austria-Hungary + Italy) created the armed camps that made a local Balkan conflict into a world war."},
  {cat:"Road to WWI",q:"What were the major international crises of 1905–1913 that raised tensions before WWI?",a:"A series of near-wars: <strong>First Moroccan Crisis</strong> (1905–1906) — Germany challenged France's control of Morocco; international conference at Algeciras humiliated Germany. <strong>Bosnia Crisis</strong> (1908) — Austria-Hungary annexed Bosnia; Russia, unprepared for war, backed down furiously. <strong>Second Moroccan Crisis</strong> (1911, 'Agadir') — Germany sent a gunboat to Morocco; backed down again after British pressure. <strong>Balkan Wars</strong> (1912–1913) — Ottoman Empire lost most of its European territory; Serbia expanded dramatically; Austria-Hungary alarmed. Each crisis increased nationalist hostility and the conviction that war was inevitable.",tip:"The crises of 1905–1913 are the escalating steps toward WWI. Know: two Moroccan Crises (Germany humiliated twice → nationalist rage), Bosnia Crisis (Russia humiliated → vows not to back down again), Balkan Wars (Serbian expansion threatens Austria-Hungary). Each resolution without war created false confidence; each humiliation increased the pressure toward war. The pattern: crises resolved, but with growing anger and determination not to back down next time."},
  {cat:"Road to WWI",q:"What were the underlying causes of WWI — militarism, alliances, imperialism, nationalism (MAIN)?",a:"<strong>Militarism</strong>: an arms race (especially naval rivalry between Britain and Germany) glorified military power and made war seem manageable. <strong>Alliances</strong>: the two armed blocs (Triple Alliance, Triple Entente) meant any local conflict could trigger a general war. <strong>Imperialism</strong>: competition for colonies created international tensions and rivalries. <strong>Nationalism</strong>: ethnic nationalism (especially Slavic nationalism in the Balkans, threatening Austria-Hungary) and aggressive nationalism in Germany and France made compromise more difficult. Together they created a system where a single spark — the assassination of Franz Ferdinand — could ignite a continental war.",tip:"MAIN is the AP's standard framework for WWI causes. Know all four and be able to explain each with specific evidence. The alliance system is arguably the most mechanically decisive cause (it turned a local assassination into a world war), but nationalism is the ideological driver (why people fought willingly). Always distinguish immediate cause (assassination) from underlying causes (MAIN)."},

  // Broader Themes
  {cat:"Broader Themes",q:"What is the relationship between the intellectual 'anxiety' of 1894–1914 and the coming of WWI?",a:"The intellectual movements of the period — Freud's irrational unconscious, Nietzsche's 'will to power,' Bergson's anti-rationalism, Social Darwinism's 'survival of the fittest' — all <strong>undermined confidence in reason, progress, and peaceful reform</strong>. They valorized instinct, struggle, and vitality over rational deliberation. Some intellectuals and political leaders had a fatalistic or even welcoming attitude toward war as a purifying force — the decadence of peacetime civilization would be burned away in the fire of conflict. This intellectual atmosphere made war more thinkable.",tip:"Intellectual history as a cause of WWI is a sophisticated AP argument. The connection: if reason cannot solve social problems (Freud, Nietzsche), if struggle is natural and healthy (Social Darwinism), if intuition trumps calculation (Bergson), then war as a 'solution' becomes more thinkable. Not a direct cause, but part of the cultural atmosphere that made 1914 possible. Good for synthesis questions about ideas and events."},
  {cat:"Broader Themes",q:"How did imperialism contribute to the tensions that produced WWI?",a:"Imperial competition created a web of international rivalries: the Moroccan Crises (Germany vs. France over Africa) nearly triggered war twice; the Russo-Japanese War (1905) unsettled the balance of power in Asia and humiliated Russia; competition for the collapsing Ottoman Empire (the 'Eastern Question') brought Austria-Hungary, Russia, and the Balkan states into conflict. <strong>Imperialism created a zero-sum competitive mentality</strong> among great powers that made diplomatic compromise more difficult. It also fueled the nationalist and Social Darwinist ideologies that made war seem natural.",tip:"Imperialism → WWI is the 'I' in MAIN. The Moroccan Crises are your clearest evidence — direct imperial disputes that nearly produced war. Also useful: the Balkan conflicts as competition over the Ottoman Empire's European territory. The AP may ask you to trace the connection between imperial competition and the alliance tensions that produced WWI."}
];

const VOCAB = [
  {cat:"Science & Philosophy",term:"Theory of relativity",pos:"noun",def:"Albert Einstein's theories (special relativity, 1905; general relativity, 1915) showing that <strong>space, time, and mass are relative to the observer's frame of reference</strong> — not fixed absolutes as Newton assumed. Energy and mass are interchangeable (E=mc²). Overturned three centuries of Newtonian physics.",tip:"Know: Einstein, 1905 (special), 1915 (general), space and time are relative, E=mc². Its cultural significance: even physics has no absolute reference point — contributing to modernist relativism and anxiety. The Newtonian clockwork universe (predictable, absolute) gives way to something far more uncertain."},
  {cat:"Science & Philosophy",term:"Psychoanalysis",pos:"noun",def:"Sigmund Freud's theory and therapeutic method based on the claim that <strong>unconscious desires and conflicts</strong> (especially sexual) drive human behavior. The 'talking cure' — free association and dream analysis — aims to bring unconscious material into consciousness. The psyche is divided into id (primitive drives), ego (rational self), and superego (internalized moral rules).",tip:"Know: Freud, id/ego/superego, unconscious, sexuality, talking cure. Its cultural significance: humans are not rational masters of their behavior — they are driven by unconscious forces. This undermines Enlightenment rationalism and influences modernist art and literature (stream of consciousness, interior monologue)."},
  {cat:"Science & Philosophy",term:"Friedrich Nietzsche",pos:"noun (proper)",def:"German philosopher (1844–1900) who declared <strong>'God is dead'</strong> (meaning Western civilization had destroyed the metaphysical foundations of morality) and advocated the 'will to power' and the Übermensch (Superman) who creates values beyond conventional morality. Influenced modernist culture and (through misreading) fascism.",tip:"Know: 'God is dead,' will to power, Übermensch, slave morality critique. His significance: he named the cultural crisis of the late 19th century — the collapse of the metaphysical foundations of Western civilization — and refused comforting solutions. His misuse by the Nazis (antisemitic readings of a non-antisemitic thinker) is important to know."},
  {cat:"Science & Philosophy",term:"Will to power",pos:"noun (Nietzsche)",def:"Nietzsche's concept of the fundamental drive underlying human behavior — not survival or pleasure but the drive to <strong>express, expand, and master</strong>. The Übermensch channels will to power creatively; slave morality (Christianity, egalitarianism) suppresses it. Not a political program but a psychological concept.",tip:"Will to power ≠ political domination (though it was misread that way by the Nazis). Nietzsche meant it as a psychological concept — the drive to create and express. Know it alongside Freud's id as both being anti-rationalist accounts of human motivation: humans are driven by forces reason doesn't control."},
  {cat:"Science & Philosophy",term:"Bergson's durée",pos:"noun (French)",def:"Henri Bergson's concept of time as <strong>continuous felt experience (durée)</strong> rather than measurable segments. He argued rational/scientific analysis fragments reality and that intuition captures its true flowing nature. Influenced stream-of-consciousness literature and anti-rationalist cultural movements.",tip:"Durée is Bergson's key concept. Know: time as felt flow vs. measured clock-time, intuition over reason. Its literary influence: Virginia Woolf and Marcel Proust's novels explore how time is experienced subjectively — memory, anticipation, duration — not as objective sequence. Bergson gave philosophical legitimacy to subjective experience as a form of knowledge."},
  {cat:"Modernist Culture",term:"Modernism",pos:"noun",def:"A broad cultural movement (c. 1890–1940) rejecting traditional forms and values in art, literature, and music in favor of <strong>experimentation, fragmentation, subjective perspective, and self-conscious innovation</strong>. A response to industrialization, urbanization, WWI, and the intellectual undermining of certainties (Freud, Einstein, Nietzsche).",tip:"Modernism is the cultural expression of intellectual anxiety. Its formal innovations (fragmented narrative, atonal music, abstract art) mirror the intellectual challenge to objective certainty. Know it as a reaction against both Victorian tradition and Enlightenment confidence. The AP may ask you to connect specific modernist works to the intellectual context that produced them."},
  {cat:"Modernist Culture",term:"Impressionism",pos:"noun",def:"An art movement (1860s–1880s) capturing <strong>light, color, and atmosphere in fleeting moments</strong> rather than precise detail. Key artists: Monet, Renoir, Degas, Pissarro. Named derisively after Monet's <em>Impression, Sunrise</em>. Broke from academic tradition by depicting perception rather than objective reality.",tip:"Impressionism = perception over objective reality. Know: Monet (water lilies, haystacks), Renoir (leisure scenes), Degas (dancers). The shift from depicting what is there to depicting how it looks to the observer is the first step toward modernism. Compare to scientific positivism — Impressionism applies sensory empiricism to art, recording what the eye actually sees rather than what the mind knows."},
  {cat:"Modernist Culture",term:"Cubism",pos:"noun",def:"An art movement (c. 1907–1920s) pioneered by <strong>Pablo Picasso and Georges Braque</strong> that depicted objects from <strong>multiple perspectives simultaneously</strong>, deconstructing three-dimensional form into geometric fragments. <em>Les Demoiselles d'Avignon</em> (Picasso, 1907) is the paradigm work.",tip:"Cubism = multiple simultaneous perspectives. Know: Picasso, Braque, 1907–1920s, Les Demoiselles d'Avignon. Its intellectual parallel: Einstein's relativity (no fixed viewpoint) and Freud's multiple layers of mind. Art deconstructing single fixed perspective = culture abandoning single objective truth. Good for synthesis questions connecting art to intellectual history."},
  {cat:"Modernist Culture",term:"Expressionism",pos:"noun",def:"An art and literary movement (primarily Germany, early 20th century) using <strong>exaggerated, distorted form and intense color to express emotional states</strong> rather than depict external reality. Edvard Munch's <em>The Scream</em> (1893) is the paradigm — existential anxiety made visible.",tip:"Expressionism = emotion over representation. Know: The Scream (Munch, 1893) as the definitive image. German Expressionism (Die Brücke, Der Blaue Reiter) extended this into abstract territory. The Scream specifically is an image of pre-WWI anxiety — the modern individual overwhelmed by incomprehensible forces. Perfect visual evidence for essays on modernist anxiety."},
  {cat:"Modernist Culture",term:"Stream of consciousness",pos:"noun",def:"A literary technique depicting the <strong>continuous, unfiltered flow of a character's thoughts and perceptions</strong> — associative, non-linear, mixing memory and sensation — rather than ordered narrative. Associated with James Joyce, Virginia Woolf, and Marcel Proust. Influenced by Bergson's durée and Freud's unconscious.",tip:"Stream of consciousness is modernism's most distinctive narrative technique. Know: Joyce (Ulysses), Woolf (Mrs. Dalloway), Proust (Remembrance of Things Past). Its philosophical grounding: Bergson (time as felt flow) and Freud (consciousness is not ordered and rational). The technique reflects the period's conviction that inner experience is more real than external events."},
  {cat:"Imperialism",term:"New Imperialism",pos:"noun",def:"The rapid <strong>formal territorial acquisition</strong> by European powers in Africa and Asia (c. 1880–1914), driven by economic, strategic, nationalist, and ideological motives. Distinguished from earlier informal economic influence by its formal colonization, competition, and comprehensiveness — Africa was almost entirely partitioned.",tip:"New Imperialism is the chapter's central geopolitical concept. Know: c. 1880–1914, formal colonization (not just trade), Africa nearly entirely colonized, Berlin Conference (1884–85). Its causes (MAIN-adjacent): economic (materials/markets), strategic (naval bases), nationalist (prestige), Social Darwinist ideology (civilizing mission). Always connect it to the international tensions that led to WWI."},
  {cat:"Imperialism",term:"Berlin Conference (1884–1885)",pos:"noun (proper)",def:"The international conference at which European powers established rules for the partition of Africa — <strong>without a single African representative present</strong>. Recognized existing European claims, required effective occupation for new claims, and ostensibly committed powers to suppressing the slave trade. Set off a race for African territory.",tip:"The Berlin Conference is the institutional moment of the Scramble for Africa. Know: 1884–85, Berlin, no African representation, Bismarck hosted it. The absence of African voices is the AP's key moral/analytical point. The 'effective occupation' requirement triggered rapid colonial expansion — powers had to actually plant flags and administer territory to claim it."},
  {cat:"Imperialism",term:"'White man's burden'",pos:"noun phrase",def:"Rudyard Kipling's 1899 phrase encapsulating the <strong>ideological justification for imperialism</strong>: the supposed duty of the 'superior' white race to 'civilize' and 'educate' non-white peoples, even against their will. Embodied Social Darwinist and racist assumptions underlying the colonial project.",tip:"'White man's burden' is the ideological face of imperialism. Know: Kipling, 1899, racial superiority + civilizing mission = justification for conquest. It's the humanitarian-sounding ideology that masked economic extraction. The AP rewards students who can identify this as ideology (self-serving justification) rather than benevolent intent."},
  {cat:"Imperialism",term:"Congo Free State",pos:"noun (proper)",def:"King Leopold II of Belgium's personal colony in central Africa (1885–1908), nominally established for humanitarian purposes but in practice a brutal <strong>forced labor system for rubber extraction</strong>. An estimated 10 million Congolese died from violence, starvation, and disease. International outcry forced Belgium to take control from Leopold (1908).",tip:"The Congo Free State is the AP's paradigm for imperialist atrocity. Know: Leopold II, rubber, forced labor, ~10 million deaths, international outcry, Belgian takeover 1908. Joseph Conrad's Heart of Darkness drew on Congo atrocities. It's evidence that imperialism's 'civilizing mission' could mask genocide — the most extreme example of the gap between stated ideology and actual practice."},
  {cat:"Imperialism",term:"Battle of Adwa (1896)",pos:"noun (proper)",def:"Ethiopian Emperor Menelik II's defeat of an Italian invading army, making Ethiopia the <strong>only African nation to repel European colonization</strong> in the Scramble for Africa (along with Liberia). Italy recognized Ethiopian independence in the subsequent peace treaty.",tip:"Adwa is the AP's key example of successful African resistance to colonialism. Know: 1896, Menelik II, Ethiopia defeats Italy. It shocked Europe by demonstrating that a well-organized African state could defeat a European army. Japan's defeat of Russia (1905) similarly shocked assumptions of European/white supremacy. Both are evidence of non-European agency and resistance."},
  {cat:"Imperialism",term:"Meiji Restoration",pos:"noun (proper)",def:"Japan's rapid modernization program (1868 onwards) in which the new Meiji government adopted Western technology, institutions, and military organization to preserve Japanese sovereignty. Result: Japan became an <strong>industrial and military power</strong>, defeated China (1895) and Russia (1905), and colonized Korea (1910) — the only non-Western power to successfully industrialize and imperialize.",tip:"The Meiji Restoration is the AP's example of successful non-Western response to imperialism — adaptation rather than resistance. Know: 1868, rapid Westernization, defeat of Russia 1905, colonization of Korea. Japan's success undermined European claims of racial superiority and inspired nationalists across Asia and Africa. It also created a new imperial power that would eventually challenge the West in WWII."},
  {cat:"Road to WWI",term:"Triple Alliance",pos:"noun (proper)",def:"The defensive alliance (1882) among <strong>Germany, Austria-Hungary, and Italy</strong>. Each agreed to support the others if attacked by two or more powers. Italy's participation was unreliable (it joined the Allies in WWI). The Alliance was the Bismarckian system's core — designed to keep France and Russia isolated.",tip:"Triple Alliance = Germany + Austria-Hungary + Italy (1882). Know: Bismarck's creation, defensive, Italy unreliable. Its counterpart: Triple Entente (France + Russia + Britain). Together the two alliances created the armed camps that transformed the assassination of Franz Ferdinand into a world war. Know both alliances cold."},
  {cat:"Road to WWI",term:"Triple Entente",pos:"noun (proper)",def:"The informal alignment of <strong>France, Russia, and Britain</strong> — built on the Franco-Russian Alliance (1894) and the Anglo-French Entente Cordiale (1904) and Anglo-Russian Convention (1907). Not a formal military alliance like the Triple Alliance, but an understanding to cooperate against shared threats.",tip:"Triple Entente = France + Russia + Britain. Know: built in steps (Franco-Russian 1894, Entente Cordiale 1904, Anglo-Russian 1907), informal (not a formal treaty like the Triple Alliance), created by Germany's threatening behavior (naval race with Britain, Moroccan Crises). Together with the Triple Alliance it created the two-bloc system that made a local war global in 1914."},
  {cat:"Road to WWI",term:"Moroccan Crises (1905–1906, 1911)",pos:"noun (plural, proper)",def:"Two German challenges to French control of Morocco that nearly triggered war. The <strong>First Crisis</strong> (1905–06): Kaiser Wilhelm II visited Tangier to assert German interests; Germany was humiliated at the Algeciras Conference. The <strong>Second Crisis</strong> (1911, 'Agadir'): Germany sent a gunboat to Agadir; backed down after British support for France. Germany gained only minor compensation.",tip:"The Moroccan Crises are the AP's key evidence for how imperial competition created pre-WWI tensions. Know: two crises, both humiliated Germany, strengthened Anglo-French cooperation. Germany's repeated attempts to break the Entente through intimidation failed — and each failure increased German nationalist rage and the perceived need to 'stand firm' next time. That 'next time' was July 1914."},
  {cat:"Road to WWI",term:"Arms race (Anglo-German naval)",pos:"noun",def:"Britain and Germany's competitive naval buildup (c. 1898–1914): Germany's Naval Laws (Tirpitz) built a fleet challenging British naval supremacy; Britain responded with the revolutionary <em>Dreadnought</em> (1906) and accelerated construction. Each new German ship produced two British ships. The race increased Anglo-German hostility and drove Britain toward the Entente.",tip:"The naval arms race is the AP's evidence for militarism (the 'M' in MAIN). Know: Germany (Tirpitz, Naval Laws), Britain (Dreadnought, 1906), mutual escalation. Britain's naval supremacy was existential — it protected trade routes and the empire. Germany's challenge was perceived as existential threat. The race is why Britain joined the Entente — Germany was the threat."},
  {cat:"Road to WWI",term:"Russo-Japanese War (1904–1905)",pos:"noun (proper)",def:"A war between Russia and Japan over influence in Manchuria and Korea. Japan's decisive victory (naval battle of Tsushima, 1905) <strong>humiliated Russia</strong> — the first non-European power to defeat a major European state in modern warfare. In Russia, the defeat triggered the 1905 Revolution. Internationally, it demonstrated the limits of European power and elevated Japan as a great power.",tip:"The Russo-Japanese War matters for two reasons: it triggered Russia's 1905 Revolution (internal consequence) and it proved a non-European power could defeat a European one (international consequence). Know: 1904–05, Japan wins, Tsushima naval battle, Russian revolution follows, Japan becomes great power. Japan's victory inspired nationalists across Asia and Africa — the era of unquestioned European supremacy was ending."},
  {cat:"Road to WWI",term:"Bloody Sunday (1905)",pos:"noun (proper)",def:"January 9, 1905: a peaceful march of workers and families to the Winter Palace in St. Petersburg, led by Father Gapon, to present a petition to Tsar Nicholas II. <strong>Imperial troops opened fire</strong>, killing hundreds (estimates vary). It triggered nationwide strikes and revolts, forcing the October Manifesto.",tip:"Bloody Sunday is the spark of the 1905 Revolution. Know: peaceful petition, troops fired on marchers, hundreds killed, triggered revolution, forced October Manifesto. Its significance: it destroyed the traditional image of the Tsar as the benevolent 'little father' of his people. Workers who had appealed to the Tsar directly were shot — making revolutionary opposition more plausible."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
