<script>
const CONCEPTS = [
  // Collapse of Communism
  {cat:"Collapse of Communism",q:"What were Glasnost and Perestroika, and why did they lead to the Soviet Union's collapse?",a:"Mikhail Gorbachev's reform programs: <strong>Glasnost</strong> ('openness') — relaxing censorship, allowing public debate, releasing political prisoners, acknowledging Soviet history's crimes; <strong>Perestroika</strong> ('restructuring') — partial decentralization of the Soviet economy, introducing market mechanisms, allowing some private enterprise. Both were intended to revitalize Soviet communism, not destroy it. But glasnost released suppressed nationalist and democratic demands that the system couldn't accommodate; perestroika disrupted the existing economy without creating a functioning market alternative. The result was accelerating disintegration.",tip:"Glasnost and perestroika are among the most consequential reforms in modern history — intended to save communism, they destroyed it. Know: glasnost (openness, free speech), perestroika (economic restructuring). The key analytical point: Gorbachev opened a pressure valve that was holding a collapsing structure together. Once Eastern Europeans knew the Brezhnev Doctrine was dead, and once Soviet citizens could speak freely, the system's fundamental illegitimacy became undeniable."},
  {cat:"Collapse of Communism",q:"How did the revolutions of 1989 unfold across Eastern Europe, and what made them largely peaceful?",a:"The <strong>1989 revolutions</strong> swept Eastern Europe: Poland held free elections (June — Solidarity won overwhelmingly); Hungary opened its border with Austria (allowing East Germans to flee West); East Germany's regime collapsed as massive protests built; the <strong>Berlin Wall fell</strong> (November 9, 1989); Czechoslovakia's 'Velvet Revolution' peacefully transitioned power (Václav Havel became president); Romania's was the exception — violent, with dictator Ceaușescu executed on Christmas Day. The revolutions were largely peaceful because Gorbachev had made clear that <strong>Soviet tanks would not intervene</strong> — removing the coercive enforcement that had sustained communist regimes.",tip:"The revolutions of 1989 are the most important events in this chapter. Know: Poland (Solidarity electoral victory), Hungary (opened border), Berlin Wall falls (November 9), Velvet Revolution (Havel), Romania (violent, Ceaușescu executed). The key cause of their peacefulness: Gorbachev's reversal of the Brezhnev Doctrine. Without Soviet military backing, communist regimes had no legitimacy or coercive capacity — they fell rapidly."},
  {cat:"Collapse of Communism",q:"What was the fall of the Berlin Wall, and what did it symbolize?",a:"On <strong>November 9, 1989</strong>, following massive East German protests and a confused press conference announcing that border crossings were immediately open, crowds gathered at the Wall and began crossing freely. East and West Berliners embraced; people began demolishing the Wall with hammers. It was the Cold War's symbolic end — the physical embodiment of the Iron Curtain collapsed in a single night, not through military force but through popular pressure on a regime that had lost its will and its Soviet backing.",tip:"November 9, 1989 is one of modern history's most significant dates. Know: confused press conference ('immediately, without delay'), crowds cross freely, Wall begins being demolished. Its symbolic significance: the Wall had stood since 1961 as the ultimate symbol of communist imprisonment of its citizens. Its fall in a night, peacefully, demonstrated both communism's complete loss of legitimacy and the power of peaceful popular pressure."},
  {cat:"Collapse of Communism",q:"How did the Soviet Union itself disintegrate, and what replaced it?",a:"The USSR formally dissolved on <strong>December 25, 1991</strong>, when Gorbachev resigned and the Soviet flag was lowered over the Kremlin. The dissolution followed: failed August 1991 coup against Gorbachev by Communist hardliners (which accelerated rather than prevented the collapse); declarations of independence by all 15 Soviet republics (Baltic states led the way); and Boris Yeltsin's Russia asserting sovereignty from the USSR. The Commonwealth of Independent States (CIS) was a loose successor organization. Russia inherited the USSR's UN Security Council seat and nuclear arsenal.",tip:"The USSR's formal dissolution (December 25, 1991) is the Cold War's legal end. Know: failed August coup, independence declarations, Gorbachev resigns December 25, 1991, Yeltsin's Russia as successor state. The key AP analytical point: the USSR didn't fall to external pressure but collapsed from internal contradictions that Gorbachev's reforms revealed — glasnost showed citizens how bad things were, perestroika disrupted without replacing the economy, and nationalism provided an alternative identity."},
  {cat:"Collapse of Communism",q:"Why was the Yugoslav dissolution so violent, while other Eastern European transitions were peaceful?",a:"Yugoslavia's collapse (1991–2001) was catastrophic because: unlike other Eastern bloc states, it was not a single-nation state but a complex of ethnic groups (Serbs, Croats, Bosniaks, Slovenes, Albanians) held together by Tito's authoritarian federal structure; after his death (1980), <strong>Serbian nationalism</strong> under Slobodan Milošević mobilized ethnic hostility; the international community was slow to recognize the severity and intervene. The worst atrocity: the <strong>Srebrenica massacre</strong> (July 1995 — Bosnian Serb forces killed ~8,000 Muslim men and boys — the worst European genocide since the Holocaust). NATO intervention ended the Bosnian War (Dayton Accords, 1995); the Kosovo War (1999) required further NATO bombing.",tip:"Yugoslavia's violence is the exception that proves the rule: 1989 was peaceful elsewhere because the USSR reversed the Brezhnev Doctrine, but Yugoslavia's ethnic nationalism was a pre-existing structural problem that Gorbachev's withdrawal couldn't solve. Know: Milošević, ethnic cleansing, Srebrenica (1995, ~8,000 killed), Dayton Accords (1995), Kosovo War (1999). The term 'ethnic cleansing' entered the international vocabulary from the Bosnian conflict."},

  // European Integration
  {cat:"European Union",q:"What was the Maastricht Treaty (1992), and what did it create?",a:"The Maastricht Treaty transformed the European Economic Community into the <strong>European Union</strong>, adding: political cooperation (common foreign and security policy), justice and home affairs cooperation, and the framework for <strong>Economic and Monetary Union (EMU)</strong> — a single currency (the euro) with convergence criteria for inflation, debt, and deficits. The EU's 'three pillars': economics (EEC), foreign policy, and justice/home affairs. It also created <strong>EU citizenship</strong> — citizens of member states became citizens of the EU.",tip:"Maastricht (1992) is the AP's key EU milestone. Know: transformed EEC → EU, single currency (euro, introduced 1999 for transactions, 2002 for coins/notes), EU citizenship, three pillars, convergence criteria. The euro is the EU's most ambitious and controversial project — it created shared monetary policy without shared fiscal policy, a structural tension revealed by the 2008 eurozone crisis."},
  {cat:"European Union",q:"What are the arguments for and against the European Union as a political project?",a:"<strong>For the EU</strong>: it has preserved peace in Western Europe (no war since 1945); the single market created prosperity through free trade and factor mobility; it extended democracy eastward after 1989 (EU membership conditionality required democratic governance); environmental and consumer standards improved across the bloc. <strong>Against</strong>: democratic deficit (EU institutions are less accountable than national parliaments); loss of sovereignty; uneven benefits (export-heavy Germany benefited more than peripheral states); eurozone's structural flaws (shared currency without fiscal union); immigration pressures; and cultural anxiety about European identity superseding national identity.",tip:"EU for/against is a genuine analytical debate the AP may frame as a DBQ or LEQ. Know both sides. The 'democratic deficit' (unelected Commission, weak Parliament) and sovereignty loss are the main criticisms. Brexit (Britain's 2016 vote to leave) is the most dramatic expression of anti-EU nationalism — know it as evidence that European integration remains contested."},

  // Globalization & Immigration
  {cat:"Globalization & Immigration",q:"What is globalization, and what have been its effects on European society?",a:"Globalization — the intensification of worldwide interconnection through trade, capital flows, technology, and migration — transformed European economies and societies: <strong>deindustrialization</strong> (manufacturing moved to lower-wage countries); <strong>service economy</strong> expansion; growing income inequality; the internet and digital communication; and <strong>mass migration</strong> (from Eastern Europe after 2004 EU expansion; from former colonies in Africa, South Asia, and the Middle East; and from conflict zones). Globalization created winners (educated, internationally mobile) and losers (manufacturing workers, communities with declining industries).",tip:"Globalization's effects on Europe are multi-dimensional. Know: deindustrialization (manufacturing jobs lost to lower-wage countries), service economy, income inequality, mass migration, internet. Its political consequences: the losers from globalization — deindustrialized communities, manufacturing workers — became the base for right-wing nationalist parties (UKIP in Britain, National Front in France, AfD in Germany) that blamed immigrants and the EU for their decline."},
  {cat:"Globalization & Immigration",q:"What were the guest worker programs, and how did they create lasting social tensions?",a:"In the 1950s–1970s, West European countries (especially West Germany, France, Belgium, Netherlands, Switzerland) recruited 'guest workers' (<em>Gastarbeiter</em> in Germany) from southern Europe, Turkey, and North Africa to fill labor shortages during the economic miracle. The expectation was that workers would return home when no longer needed — but most stayed, bringing families. By the 1970s–80s, as economies stagnated, <strong>former guest workers and their children were increasingly seen as competitors</strong> for scarce jobs and welfare benefits, fueling racial hostility and anti-immigrant politics.",tip:"Guest workers are the historical origin of contemporary European immigration debates. Know: 1950s–70s, recruited from Turkey (Germany), North Africa (France), for economic miracle labor shortage, expected to return but stayed. The transformation from 'temporary guest' to 'permanent minority' is the social change that produced lasting tensions. Their children, born in Germany or France, faced the paradox of being legally citizens but culturally excluded."},
  {cat:"Globalization & Immigration",q:"What drove the refugee crises of the 2000s–2010s, and how did European societies respond?",a:"The Syrian Civil War (from 2011), conflicts in Afghanistan, Iraq, and sub-Saharan Africa drove <strong>massive asylum-seeker flows</strong> into Europe — over 1 million arrived in Germany alone in 2015. Chancellor Merkel's 'Wir schaffen das' ('We can manage this') welcomed refugees; other European states resisted (Hungary under Viktor Orbán built border fences). The crisis intensified debates about: national identity, Islam and European values, burden-sharing among EU states, and the sustainability of the Dublin Regulation (requiring asylum claims in the first EU country reached). It strengthened right-wing nationalist parties across Europe.",tip:"The refugee crisis is among the most politically consequential events for contemporary European politics. Know: Syrian Civil War, 2015 peak (1 million to Germany), Merkel's welcome, Orbán's resistance, Dublin Regulation problem. Its political consequence: strengthened nationalist and populist parties (AfD in Germany, National Front/National Rally in France, Fidesz in Hungary) who used refugee fears to mobilize voters against EU liberalism and immigration."},

  // Post-Cold War World
  {cat:"Post-Cold War",q:"What was the 'New World Order,' and why did it fail to materialize?",a:"After the Cold War, President George H.W. Bush proclaimed a 'New World Order' — a world of international cooperation through international law and the UN, with the USA as the guarantor. The 1991 Gulf War (international coalition expelled Iraq from Kuwait) seemed to confirm this vision. But the 1990s saw: <strong>ethnic conflicts</strong> (Yugoslavia, Rwanda genocide); <strong>failed states</strong> (Somalia); and the limits of humanitarian intervention. The September 11, 2001 attacks and subsequent 'War on Terror' replaced the New World Order vision with a new era of terrorism, U.S. unilateralism, and global instability.",tip:"The 'New World Order' is the optimistic post-Cold War vision that didn't materialize. Know: Bush's proclamation, Gulf War 1991 as the model, then Yugoslavia, Rwanda, Somalia showing its limits, then 9/11 as the definitive end. The AP may ask about continuity and change from Cold War to post-Cold War — the optimism of 1989–1991 (liberal democracy triumphant) gave way to new forms of conflict and instability."},
  {cat:"Post-Cold War",q:"How did European states respond to the threat of terrorism, and what tensions did it create?",a:"The September 11, 2001 attacks on the USA — and subsequent attacks in Europe (Madrid 2004, London 2005, Paris 2015, Brussels 2016, Nice 2016) — prompted European states to: expand surveillance powers; increase intelligence sharing; participate in the Afghanistan and Iraq wars; and begin debate about the relationship between Islam and European values. Tensions arose between: security (enhanced surveillance, detention) and civil liberties; <strong>Muslim communities</strong> (the majority peaceful) and suspicion of radicalization; and between European solidarity and individual state approaches to immigration and counterterrorism.",tip:"Terrorism's impact on European politics is complex. Know: 9/11 (2001), Madrid (2004), London (2005), Paris (2015, Charlie Hebdo and Bataclan), Brussels (2016). The political consequences: expanded security states, anti-Muslim hostility, right-wing nationalist gains, debates about immigration and integration. The AP may ask about the tension between security and civil liberties — a recurring theme since the French Revolution (emergency measures vs. rights)."},
  {cat:"Post-Cold War",q:"What is the rise of right-wing populism in Europe, and what drives it?",a:"Since the 2008 financial crisis and 2015 refugee crisis, right-wing populist parties have surged across Europe: <strong>France</strong> (Marine Le Pen's National Rally, formerly National Front); <strong>Hungary</strong> (Viktor Orbán's Fidesz — governing illiberally since 2010); <strong>Poland</strong> (Law and Justice Party); <strong>Germany</strong> (Alternative für Deutschland, AfD); <strong>Italy</strong> (Giorgia Meloni's Brothers of Italy). Drivers: deindustrialization's losers; hostility to immigration and cultural change; rejection of EU elitism; nostalgia for national sovereignty; and the perception that mainstream parties serve globalization's winners at the expense of ordinary workers.",tip:"Right-wing populism is the defining political trend of contemporary Europe. Know: Le Pen (France), Orbán (Hungary — most entrenched), AfD (Germany), Law and Justice (Poland). The AP key analysis: populism channels the losers of globalization (deindustrialized workers, communities left behind) against a perceived elite (EU bureaucrats, cosmopolitan professionals) and uses immigration as the cultural catalyst. It's the contemporary version of a recurring historical pattern: economic disruption → resentment → scapegoating."},

  // Society & Culture
  {cat:"Society & Culture",q:"How has the digital revolution transformed European society since the 1990s?",a:"The internet, mobile phones, and social media fundamentally transformed: <strong>communication</strong> (near-instantaneous, global, cheap); <strong>commerce</strong> (e-commerce disrupted retail); <strong>work</strong> (remote work, gig economy, deindustrialization of information); <strong>politics</strong> (social media enables both democratic mobilization and disinformation); <strong>culture</strong> (streaming replaced physical media; globalization of entertainment). Europe led in mobile telecommunications (GSM standard originated in Europe) and data privacy regulation (GDPR, 2018). The digital economy created new inequality: the digital divide between those who can and cannot navigate the new economy.",tip:"The digital revolution is the technological transformation defining the post-1985 era. Know: internet, social media, e-commerce, gig economy, GDPR (European data privacy leadership). AP significance: the internet's political effects (democratic mobilization AND authoritarian disinformation) mirror earlier communications revolutions (printing press enabled Reformation AND propaganda). The continuity argument: new communications technology always transforms politics, culture, and society."},
  {cat:"Society & Culture",q:"How has women's position in European society changed since 1985, and what inequalities persist?",a:"Major gains: <strong>workforce participation</strong> reached near-parity with men in many European countries; women elected to high political office in unprecedented numbers (Angela Merkel as German Chancellor 2005–2021, the most powerful European leader of the era); reproductive rights consolidated; LGBTQ+ rights expanded (same-sex marriage legal in most Western European countries). Persistent inequalities: the <strong>gender pay gap</strong> continues (women earn ~80–85% of male wages in most European countries); women remain underrepresented in corporate leadership; and the 'glass ceiling' in politics means top leadership is still predominantly male.",tip:"Women's progress since 1985 follows the pattern of formal gains + persistent inequality. Know: Angela Merkel (2005–2021, paradigm of women reaching top leadership), workforce near-parity, same-sex marriage legalized (Netherlands 2001, first; most Western European countries by 2015). Persistent gap: gender pay gap, underrepresentation in corporate leadership. The AP may ask about continuity and change — formal equality achieved but substantive equality remains incomplete."},
  {cat:"Society & Culture",q:"What is the relationship between globalization and cultural identity, and how has it generated political backlash?",a:"Globalization has created tensions between: <strong>cosmopolitan culture</strong> (American entertainment, global brands, English as lingua franca, internet culture) and <strong>national/local identity</strong>. Many Europeans feel their cultural identity threatened by immigration, Americanization, and EU standardization. This cultural anxiety feeds right-wing populism — parties like France's National Rally and Hungary's Fidesz explicitly defend 'Christian European civilization' against what they portray as multicultural dissolution. The AP key tension: globalization's economic benefits are real but unevenly distributed; its cultural costs are felt most intensely by those who feel left behind.",tip:"Cultural identity vs. globalization is the defining tension of contemporary European politics. Know: cosmopolitan culture (American entertainment, English, internet), national identity anxiety, right-wing cultural conservatism (Hungary's Orbán as paradigm). The AP analytical point: cultural anxiety is not just economic resentment repackaged — it's a genuine response to rapid cultural change that people experience as a loss of familiar identity. Dismissing it as mere racism misses the depth of the phenomenon."},

  // Broader Themes
  {cat:"Broader Themes",q:"What does the collapse of Soviet communism reveal about the nature of historical change?",a:"The Soviet collapse demonstrates several AP-relevant historical patterns: <strong>unintended consequences</strong> (Gorbachev's reforms destroyed what they were meant to save); <strong>long-run causes</strong> (structural weaknesses accumulating over decades, not a sudden failure); <strong>the role of ideas</strong> (Helsinki Accords' human rights provisions, dissidents' moral arguments helped delegitimize communism before any bullets were fired); and <strong>the limits of coercive power</strong> (Soviet control depended on the credibility of military intervention — once that was withdrawn, the entire edifice collapsed rapidly). The bloodless nature of most 1989 revolutions shows that legitimacy matters more than force in the long run.",tip:"The Soviet collapse's lessons for historical analysis are AP gold. Know: unintended consequences (Gorbachev), long-run causes (economic stagnation since 1970s), ideas matter (Helsinki Accords, dissidents), coercion requires legitimacy. The AP synthesis question may ask: what does 1989 tell us about how political change happens? The answer: accumulated delegitimization + removal of coercive support = rapid collapse, even of seemingly powerful systems."},
  {cat:"Broader Themes",q:"How does the period since 1985 connect to the major themes of AP European History as a whole?",a:"The period completes multiple long-run threads: <strong>the state and individual</strong> — the welfare state debates continue (Thatcher's neoliberalism vs. social democracy); <strong>nationalism</strong> — persists as a force even after decades of European integration; <strong>religion</strong> — secularization in Western Europe, but religious identity intensifying among immigrant communities and in Eastern Europe; <strong>scientific and technological change</strong> — digital revolution as transformative as industrialization; <strong>women's roles</strong> — near-formal equality but substantive gaps remain; <strong>European identity</strong> — the EU project's uncertain future. The course ends with Europe's position in a globalized world — powerful but no longer dominant, and deeply uncertain about its identity and future.",tip:"This synthesis card is for the final LEQ or essay. The AP exam's synthesis questions ask you to connect the period being asked about to broader patterns. The last chapter's themes — nationalism vs. integration, globalization's discontents, democracy's fragility, women's ongoing struggle for equality — are all continuations of themes you've studied from Ch. 1 forward. Your most sophisticated essays will trace a thread from the medieval or early modern period to the present."}
];

const VOCAB = [
  {cat:"Soviet Collapse",term:"Glasnost",pos:"noun (Russian)",def:"'Openness' — Gorbachev's policy of relaxing Soviet censorship, allowing public debate, releasing political prisoners, and acknowledging Soviet history's crimes. Intended to energize reform by honest diagnosis of problems. Instead, it <strong>released suppressed democratic and nationalist demands</strong> that the system couldn't accommodate.",tip:"Glasnost is the policy that made the Soviet collapse possible. Know: Gorbachev, openness/free speech, acknowledged past crimes (Stalin), released political pressure. The unintended consequence: once Soviet citizens could speak and read freely, they could articulate what they already knew — that the system was corrupt and failing. Glasnost made the USSR's illegitimacy undeniable."},
  {cat:"Soviet Collapse",term:"Perestroika",pos:"noun (Russian)",def:"'Restructuring' — Gorbachev's economic reform program: partial decentralization of the Soviet economy, introduction of market mechanisms, some private enterprise. Intended to revitalize Soviet industry. Instead, it <strong>disrupted the existing command economy</strong> without creating a functioning market alternative, causing shortages and economic chaos.",tip:"Perestroika + glasnost = the reform package that destroyed what it meant to save. Know: economic restructuring, partial markets, disrupted command economy without replacing it. The Soviet economy's structural problem: central planning had eliminated the price signals needed to coordinate economic activity efficiently. Perestroika introduced market incentives without the institutional framework to support them, creating chaos rather than efficiency."},
  {cat:"Soviet Collapse",term:"Mikhail Gorbachev",pos:"noun (proper)",def:"Soviet leader (1985–1991) who introduced glasnost and perestroika, reversed the Brezhnev Doctrine (allowing Eastern European revolutions), and ultimately presided over the Soviet Union's dissolution. Awarded the Nobel Peace Prize (1990). Intended to save communism — inadvertently destroyed it.",tip:"Gorbachev is history's most consequential unintentional revolutionary. Know: glasnost + perestroika, reversed Brezhnev Doctrine (key to 1989 revolutions), Nobel Peace Prize (1990), resigned December 25, 1991. His paradox: the man who most genuinely tried to save Soviet communism ended up destroying it. The AP may ask about his intentions vs. outcomes — a perfect example of unintended consequences in history."},
  {cat:"Soviet Collapse",term:"Revolutions of 1989",pos:"noun (proper)",def:"The series of largely peaceful popular revolutions that ended communist rule across Eastern Europe: Poland (free elections, June), Hungary (opened border with Austria), East Germany (Berlin Wall falls, November 9), Czechoslovakia (Velvet Revolution), Bulgaria, Romania (violent — Ceaușescu executed). Caused by decades of economic failure, political delegitimization, and Gorbachev's reversal of the Brezhnev Doctrine.",tip:"1989 is the year the Cold War ended in Europe. Know the sequence: Poland (elections June), Hungary (border August), Berlin Wall (November 9), Velvet Revolution (November-December), Ceaușescu executed (December 25). The peaceful character of most revolutions is explained by the Brezhnev Doctrine's reversal — without Soviet backing, communist regimes had no will or capacity to use force against their populations."},
  {cat:"Soviet Collapse",term:"Fall of the Berlin Wall (1989)",pos:"noun (proper)",def:"On <strong>November 9, 1989</strong>, following a confused press conference and massive crowds at the Wall, East Germany opened its borders. Crowds crossed freely and began demolishing the Wall. The Cold War's most powerful symbol collapsed peacefully in a single night. German reunification followed within a year (October 3, 1990).",tip:"November 9, 1989 is one of history's great dates. Know: confused press conference ('immediately, without delay'), crowds cross freely, Wall demolished. German reunification (October 3, 1990) followed. The Wall's fall demonstrates how quickly a seemingly permanent structure can collapse when its coercive foundation is removed. It's the Cold War's definitive visual ending — and a symbol of peaceful popular power."},
  {cat:"Soviet Collapse",term:"Velvet Revolution (1989)",pos:"noun (proper)",def:"Czechoslovakia's peaceful transition from communist rule (November–December 1989), led by Václav Havel and the Civic Forum. Student protests triggered mass demonstrations; the communist government negotiated its own dissolution. Havel became president. Called 'velvet' for its non-violent character — in contrast to Romania's bloody transition.",tip:"The Velvet Revolution is the purest expression of peaceful democratic transition. Know: November-December 1989, Havel, Civic Forum, student protests → negotiated transition. Havel's trajectory from dissident playwright (Charter 77) to president is one of the remarkable personal arcs of 20th-century history. Compare to Romania (violent) to understand why the Velvet Revolution's peacefulness was not automatic."},
  {cat:"Soviet Collapse",term:"Srebrenica massacre (1995)",pos:"noun (proper)",def:"The killing of approximately <strong>8,000 Bosnian Muslim men and boys</strong> by Bosnian Serb forces under General Ratko Mladić in July 1995, while Dutch UN peacekeepers failed to protect the 'safe area.' The worst European genocide since the Holocaust. Led to NATO military intervention and the Dayton Accords (November 1995).",tip:"Srebrenica is the darkest moment of post-Cold War Europe — the return of genocide to European soil. Know: July 1995, ~8,000 killed, Bosnian Serb forces, UN peacekeepers failed to protect, led to NATO intervention. Its legal significance: the International Criminal Tribunal for the former Yugoslavia (ICTY) convicted Mladić and others for genocide — extending Nuremberg's precedent of individual criminal accountability for atrocities."},
  {cat:"Soviet Collapse",term:"Slobodan Milošević",pos:"noun (proper)",def:"Serbian president and later Yugoslav president (1989–2000) whose <strong>Serbian nationalist politics</strong> drove the wars of Yugoslav dissolution. Orchestrated campaigns of ethnic cleansing in Croatia, Bosnia, and Kosovo. Indicted for crimes against humanity and genocide by the International Criminal Tribunal; died in custody during his trial (2006).",tip:"Milošević is the AP's paradigm for how nationalism can be weaponized for political power and lead to atrocity. Know: Serbian nationalism, ethnic cleansing, Srebrenica context, ICTY indictment. His rise shows how the removal of communist authoritarianism (Tito had suppressed ethnic tensions) can release pent-up nationalisms that become violent when deliberately manipulated by political leaders."},
  {cat:"European Union",term:"Maastricht Treaty (1992)",pos:"noun (proper)",def:"The treaty transforming the European Economic Community into the <strong>European Union</strong>, establishing: EU citizenship, the framework for a single currency (the euro), common foreign and security policy, and justice/home affairs cooperation. The EU's foundational constitutional document.",tip:"Maastricht = the EEC becoming the EU. Know: 1992, EU citizenship, euro framework (introduced 1999 for transactions, 2002 for notes and coins), common foreign policy (limited), three pillars. The euro is the most ambitious integration achievement — sharing monetary policy without fiscal union created structural tensions that the 2008–2012 eurozone crisis exposed. Know Maastricht as the moment European integration went beyond economics into politics."},
  {cat:"European Union",term:"Euro (€)",pos:"noun",def:"The single currency of the eurozone (19 of 27 EU member states as of 2023), introduced for electronic transactions in 1999 and as coins and notes in 2002. Eliminated exchange costs within the eurozone; required <strong>convergence criteria</strong> for inflation, debt, and deficits. Notable non-members: Britain, Sweden, Denmark.",tip:"The euro is the EU's most ambitious project — and its most controversial. Know: introduced 1999 (transactions), 2002 (physical), convergence criteria, 19 eurozone members (not all EU members). The eurozone's structural flaw: shared monetary policy (one interest rate set by ECB) without shared fiscal policy (each government still sets its own budget). This mismatch caused the 2010–2012 Greek debt crisis and broader eurozone crisis."},
  {cat:"European Union",term:"Brexit",pos:"noun",def:"Britain's withdrawal from the European Union, triggered by the June 2016 referendum (52% voted Leave, 48% Remain). Britain formally left the EU on January 31, 2020. Driven by: concerns about sovereignty, immigration (especially from Eastern Europe after 2004 EU expansion), and anti-establishment sentiment. The most significant challenge to European integration since the EU's founding.",tip:"Brexit is the AP's key example that European integration remains contested and reversible. Know: June 2016 referendum, 52%–48%, January 31, 2020 formal departure. The drivers (sovereignty, immigration, anti-establishment sentiment) mirror the broader right-wing populist wave. The AP may ask you to analyze Brexit as evidence about nationalism vs. integration, or about globalization's discontents. The vote revealed a deeply divided Britain — by age, class, education, and region."},
  {cat:"European Union",term:"Democratic deficit",pos:"noun",def:"The criticism that the European Union suffers from insufficient democratic accountability: <strong>the European Commission</strong> (the EU's executive) is appointed, not elected; the European Parliament has limited legislative power; decisions are made by technocrats rather than accountable elected politicians. A major source of Eurosceptic criticism.",tip:"The democratic deficit is the EU's most serious institutional criticism. Know: Commission appointed (not elected), Parliament limited, technocratic governance. This is why EU decisions on trade, agriculture, and regulations often seem disconnected from citizens' preferences — they're made by experts applying treaty rules, not by politicians directly accountable to voters. Brexit voters frequently cited the democratic deficit as a reason to leave."},
  {cat:"Globalization",term:"Globalization",pos:"noun",def:"The intensification of worldwide interconnection through <strong>trade, capital flows, technology, and migration</strong>. It created unprecedented economic growth and prosperity while also producing deindustrialization, income inequality, and cultural anxiety. Politically: it created winners (educated, mobile) and losers (manufacturing workers) whose resentment fueled right-wing populism.",tip:"Globalization is the economic and cultural context for all of Ch. 20's political developments. Know: increased trade + capital flows + migration + technology = globalization. Its dual character: economic benefits broadly distributed BUT losers concentrated in specific communities (deindustrialized towns, manufacturing workers). The AP expects you to analyze globalization's benefits AND costs, and trace its political consequences (populism, Brexit, immigration debates)."},
  {cat:"Globalization",term:"Guest workers (Gastarbeiter)",pos:"noun (plural)",def:"Foreign workers recruited to Western European countries (especially West Germany, France, Netherlands) in the 1950s–1970s to fill labor shortages during the economic miracle. Originally intended as temporary, most stayed permanently. By the 1970s–80s, <strong>they and their children faced discrimination and hostility</strong> as unemployment rose and they were seen as competitors for jobs.",tip:"Guest workers are the historical origin of contemporary European immigration debates. Know: 1950s–70s, recruited from Turkey (to Germany), North Africa (to France), intended as temporary, stayed permanently. The transformation from 'temporary guest' to 'permanent minority' is the social change that produced lasting tensions. Their children, born in Europe, faced the paradox of being legal citizens but culturally excluded — contributing to radicalization among a small minority."},
  {cat:"Globalization",term:"Right-wing populism",pos:"noun",def:"Political movements combining <strong>anti-immigration, anti-EU, and anti-elite rhetoric</strong> with appeals to national identity and cultural preservation. Emerged across Western Europe since the 2000s in response to globalization, immigration, and perceived mainstream party unresponsiveness. Key examples: Marine Le Pen's National Rally (France), Viktor Orbán's Fidesz (Hungary), Alternative für Deutschland (Germany), Italy's Brothers of Italy.",tip:"Right-wing populism is the dominant political trend of contemporary Europe. Know: Le Pen (France), Orbán (Hungary — governing since 2010, most institutionalized example), AfD (Germany), Brothers of Italy. Its drivers: globalization losers + immigration fears + anti-elite resentment + cultural anxiety. The AP may ask you to connect contemporary populism to earlier historical patterns — the comparison to 1930s fascism is legitimate but requires nuance (populists have not (yet) rejected democracy itself in most cases)."},
  {cat:"Globalization",term:"Viktor Orbán",pos:"noun (proper)",def:"Hungarian Prime Minister (1998–2002; 2010–present) who built an 'illiberal democracy' in Hungary — winning elections repeatedly while undermining judicial independence, press freedom, and civil society. His government's anti-immigration policies (border fence, 2015), attacks on LGBTQ+ rights, and hostility to EU rules represent the most institutionalized right-wing populism in the EU.",tip:"Orbán is the AP's paradigm for illiberal democracy within the EU. Know: Prime Minister since 2010, 'illiberal democracy' (his own term), border fence (2015), attacks on press and judiciary, conflicts with EU over rule of law. He represents the most serious challenge to the EU's democratic values — a member state that rejects liberal democratic norms while benefiting from EU membership and funding."},
  {cat:"Globalization",term:"Angela Merkel",pos:"noun (proper)",def:"German Chancellor (2005–2021) and Europe's most powerful political leader for over a decade. Managed the eurozone crisis (harsh austerity conditions for Greece), welcomed Syrian refugees (2015 — 'Wir schaffen das'), presided over Germany's continued EU centrality, and represented conservative pragmatism in contrast to right-wing populism.",tip:"Merkel is the AP's paradigm for contemporary European leadership — the most consequential European politician of the early 21st century. Know: CDU, 2005–2021 (16 years), eurozone crisis management, refugee welcome (2015), contrast with Orbán's nationalism. Her 'Wir schaffen das' ('We can manage this') response to the refugee crisis defined the moment — and generated enormous backlash from right-wing populists who argued Germany couldn't."},
  {cat:"Society",term:"Digital age",pos:"noun",def:"The era of pervasive information and communication technology — internet, smartphones, social media — that has transformed communication, commerce, work, and culture since the 1990s. Creates both opportunities (democratized information, global connection) and threats (disinformation, surveillance, job displacement by automation).",tip:"The digital age is the technological revolution of the post-1985 period. Know: internet (1990s), smartphones (2007–), social media (2004–), gig economy, disinformation, GDPR (European data privacy). Its political implications: social media enables both democratic organizing (Arab Spring) and authoritarian disinformation (Russian election interference, Brexit). The AP comparison: like the printing press (Ch. 3), the internet democratizes information AND enables new forms of manipulation."},
  {cat:"Society",term:"Eurozone crisis (2010–2015)",pos:"noun",def:"The financial crisis that nearly destroyed the euro after several eurozone members (Greece, Portugal, Ireland, Spain, Italy) faced sovereign debt crises. The structural flaw: shared monetary policy (ECB sets interest rates) without shared fiscal policy (governments set their own budgets). Germany and the EU demanded severe <strong>austerity</strong> in exchange for bailouts, causing prolonged recession in crisis countries.",tip:"The eurozone crisis reveals the EU's structural flaw: monetary union without fiscal union. Know: Greece (most severe — debt reached 180% of GDP), austerity conditions (pension cuts, wage cuts, unemployment rises), Germany as creditor imposing conditions, ECB's eventual 'whatever it takes' (Draghi, 2012) that stabilized markets. Its political consequences: anti-EU parties gained support in crisis countries (Greece's Syriza, Spain's Podemos) and creditor countries (Germany's AfD)."},
  {cat:"Society",term:"GDPR (General Data Protection Regulation)",pos:"noun (proper)",def:"The European Union's comprehensive data privacy regulation (2018) giving EU citizens rights over their personal data: the right to access, correct, delete, and transfer their data; consent requirements for data collection; and significant penalties for violations. Has effectively become a <strong>global standard</strong> as companies worldwide comply to access the EU market.",tip:"GDPR is European evidence that the EU can set global standards. Know: 2018, data rights (access, delete, correct), consent requirements, heavy penalties. Its significance: in the digital age, the EU used market power to set global privacy standards — a model for how medium-sized powers can influence global rules. Compare to the EU's earlier standard-setting in environmental regulations and consumer protection."},
  {cat:"Society",term:"Climate change politics",pos:"noun",def:"The political response to scientific evidence of human-caused global warming through carbon emissions. The EU has been the world's most ambitious climate actor: the European Green Deal (2019) aims for carbon neutrality by 2050; the EU Emissions Trading System (ETS) uses market mechanisms to reduce emissions. Climate change has also generated political backlash from right-wing parties skeptical of climate action's economic costs.",tip:"Climate change is the defining global challenge of the contemporary period and increasingly AP-relevant. Know: EU Green Deal (2019, carbon neutrality by 2050), ETS (carbon market), climate skepticism from right-wing parties. The AP connection: environmental politics traces back to Rachel Carson (Ch. 19) and the Green Party movements of the 1980s. The EU's climate ambition contrasts with right-wing populists' opposition to climate regulations — another dimension of the globalization vs. nationalism tension."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
