<script>
const CONCEPTS = [
  // Prelude to War
  {cat:"Prelude to War",q:"How did Hitler systematically dismantle the Versailles settlement between 1933 and 1939?",a:"Hitler's 'diplomatic revolution' proceeded in stages: <strong>1933</strong> — Germany withdrew from the League of Nations and disarmament conference; <strong>1935</strong> — announced rearmament (conscription, air force) in open violation of Versailles; <strong>1936</strong> — remilitarized the Rhineland (troops sent into the demilitarized zone — France/Britain did not respond); <strong>1936</strong> — Rome-Berlin Axis and Anti-Comintern Pact with Japan; <strong>1938</strong> — <em>Anschluss</em> (annexation of Austria); <strong>1938</strong> — Sudetenland (Munich Agreement); <strong>1939</strong> — occupation of the rest of Czechoslovakia (no more Versailles fig leaf); <strong>September 1939</strong> — invasion of Poland (triggers war).",tip:"Hitler's steps are an escalating sequence the AP may ask you to trace. Know each major move and the Western response (or non-response). The Rhineland remilitarization (1936) is particularly significant — if France had responded militarily, Hitler would almost certainly have retreated (German generals admitted this later). Western passivity emboldened each subsequent step."},
  {cat:"Prelude to War",q:"What was the Nazi-Soviet Pact (Molotov-Ribbentrop Pact, 1939), and why was it so shocking?",a:"The non-aggression pact signed between Nazi Germany and the Soviet Union (August 23, 1939) included secret protocols dividing Eastern Europe into spheres of influence: Germany would take western Poland; the USSR would take eastern Poland, Finland, the Baltic states, and Bessarabia. It was shocking because Nazi ideology and Stalinist communism were supposedly mortal enemies — and because it freed Hitler to attack Poland without fear of a two-front war.",tip:"The Nazi-Soviet Pact is the diplomatic shock that enabled WWII. Know: August 23, 1939, non-aggression, secret protocols (dividing Eastern Europe), shattered the assumption that ideological enemies couldn't ally. Stalin's motive: buying time to prepare (the USSR wasn't ready for war in 1939). Hitler's motive: avoiding the two-front war that had doomed Germany in WWI. The pact lasted until Germany invaded the USSR (June 22, 1941)."},

  // Course of the War
  {cat:"Course of the War",q:"What was Blitzkrieg, and why was it so devastating in the early years of the war?",a:"Blitzkrieg ('lightning war') used <strong>combined arms — fast-moving tanks supported by aircraft (Stukas dive bombers), motorized infantry, and artillery</strong> — to punch through enemy lines, encircle defenders, and collapse the front before they could reorganize. It succeeded against Poland (September 1939 — defeated in weeks), Denmark and Norway (April 1940), and most dramatically France (May–June 1940 — defeated in six weeks despite France having more tanks than Germany). It worked because the Allies expected static WWI-style trench warfare and were operationally outmaneuvered.",tip:"Blitzkrieg's psychological dimension is as important as its tactical one. Know: fast-moving tanks + air support + motorized infantry = shock and speed that prevented organized defense. Its failure condition: the USSR (vast space, massive manpower) and Britain (Channel defense, air power). The AP may ask why Germany succeeded early and failed later — Blitzkrieg worked against concentrated, static opponents but not against unlimited space and resources."},
  {cat:"Course of the War",q:"What was the Fall of France (1940), and why was it so catastrophic for the Allies?",a:"In May-June 1940, Germany's <strong>Manstein Plan</strong> sent armored columns through the Ardennes forest (which the French had dismissed as impassable), cutting off the Allied armies in Belgium. British and French forces retreated to Dunkirk, where ~338,000 troops were evacuated across the Channel ('the miracle of Dunkirk') but left all their equipment behind. France signed an armistice (June 22) — the same railway car used in 1918 was brought out for Hitler's symbolic revenge. The <strong>Vichy regime</strong> (Marshal Pétain) collaborated with Germany; <strong>Free France</strong> (de Gaulle) continued resistance from London.",tip:"The Fall of France is the most consequential military event of the war's first phase. Know: Ardennes breakthrough (Manstein Plan), Dunkirk evacuation (338,000 rescued), French armistice (June 22, 1940), Vichy collaboration vs. de Gaulle's Free France. Its consequences: Britain stood alone; the USSR had time to prepare; the USA faced the possibility that all of Europe would be Nazi. Churchill's defiance became the war's emotional turning point."},
  {cat:"Course of the War",q:"What was the Battle of Britain (1940), and why was it a turning point?",a:"After France's fall, Hitler expected Britain to negotiate peace. Churchill refused. Germany launched a massive air campaign — the <strong>Luftwaffe</strong> attacked RAF airfields (August–September 1940), then switched to bombing London (the 'Blitz') after a British raid on Berlin. The RAF, using radar (a British technological advantage) and Spitfires, inflicted unsustainable losses on the Luftwaffe. Germany postponed (then permanently cancelled) Operation Sea Lion (the planned invasion). It was the first German defeat — proving Hitler was not invincible.",tip:"The Battle of Britain is the AP's paradigm for how technology (radar) and strategic error (switching from airfields to cities) can decide a campaign. Know: summer-autumn 1940, RAF vs. Luftwaffe, radar advantage, Hitler's strategic error (bombing cities instead of airfields), Operation Sea Lion cancelled. Churchill's 'finest hour' speech is the war's defining statement of democratic resistance. Britain's survival kept the Allied cause alive."},
  {cat:"Course of the War",q:"How did Operation Barbarossa (1941) change the character of the war?",a:"Germany's invasion of the Soviet Union (June 22, 1941 — the largest military operation in history) transformed WWII into a war of racial annihilation. Three army groups attacked simultaneously; initial advances were staggering — millions of Soviet troops captured. But the USSR's vast space, population, and industrial relocation east (beyond German reach) prevented a knockout blow. The German advance stalled at Moscow (December 1941), Leningrad (900-day siege), and then Stalingrad. The invasion also triggered the systematic Holocaust — mobile killing units (Einsatzgruppen) followed the army, shooting Jews, Roma, and Soviet commissars.",tip:"Operation Barbarossa is the turning point of the entire war — and the beginning of the Holocaust at industrial scale. Know: June 22, 1941, three army groups, initial stunning successes, stopped at Moscow (December 1941), Einsatzgruppen begin mass shootings. Hitler's racial ideology drove both the military strategy (annihilation of 'Judeo-Bolshevism') and the genocidal policy (Holocaust accelerated after Barbarossa)."},
  {cat:"Course of the War",q:"What was the Battle of Stalingrad (1942–1943), and why is it considered the war's decisive turning point?",a:"Germany's 6th Army (General Paulus) attempted to take Stalingrad on the Volga River — strategically important for oil routes and symbolically important (Stalin's city). Street-by-street urban combat negated German advantages; Soviet General Zhukov's Operation Uranus (November 1942) encircled the entire 6th Army. Paulus surrendered (February 1943) — the first time a German field marshal had surrendered. ~800,000 Axis casualties; Germany lost the strategic initiative on the Eastern Front permanently.",tip:"Stalingrad is the war's decisive turning point — after it, Germany was permanently on the defensive on the Eastern Front. Know: 6th Army, Paulus, urban combat, Operation Uranus (encirclement), surrender February 1943. Its psychological significance: the myth of German invincibility was permanently broken. The Eastern Front's scale is staggering — it involved more troops, casualties, and territory than the entire Western European theater combined."},
  {cat:"Course of the War",q:"How did the Allied coalition win the war, and what were the decisive factors?",a:"Allied victory rested on: <strong>Soviet military power</strong> — the Red Army bore the greatest combat burden (80% of German casualties were on the Eastern Front); <strong>American industrial capacity</strong> — the 'Arsenal of Democracy' outproduced the Axis in every category; <strong>British intelligence</strong> — breaking the Enigma code (Ultra intelligence) gave the Allies advance warning of German plans; <strong>Allied strategic bombing</strong> — eventually destroyed German oil production and transportation; and <strong>D-Day</strong> (June 6, 1944 — opening the Western Front forced Germany to fight on three fronts simultaneously with the Italian campaign).",tip:"Allied victory's causes are multi-factor: Soviet manpower + US production + British intelligence + strategic bombing + D-Day. The AP rewards knowing all five. The Eastern Front's contribution is often underemphasized — Soviet military power was decisive. US industrial production (ships, tanks, aircraft in staggering quantities) ultimately overwhelmed the Axis. Know D-Day (June 6, 1944, Operation Overlord) as the Western Front's opening."},

  // The Holocaust
  {cat:"The Holocaust",q:"What was the Holocaust, how did it develop, and what were its causes?",a:"The Holocaust was the systematic, state-sponsored murder of approximately <strong>6 million Jews</strong> (two-thirds of European Jewry) and millions of others (Roma, disabled people, Soviet POWs, political prisoners, homosexuals). It developed in stages: legal discrimination (Nuremberg Laws, 1935); organized violence (Kristallnacht, 1938); mass shootings by Einsatzgruppen after Barbarossa (1941); and systematic extermination in death camps (Auschwitz-Birkenau, Treblinka, Sobibor — the 'Final Solution' decided at the Wannsee Conference, January 1942). Causes: Nazi racial ideology (antisemitism as the core worldview); totalitarian state machinery; war conditions enabling secrecy; and widespread collaboration or indifference.",tip:"The Holocaust is the most important moral and analytical subject in Ch. 17. Know the escalation sequence: Nuremberg Laws (1935) → Kristallnacht (1938) → Einsatzgruppen mass shootings (1941) → Final Solution decided at Wannsee (January 1942) → death camps. The Wannsee Conference is the key decision point — where the shift from persecution to systematic extermination was bureaucratically organized. Always address causation (Nazi ideology + state machinery + war conditions + collaboration) not just description."},
  {cat:"The Holocaust",q:"What was the 'Final Solution,' and how was it implemented?",a:"The 'Final Solution to the Jewish Question' (<em>Endlösung</em>) was the Nazi program for the <strong>systematic extermination of all Jews</strong> in German-controlled territory. Coordinated at the Wannsee Conference (January 20, 1942), it used six dedicated extermination camps (Auschwitz-Birkenau, Treblinka, Belzec, Sobibor, Chelmno, Majdanek) mainly in occupied Poland, where victims arrived by train and were killed in gas chambers. Approximately 3 million Jews were killed in these camps; the rest were shot by Einsatzgruppen, died in ghettos, or were killed in other ways. The process involved the entire German bureaucracy — railways, civil administration, industry.",tip:"The Final Solution's bureaucratic character is crucial: it required railways (to transport victims), civil administration (to identify and register Jews), industry (for gas and crematoria), and the active cooperation of thousands. This systemic involvement shows it was not the work of a few fanatics but a state project. The Wannsee Conference (January 20, 1942) is the document of this decision — Eichmann took minutes, demonstrating the bureaucratic normality with which genocide was planned."},
  {cat:"The Holocaust",q:"What resistance existed to the Holocaust, within Europe and within the Jewish community?",a:"Resistance took multiple forms: <strong>Warsaw Ghetto Uprising</strong> (April 1943 — Jewish fighters resisted Nazi deportation to Treblinka; held out for a month before being crushed); individual acts of resistance in other ghettos and camps; <strong>rescue networks</strong> (Raoul Wallenberg issued Swedish passports to Hungarian Jews; Le Chambon-sur-Lignon in France sheltered ~3,000 Jews; Denmark evacuated ~7,000 Jews to Sweden); and partisan resistance in the forests of Eastern Europe. Resistance was limited by the overwhelming military imbalance, the deliberate destruction of Jewish communities' leadership, and the lack of outside support.",tip:"Resistance to the Holocaust shows that the Holocaust was not passively accepted — but also shows the overwhelming odds faced by resisters. Know: Warsaw Ghetto Uprising (1943), Wallenberg, Denmark (rescued ~7,000 Jews). The AP may ask about bystanders, perpetrators, and rescuers — know examples of each. The relatively small number of rescuers makes their courage more striking, not less."},

  // Home Front & Total War
  {cat:"Home Front",q:"How did WWII's home fronts compare to WWI's, and what were the major differences?",a:"WWII's home fronts were even more intensely mobilized than WWI's: <strong>women entered the workforce</strong> on an unprecedented scale (Rosie the Riveter in the USA; Soviet women in factories and military); <strong>strategic bombing</strong> made civilians direct targets (London Blitz, Dresden, Tokyo, Hiroshima); <strong>forced labor</strong> — Germany used ~10 million foreign workers (POWs, concentration camp prisoners, conscripted workers); and <strong>total economic mobilization</strong> — the USA produced more war materials than all the Axis powers combined. The distinction between military and civilian completely collapsed.",tip:"WWII's home front intensity is AP-significant. Know: women in workforce (unprecedented scale), strategic bombing targeting civilians, forced labor (Germany), US industrial output overwhelming Axis production. The collapse of the civilian/military distinction is the defining characteristic of total war at its maximum — making WWII qualitatively different from all previous wars."},
  {cat:"Home Front",q:"What was the significance of Allied strategic bombing, and what were the debates about its morality and effectiveness?",a:"The Allied strategic bombing campaign targeted German industry, oil supplies, and cities. The <strong>bombing of Dresden</strong> (February 1945 — a cultural center with little military significance; ~25,000 killed) became a moral controversy. The campaign was effective in destroying German oil production (late in the war) and disrupting transportation. But it was less effective than claimed for most of the war — Germany's industrial output actually increased through 1944 despite bombing. The <strong>atomic bombing of Hiroshima and Nagasaki</strong> (August 6 and 9, 1945) ended the Pacific War and opened the atomic age.",tip:"Strategic bombing raises AP-relevant moral and strategic questions. Know: Dresden controversy (bombing a non-military target), oil campaign effectiveness (late war), atomic bombs (Hiroshima August 6, Nagasaki August 9, 1945). The debate about bombing morality — can civilian deaths be justified by shortening the war? — is a historiographical question the AP may raise in DBQs. Know both the strategic arguments (worked eventually) and the moral critique."},

  // Peace & Cold War Origins
  {cat:"Peace & Cold War",q:"What were the major Allied war conferences, and what decisions shaped the postwar world?",a:"Three major conferences: <strong>Tehran</strong> (November 1943 — Roosevelt, Churchill, Stalin agreed on D-Day and Soviet entry into Pacific war after Germany's defeat); <strong>Yalta</strong> (February 1945 — Germany to be divided into occupation zones; Eastern Europe to have 'free elections' — vaguely defined; United Nations established; Stalin committed to entering the Pacific war); <strong>Potsdam</strong> (July 1945 — Truman, Churchill/Attlee, Stalin; confirmed German division, reparations, expulsion of Germans from Eastern Europe; Truman informed Stalin of 'new weapon').",tip:"Know all three conferences and their key decisions. Yalta is the most AP-critical: the ambiguous 'free elections' promise for Eastern Europe is where the Cold War conflict began — Stalin interpreted it to mean Soviet-friendly governments; Roosevelt/Churchill interpreted it to mean Western-style democracy. This deliberate ambiguity, acceptable in 1945 while the war was still ongoing, became the Cold War's first flashpoint."},
  {cat:"Peace & Cold War",q:"What caused the Cold War, and what were the key early events that defined it?",a:"The Cold War emerged from: <strong>ideological incompatibility</strong> (liberal capitalism vs. communist authoritarianism); <strong>security competition</strong> (the USSR wanted buffer states in Eastern Europe; the West feared Soviet expansion); <strong>broken promises</strong> (Yalta's 'free elections' were not held — Soviet-dominated governments were installed in Poland, Romania, Bulgaria, Czechoslovakia by 1948); <strong>nuclear asymmetry</strong> (the USA had the atomic bomb until 1949, creating Soviet insecurity). Churchill's 'Iron Curtain' speech (March 1946) named the division; the Truman Doctrine (1947) committed the USA to containing Soviet expansion; the Marshall Plan (1947) economically rebuilt Western Europe.",tip:"Cold War origins are AP-essential. Know: ideological conflict, Yalta's ambiguous promises, Soviet satellite states in Eastern Europe, Churchill's Iron Curtain speech (1946), Truman Doctrine (1947), Marshall Plan (1947). The Marshall Plan is particularly important — it rebuilt Western European economies and tied them to the USA, preventing communist parties from exploiting post-war poverty. It's the economic lesson learned from Versailles: generous postwar treatment prevents radicalization."},
  {cat:"Peace & Cold War",q:"How did WWII reshape European and global power, and what new order emerged?",a:"WWII's consequences: <strong>Europe devastated</strong> — 40–55 million dead, cities destroyed, economies shattered; <strong>USA and USSR emerged as superpowers</strong> — replacing Europe's great powers; <strong>decolonization accelerated</strong> — colonial peoples who fought for freedom could not be permanently denied it (India 1947, Southeast Asia, Africa in the 1950s–60s); <strong>Germany divided</strong> into East and West (formal division 1949); the <strong>United Nations</strong> replaced the League of Nations; and <strong>European integration</strong> began (ECSC 1951, leading to the EU) as former enemies sought to prevent another war through economic interdependence.",tip:"WWII's reshaping of global power is the AP's big-picture consequence question. Know: USA + USSR as new superpowers (Europe relegated), decolonization accelerated, Germany divided, UN created, European integration began. The shift from a Europe-centered world to a bipolar USA-USSR world is the fundamental geopolitical consequence. European integration is the constructive response — binding former enemies together economically to prevent future war."},

  // Broader Themes
  {cat:"Broader Themes",q:"How does WWII represent the culmination of the European crisis that began in 1914?",a:"WWI destroyed European civilization's confidence; the interwar failures (Versailles, Depression, appeasement) allowed fascism to incubate; WWII was the result. The war can be understood as the continuation of WWI's unresolved problems: Germany's resentment of Versailles enabled Hitler; collective security failed again (as it had in the 1930s); and the same great-power competition that produced WWI produced WWII. The Holocaust was the ultimate product of racial antisemitism that had been intensifying since the 19th century. <strong>WWII was not an accident but the culmination of Europe's 30-year crisis (1914–1945)</strong>.",tip:"The '30-year war' or 'European Civil War' (1914–1945) framing is the AP's most important synthesis concept for these two chapters. WWII is not separate from WWI but its direct continuation through an unstable armistice. Everything in Chs. 15–17 is connected: WWI → Versailles → Depression → Fascism → WWII → Holocaust. Knowing this chain and being able to argue it in an essay is what earns top scores on synthesis questions."},
  {cat:"Broader Themes",q:"What was the moral legacy of WWII, and how did it shape postwar Europe?",a:"The Holocaust produced two major moral reckonings: the <strong>Nuremberg Trials</strong> (1945–1946) established the precedent of individual criminal responsibility for war crimes and crimes against humanity — 'following orders' was not a defense; and the <strong>Universal Declaration of Human Rights</strong> (1948) established international human rights norms. European integration was motivated partly by the desire to make another European war impossible through economic interdependence. Germany confronted its Nazi past through <em>Vergangenheitsbewältigung</em> (coming to terms with the past) — a model for other post-atrocity societies. The war also prompted decolonization: European states that had fought for freedom could not permanently deny it to others.",tip:"The moral legacy of WWII is AP-testable as an example of how historical events produce institutional change. Know: Nuremberg Trials (individual criminal responsibility, crimes against humanity), Universal Declaration of Human Rights (1948), European integration as war prevention, German confrontation with Nazi past. These are the constructive lessons drawn from the catastrophe — the postwar international order was designed to prevent exactly what 1914–1945 had produced."}
];

const VOCAB = [
  {cat:"Prelude",term:"Nazi-Soviet Pact (1939)",pos:"noun (proper)",def:"The non-aggression agreement between Germany and the Soviet Union (August 23, 1939), containing secret protocols dividing Eastern Europe into spheres of influence. <strong>Freed Hitler to attack Poland without fear of a two-front war</strong>. Shocked the world by allying two ideological enemies.",tip:"Know: August 23, 1939, non-aggression + secret protocols (Poland divided, Baltic states to USSR), enabled German attack on Poland. Stalin's motive: buy time (USSR not ready for war). Hitler's motive: avoid the two-front war that doomed WWI Germany. The pact's secret protocols were only admitted by the USSR in 1989."},
  {cat:"Prelude",term:"Anschluss (1938)",pos:"noun (German)",def:"The <strong>annexation of Austria by Germany</strong> (March 12, 1938), achieved without military resistance. Austria's chancellor was pressured to resign; German troops entered to 'restore order.' Hitler, an Austrian himself, had declared the union of all German-speaking peoples a goal since Mein Kampf. France and Britain protested but did not intervene.",tip:"Anschluss shows the Versailles prohibition (Austria forbidden to unite with Germany) was unenforceable without will to fight. Know: March 1938, bloodless annexation, Versailles violation, Western non-response. The lack of response emboldened Hitler for the Sudetenland demand six months later. The lesson Hitler drew: the democracies won't fight."},
  {cat:"Prelude",term:"Remilitarization of the Rhineland (1936)",pos:"noun (proper)",def:"Hitler's order sending German troops into the demilitarized Rhineland (March 7, 1936) in violation of both Versailles and Locarno. France and Britain protested but did not respond militarily. German generals had orders to retreat if opposed — they were not. The non-response was <strong>the most critical missed opportunity</strong> to stop Hitler.",tip:"The Rhineland remilitarization is the moment that could have stopped Hitler most easily and cheaply. German generals admitted afterward they would have retreated if opposed. France and Britain's failure to respond was a catastrophic miscalculation. Know: March 1936, Versailles AND Locarno violation, no military response, Hitler's gamble succeeded, emboldened future steps."},
  {cat:"Conduct",term:"Blitzkrieg",pos:"noun (German)",def:"'Lightning war' — the German military doctrine combining <strong>fast-moving armored columns, air support (dive bombers), and motorized infantry</strong> to punch through enemy lines, encircle defenders, and collapse the front before reorganization was possible. Defeated Poland (weeks), France (six weeks), and much of the USSR (initial phase).",tip:"Blitzkrieg's psychological dimension: it worked by preventing the enemy from responding coherently — speed and shock, not just firepower. Know: tanks + air support + speed = encirclement. Its limits: failed against Britain (the Channel) and the USSR (vast space, massive reserves). The AP may ask why Germany succeeded early and failed later — Blitzkrieg required confined spaces and limited opposition reserves."},
  {cat:"Conduct",term:"Battle of Britain (1940)",pos:"noun (proper)",def:"The German Luftwaffe's air campaign against Britain (July–October 1940) attempting to destroy the RAF as a prelude to Operation Sea Lion (invasion). The RAF, aided by <strong>radar</strong>, inflicted unsustainable losses. Germany switched from attacking airfields to bombing cities (the Blitz) — a strategic error that allowed the RAF to recover. Hitler postponed then cancelled the invasion.",tip:"Know: summer-autumn 1940, Luftwaffe vs. RAF, radar (British advantage), Hitler's error (switching from airfields to cities), Sea Lion cancelled. Churchill: 'Never in the field of human conflict was so much owed by so many to so few.' Britain's survival was the Allied cause's survival. The strategic error of bombing cities instead of airfields was arguably Hitler's worst decision of the war."},
  {cat:"Conduct",term:"Operation Barbarossa (1941)",pos:"noun (proper)",def:"Germany's invasion of the Soviet Union (June 22, 1941) — the largest military operation in history. Three million German troops attacked simultaneously on a 2,900 km front. Initial progress was staggering. But the USSR's depth, population, and relocated industry prevented a knockout blow; the advance stalled at Moscow (December 1941). Simultaneously triggered the Holocaust at industrial scale.",tip:"Barbarossa is the war's turning point — it's where Germany's defeat became likely. Know: June 22, 1941, three army groups, initial stunning success, stopped at Moscow (December 1941). Hitler's assumption: a quick victory in the USSR (like France). Reality: the USSR had unlimited depth and manpower. Barbarossa also triggered the mass shootings that became the Holocaust — Einsatzgruppen followed the army."},
  {cat:"Conduct",term:"Battle of Stalingrad (1942–1943)",pos:"noun (proper)",def:"The siege and battle for Stalingrad (August 1942 – February 1943) that became the war's decisive turning point. Soviet Operation Uranus encircled the German 6th Army; General Paulus surrendered with ~90,000 survivors (February 2, 1943). Germany lost the strategic initiative on the Eastern Front permanently. <strong>~800,000 Axis casualties</strong>.",tip:"Stalingrad = the decisive turning point of WWII. Know: 6th Army, Paulus surrenders February 2, 1943, Operation Uranus (encirclement), ~800,000 Axis casualties, Germany permanently on defensive after this. After Stalingrad, Germany could only delay defeat, not achieve victory. The scale of the Eastern Front is staggering — it dwarfs the Western European campaigns in casualties and significance."},
  {cat:"Conduct",term:"D-Day / Operation Overlord (1944)",pos:"noun (proper)",def:"The Allied amphibious invasion of Normandy (June 6, 1944) — the largest seaborne invasion in history. British, American, and Canadian troops landed on five beaches (Utah, Omaha, Gold, Juno, Sword). Combined with the Soviet summer offensive in the east, it forced Germany to fight on two major fronts simultaneously. Paris was liberated by August 1944.",tip:"D-Day is the Western Front's decisive event. Know: June 6, 1944, Normandy, five beaches, Allied deception (Operation Bodyguard convinced Germans the landing would be at Calais), combined with Soviet summer offensive. Its strategic significance: forcing Germany into a genuine two-front war was the final nail. Know it alongside Stalingrad (east) and the air campaign (oil/transportation) as the three elements that defeated Germany."},
  {cat:"Conduct",term:"Eastern Front",pos:"noun",def:"The war between Germany and the Soviet Union (June 1941 – May 1945) — by far the largest and most destructive theater of WWII. The USSR suffered an estimated <strong>27 million deaths</strong> (military and civilian). Approximately 80% of German military casualties occurred on the Eastern Front. The war there was uniquely brutal — a war of racial annihilation combined with conventional military operations.",tip:"The Eastern Front's scale demands emphasis: 27 million Soviet deaths, 80% of German casualties, the largest military engagement in human history. The AP underemphasizes it relative to the Western Front. Know: it was the decisive theater, Soviet military power bore the greatest burden, and the war there was simultaneously military and genocidal (Holocaust, Soviet POW starvation, civilian massacres)."},
  {cat:"Holocaust",term:"Holocaust (Shoah)",pos:"noun (proper)",def:"The systematic, state-sponsored genocide of approximately <strong>6 million Jews</strong> (two-thirds of European Jewry) and millions of others (Roma, disabled people, Soviet POWs, political prisoners) by Nazi Germany. Implemented through mobile killing units (Einsatzgruppen), ghettos, and death camps. The Wannsee Conference (January 1942) coordinated the 'Final Solution.'",tip:"The Holocaust is the most morally important subject in the chapter. Know the escalation: Nuremberg Laws (1935) → Kristallnacht (1938) → Einsatzgruppen mass shootings (1941) → Final Solution at Wannsee (January 1942) → death camps (Auschwitz, Treblinka, etc.). The bureaucratic, industrial character is crucial — it required the entire German state apparatus, not just SS fanatics."},
  {cat:"Holocaust",term:"Wannsee Conference (1942)",pos:"noun (proper)",def:"A meeting of senior Nazi officials (January 20, 1942) to coordinate the implementation of the 'Final Solution' — the systematic murder of all Jews in German-controlled territory. Eichmann took the minutes. It did not decide to kill Jews (that decision was already made) but coordinated the bureaucratic logistics of genocide.",tip:"Wannsee is the document of genocide's bureaucratic organization. Know: January 20, 1942, coordination meeting (not the original decision), Eichmann's minutes, 'Final Solution' officially coordinated. Its significance: it shows genocide as an administrative project requiring inter-agency cooperation — a chilling illustration of Hannah Arendt's 'banality of evil' (evil done by ordinary bureaucrats following orders)."},
  {cat:"Holocaust",term:"Einsatzgruppen",pos:"noun (plural, German)",def:"Mobile Nazi killing units that followed the German army into the Soviet Union (1941), systematically <strong>shooting Jews, Roma, Soviet officials, and Communist Party members</strong>. Killed approximately 1.5–2 million people before the death camps became operational. The Babi Yar massacre (Kyiv, September 1941 — ~33,000 Jews killed in two days) is their paradigm.",tip:"The Einsatzgruppen represent the Holocaust's earliest industrial-scale phase — mass shootings that preceded the death camps. Know: mobile killing units, followed army into USSR (1941), ~1.5–2 million killed, Babi Yar (Kyiv, 33,000 killed in 2 days). Their psychological toll on the killers was actually one reason the Nazis switched to gas chambers — shooting was considered psychologically damaging to the perpetrators."},
  {cat:"Holocaust",term:"Auschwitz-Birkenau",pos:"noun (proper)",def:"The largest Nazi death camp, located in occupied Poland. Approximately <strong>1.1–1.5 million people were killed there</strong>, primarily Jews but also Roma, Soviet POWs, and political prisoners. Victims were killed in gas chambers (using Zyklon B) upon arrival or worked to death. Liberated by Soviet troops (January 27, 1945 — now International Holocaust Remembrance Day).",tip:"Auschwitz is the Holocaust's defining location. Know: occupied Poland, ~1.1–1.5 million killed (mostly Jews), gas chambers (Zyklon B), liberated January 27, 1945. Its significance in both historical understanding and moral memory: it represents the industrialization of genocide — death organized with industrial efficiency. Know the liberation date (January 27) as International Holocaust Remembrance Day."},
  {cat:"Holocaust",term:"Warsaw Ghetto Uprising (1943)",pos:"noun (proper)",def:"The armed revolt of Jewish fighters in the Warsaw Ghetto (April 19 – May 16, 1943) against Nazi deportation to Treblinka. Approximately 750 fighters held off SS forces for nearly a month before the ghetto was destroyed. The uprising was militarily hopeless but morally significant as an act of resistance and dignity.",tip:"The Warsaw Ghetto Uprising is the AP's key example of Jewish resistance to the Holocaust. Know: April–May 1943, ~750 fighters, held off SS for a month, ghetto destroyed. Its significance: it shows Jews were not passive victims — they resisted when they could, though the odds were utterly overwhelming. The AP increasingly asks about Jewish agency and resistance within the Holocaust."},
  {cat:"Peace",term:"Yalta Conference (1945)",pos:"noun (proper)",def:"The February 1945 meeting of Roosevelt, Churchill, and Stalin that agreed on: <strong>Germany's division into occupation zones</strong>; 'free elections' in liberated Eastern Europe (vaguely defined — the source of Cold War conflict); the United Nations; and Stalin's commitment to enter the Pacific war after Germany's defeat.",tip:"Yalta is the most consequential Allied conference. Know: February 1945, Roosevelt/Churchill/Stalin, occupation zones, 'free elections' (the ambiguous promise), UN, Stalin's Pacific commitment. The 'free elections' promise is where the Cold War began — Stalin implemented Soviet-friendly governments; the West cried betrayal. The ambiguity was deliberate in 1945 (both sides needed each other to finish the war); it became catastrophic afterward."},
  {cat:"Peace",term:"Nuremberg Trials (1945–1946)",pos:"noun (proper)",def:"The international military tribunals trying leading Nazi war criminals for <strong>crimes against peace, war crimes, and crimes against humanity</strong>. 'Following orders' was ruled not an adequate defense. 12 defendants were sentenced to death (including Göring, Ribbentrop). Established the precedent that individuals — including state leaders — could be held criminally responsible under international law.",tip:"Nuremberg established two revolutionary legal principles: (1) waging aggressive war is a crime ('crimes against peace'); (2) following orders does not excuse participation in atrocities ('crimes against humanity'). Know: 1945–46, Nazi leaders tried, individual criminal responsibility, 'following orders' not a defense, 12 death sentences. Nuremberg is the foundation of modern international criminal law (ICC)."},
  {cat:"Peace",term:"Marshall Plan (1947)",pos:"noun (proper)",def:"U.S. Secretary of State George Marshall's program providing <strong>~$13 billion in economic aid to Western Europe</strong> (1948–1952) to rebuild war-devastated economies. It rebuilt Western European economies, tied them to the USA, and prevented communist parties from exploiting post-war poverty to gain power. The USSR refused Marshall aid and prohibited Eastern European satellite states from accepting it.",tip:"The Marshall Plan is the lesson learned from Versailles: generous postwar treatment prevents radicalization. Know: 1947, ~$13 billion, Western European economic recovery, prevented communist party electoral gains, USSR refused it. Its contrast with Versailles is the AP's key point — punitive peace (1919) led to Nazism; generous reconstruction (1947) led to stable Western democracy. The Cold War context explains why the USA was willing to spend: preventing communist expansion."},
  {cat:"Peace",term:"Iron Curtain",pos:"noun",def:"Winston Churchill's phrase (March 5, 1946 speech at Fulton, Missouri): 'From Stettin in the Baltic to Trieste in the Adriatic, an <strong>iron curtain has descended across the Continent</strong>.' Described the division of Europe between Soviet-dominated Eastern Europe and the free West. Named the Cold War's fundamental geopolitical reality.",tip:"Churchill's Iron Curtain speech is the moment the Cold War was publicly named. Know: March 5, 1946, Fulton Missouri, 'from Stettin to Trieste,' describes Soviet control of Eastern Europe. It's both a geographical description and a political warning. The phrase became the defining metaphor of the Cold War — the Iron Curtain as a physical (Berlin Wall) and symbolic division of Europe."},
  {cat:"Peace",term:"Truman Doctrine (1947)",pos:"noun (proper)",def:"President Truman's 1947 commitment that the United States would <strong>support free peoples resisting subjugation by armed minorities or outside pressures</strong> — specifically Greece and Turkey, which faced communist pressure. Established the principle of American containment of Soviet expansion.",tip:"The Truman Doctrine is the political complement to the Marshall Plan's economic containment. Know: 1947, Greece + Turkey (immediate context), commitment to support any country resisting communist pressure, established 'containment' as US policy. Together with the Marshall Plan, it defined the West's Cold War strategy: economic aid + political commitment to prevent Soviet expansion."},
  {cat:"Peace",term:"United Nations",pos:"noun (proper)",def:"The international organization founded in 1945 to replace the League of Nations, with 51 original member states. The <strong>Security Council</strong> (5 permanent members with veto power: USA, USSR, UK, France, China) was designed to overcome the League's weakness — but the veto power meant Cold War paralysis when superpowers disagreed.",tip:"The UN is the League of Nations redesigned to overcome its failures. Know: 1945, 51 founding members, Security Council with veto (5 permanent members). Its design flaw: the veto made it paralyzed when the USA and USSR disagreed — which was most of the Cold War. But it provided forums for negotiation and peacekeeping that the League entirely lacked."},
  {cat:"Peace",term:"European integration",pos:"noun",def:"The postwar project of binding European states together economically and politically to prevent future war. Began with the <strong>European Coal and Steel Community</strong> (ECSC, 1951 — France, Germany, Italy, Benelux) pooling coal and steel production; led to the <strong>Treaty of Rome</strong> (1957) creating the European Economic Community (EEC); eventually became the European Union (1992).",tip:"European integration is WWII's most constructive consequence. Know: ECSC (1951, Robert Schuman, Jean Monnet), Treaty of Rome (1957), EEC → EU. The logic: if France and Germany's economies are interdependent, war between them becomes economically suicidal. The AP may ask about the origins of the EU — always trace it to WWII's lessons about the costs of European nationalism."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
