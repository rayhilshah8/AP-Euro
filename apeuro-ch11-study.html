<script>
const CONCEPTS = [
  // Conservative Order
  {cat:"Conservative Order",q:"What were the core principles of post-1815 conservatism, and who articulated them?",a:"Post-1815 conservatism (associated with <strong>Edmund Burke</strong>'s earlier writings and Metternich's practice) held that: society is organic, not a machine to be redesigned by reason; existing institutions (monarchy, aristocracy, Church) embody accumulated wisdom that reason alone cannot replicate; change should be gradual and organic, not revolutionary; and order and stability are higher values than abstract individual rights. Metternich applied these principles to suppress liberalism and nationalism across Europe.",tip:"Conservatism vs. liberalism is the chapter's central ideological opposition. Know Burke as the intellectual father of conservatism (Reflections on the Revolution in France, 1790) and Metternich as its practitioner. The AP often asks you to compare these ideologies — know each one's core commitments and what they fear most."},
  {cat:"Conservative Order",q:"What was the Concert of Europe, and how did it attempt to preserve the post-1815 settlement?",a:"The Concert of Europe was the system of <strong>great-power cooperation</strong> established at Vienna (1815) in which Britain, Austria, Prussia, Russia, and (later) France agreed to meet periodically to manage European affairs and suppress revolutionary threats. The Congress System (Congresses of Aix-la-Chapelle 1818, Troppau 1820, Laibach 1821, Verona 1822) authorized military intervention against liberal and nationalist revolts. Britain eventually withdrew from the interventionist approach, weakening the system.",tip:"The Concert of Europe is the conservative answer to the French Revolutionary threat. It's multilateral great-power management of Europe — the ancestor of modern international organizations. Know: founded at Vienna 1815, Metternich its architect, Britain's eventual withdrawal weakened it, revolutions of 1830 and 1848 tested and ultimately broke it."},
  {cat:"Conservative Order",q:"What were the Carlsbad Decrees (1819), and what do they reveal about conservative repression?",a:"Following the assassination of a conservative German playwright (Kotzebue) by a student nationalist, Metternich pushed through the German Confederation's <strong>Carlsbad Decrees</strong>: they suppressed student organizations (Burschenschaften), imposed press censorship, and established a commission to investigate revolutionary activity across German states. They effectively silenced liberal and nationalist agitation in German universities for a generation.",tip:"The Carlsbad Decrees are your specific evidence for Metternich's repressive system in action. Know: 1819, triggered by assassination, targeted student nationalists, imposed censorship. They show that conservatism wasn't passive — it actively suppressed dissent. They also show the university as a hotbed of nationalism — students were at the forefront of liberal-nationalist movements."},

  // Ideologies of Change
  {cat:"Ideologies of Change",q:"What was 19th-century liberalism, and what were its core demands?",a:"19th-century liberals (primarily the educated middle class — lawyers, professionals, merchants) demanded: <strong>constitutional government</strong> (written constitutions limiting royal power); <strong>civil liberties</strong> (press freedom, freedom of religion, habeas corpus); <strong>representative government</strong> (elected legislatures, though with property qualifications — not universal suffrage); and <strong>free markets</strong> (no trade restrictions, laissez-faire economics). They wanted to reform the old regime, not overthrow all social order.",tip:"Know 19th-century liberalism clearly: it's not democracy. Most liberals wanted property-based voting (only property-owning men could vote), not universal suffrage. They were the bourgeoisie's ideology — they wanted political power to match their economic power, but feared the 'mob' as much as they feared the aristocracy."},
  {cat:"Ideologies of Change",q:"What was 19th-century nationalism, and how did it interact with liberalism?",a:"Nationalism held that people sharing a common <strong>language, culture, history, or ethnicity</strong> form a natural community (a 'nation') that deserves political self-determination — its own state. Before 1848, nationalism and liberalism were allied: both opposed the conservative order, and most nationalists also wanted constitutional government. The German philosopher <strong>Johann Gottlieb Fichte</strong> articulated cultural nationalism in his <em>Addresses to the German Nation</em> (1807–1808) after Napoleon's conquest.",tip:"Liberal nationalism (before 1848) = the two ideologies working together against conservatism. After 1848, they often split: nationalists sometimes embraced authoritarian means to achieve national unity (Bismarck). This divergence between liberal and authoritarian nationalism is crucial for understanding the later 19th century."},
  {cat:"Ideologies of Change",q:"What were the major radical movements of this period, and how did they differ from liberals?",a:"Radicals went further than liberals: the <strong>Chartists</strong> in Britain demanded universal male suffrage, secret ballot, payment of MPs, and other democratic reforms in the People's Charter (1838). Some radicals advocated women's suffrage. <strong>Republicans</strong> (especially in France) wanted to abolish monarchy entirely. <strong>Socialists</strong> (Utopians, early Marxists) questioned whether political reform alone could address economic inequality without changing property relations.",tip:"Liberals, radicals, and socialists are a spectrum from moderate to revolutionary. Know the distinctions: liberals wanted constitutional monarchy with property-based voting; radicals wanted democracy (universal male suffrage); socialists wanted to address economic inequality. The Chartists are Britain's clearest example of radical democratic demands — know the six points of the Charter."},
  {cat:"Ideologies of Change",q:"What was the Haitian Revolution (1791–1804), and why was it historically significant?",a:"Saint-Domingue (Haiti) was France's most profitable Caribbean colony, producing sugar through enslaved African labor. The French Revolution's rhetoric of liberty inspired a slave revolt led initially by <strong>Toussaint L'Ouverture</strong>. After defeating French, British, and Spanish forces, Haiti declared independence in 1804 — the first <strong>Black republic and the only successful slave revolt in history</strong>. Napoleon had attempted to restore slavery and failed.",tip:"The Haitian Revolution is the most radical application of French Revolutionary ideals — it extended liberty to enslaved people, which the French Revolution itself refused to do permanently. It terrified slaveholding societies across the Atlantic world and inspired later Latin American independence movements. The AP increasingly tests this as a global consequence of the French Revolution."},
  {cat:"Ideologies of Change",q:"How did Latin American independence movements connect to Enlightenment and revolutionary ideas?",a:"Latin American creole elites (Spanish-descended, born in Americas) were influenced by Enlightenment ideas and the American and French Revolutions. Napoleon's invasion of Spain (1808) — which overthrew the Spanish king — created a power vacuum that creole elites exploited to claim independence. <strong>Simón Bolívar</strong> (Venezuela, Colombia, Ecuador, Peru, Bolivia) and <strong>José de San Martín</strong> (Argentina, Chile) led the major liberation campaigns (1810s–1820s). Brazil achieved independence peacefully from Portugal (1822).",tip:"Latin American independence is the geopolitical consequence of Napoleon's overreach in Europe. Know the trigger (Spanish king overthrown → creoles claim authority), the key leaders (Bolívar, San Martín), and the outcome (independence achieved but liberal democracy limited by inequality and caudillo rule). Connect to the Monroe Doctrine (1823) — U.S. and Britain supported independence to open trade."},

  // Revolutions 1820s–1830s
  {cat:"Revolutions 1820–1830",q:"What were the revolutions of 1820, and how did the Concert of Europe respond?",a:"Liberal revolts broke out in Spain, Portugal, and the Kingdom of Naples (all seeking constitutional government inspired by the French model). The Concert of Europe, at Metternich's instigation, authorized <strong>military intervention</strong>: Austrian troops crushed the Neapolitan revolt; France (at the Congress of Verona, 1822) suppressed the Spanish revolt. Britain, under Canning, refused to support intervention — the first crack in Concert unity.",tip:"The revolts of 1820 test the Concert of Europe's interventionist policy. Austria's success in Italy and France's in Spain show the system working — but Britain's withdrawal signals its limits. The pattern: conservative powers intervene militarily to suppress liberal revolts. Know this as the system Metternich designed to prevent 1789 from recurring."},
  {cat:"Revolutions 1820–1830",q:"What was the Greek War of Independence (1821–1829), and why was it a special case?",a:"Greek nationalists revolted against Ottoman rule in 1821, inspiring European Romantic enthusiasm for the 'cradle of civilization.' The Concert system should have supported Ottoman order — but Russia (Pan-Slavic interests and Orthodox solidarity), Britain, and France eventually <strong>intervened militarily on the Greek side</strong>, destroying the Ottoman fleet at Navarino (1827). Greece achieved independence in 1829.",tip:"The Greek case is the Concert of Europe's first major exception — the great powers supported a nationalist revolt because it was anti-Ottoman (Russia's strategic interest), romantically appealing (Byron died there), and Christian. It shows that even conservative powers bent the rules when their own interests or cultural sympathies pointed elsewhere. Romanticism (Byron) meets geopolitics."},
  {cat:"Revolutions 1820–1830",q:"What were the revolutions of 1830, and what were their outcomes?",a:"A second wave of liberal-nationalist revolts: <strong>France</strong> — Charles X's reactionary decrees triggered the July Revolution; he was replaced by the 'bourgeois king' Louis-Philippe under a more liberal constitutional monarchy. <strong>Belgium</strong> — successfully broke from the Netherlands and established a constitutional monarchy. <strong>Poland</strong> — nationalist revolt against Russian rule was brutally crushed. <strong>Italy and Germany</strong> — revolts suppressed by Austria. Pattern: Atlantic-coast constitutional monarchies succeeded; central and eastern European revolts failed.",tip:"1830 revolutions reveal geography of success: constitutional monarchies established in France and Belgium (West); revolts crushed in Poland, Italy, Germany (East/Center). The pattern reflects the Concert's continuing effectiveness in the east and center and its inability to control the Atlantic states. Belgium's independence is particularly significant — it remains a flashpoint into 1914."},

  // Revolutions of 1848
  {cat:"Revolutions of 1848",q:"What caused the revolutions of 1848, and why did they erupt so broadly?",a:"Multiple converging causes: <strong>economic distress</strong> — crop failure and potato blight caused widespread hunger; industrial depression created urban unemployment. <strong>Political</strong> — liberal and nationalist frustrations with the post-1815 settlement came to a head. <strong>Social</strong> — artisans and workers faced displacement by industrialization. The revolutions were sparked in Paris (February 1848) and spread almost simultaneously across France, Austria, Prussia, Italy, Hungary, and elsewhere — linked by shared ideological currents and the speed of communication.",tip:"1848 is the most important single year of the chapter — 'the year of revolutions.' Know the two types of causes: economic (hunger, unemployment) and political (liberal-nationalist frustration). The simultaneous spread across Europe shows both shared grievances and the role of communication networks in transmitting revolutionary news rapidly."},
  {cat:"Revolutions of 1848",q:"What happened in France during 1848, and what was the outcome?",a:"The February Revolution overthrew Louis-Philippe and established the <strong>Second Republic</strong> with universal male suffrage. But elections produced a conservative majority (rural France was not radical); the June Days uprising (Parisian workers demanding socialist economic policies) was brutally suppressed by the new republic. Louis-Napoleon Bonaparte was elected president by a huge majority, then seized power in a coup (1851) and declared himself Emperor Napoleon III (1852).",tip:"France in 1848 shows the limits of radical revolution: universal suffrage, when applied, produced a conservative result (rural majority voted against Paris radicals). The June Days is the AP's key example of class conflict within the revolution — bourgeois republicans crushing socialist workers. Louis-Napoleon's rise shows how revolutionary instability leads to authoritarian order."},
  {cat:"Revolutions of 1848",q:"What happened in the Austrian Empire during 1848, and why did the revolutions fail there?",a:"Multiple simultaneous revolts: <strong>Viennese liberals</strong> forced Metternich to flee; <strong>Hungarian nationalists</strong> (Kossuth) declared autonomy; <strong>Czech nationalists</strong> held a Slavic Congress; Italian nationalists rose in Milan and Venice. The Austrian government recovered by playing nationalities against each other (Slavs vs. Hungarians; Croatians vs. Hungarians) and using Russian military aid to crush Hungary (1849). The young Emperor Franz Joseph I restored absolutism.",tip:"The Austrian Empire's 1848 crisis shows how ethnic nationalism could be both a revolutionary force and the source of its own defeat. The different nationalities within the empire had incompatible claims — Czechs, Hungarians, Croatians, Germans — and could be played off against each other. This 'divide and rule' approach saved the Habsburg Empire until 1918."},
  {cat:"Revolutions of 1848",q:"Why did the revolutions of 1848 ultimately fail, and what were their long-term consequences?",a:"Most revolutions failed because: <strong>conservative forces regrouped</strong> and used military superiority; <strong>liberals feared the radical left</strong> (socialists, workers) more than they feared conservatives — leading them to side with order against their working-class allies; <strong>nationalist movements competed</strong> rather than cooperated (as in Austria); and peasants, who had benefited from the abolition of feudal dues, had little incentive to keep fighting. Long-term: serfdom abolished in Austrian Empire; some constitutions granted (even if later modified); nationalism proved it couldn't be suppressed — it would return as a state-building tool.",tip:"'Why did 1848 fail?' is a classic AP question. Know all four reasons. The most analytically rich point: liberals chose order over democracy when the working class threatened property — showing the class limits of liberal revolution. But 1848's long-term consequences (end of feudalism in Austria, nationalist momentum) show that even failed revolutions transform the political landscape."},

  // Reform in Britain
  {cat:"Reform in Britain",q:"How did Britain avoid revolution in the 1830s–1840s while continental Europe exploded, and what reforms were enacted?",a:"Britain avoided revolution through gradual reform: the <strong>Reform Act of 1832</strong> gave the middle class the vote; the <strong>Factory Acts</strong> (1833, 1844, 1847) regulated working conditions; the <strong>repeal of the Corn Laws</strong> (1846) reduced bread prices by allowing grain imports. The <strong>Chartist movement</strong> (demanding full democracy) was ultimately unsuccessful but kept pressure for reform alive. Britain's flexible political system — Parliament could absorb reform demands — prevented the revolutionary deadlock that plagued France.",tip:"Britain as the counter-example to continental revolution is an AP favorite. The argument: Britain had the safety valve of Parliamentary reform. Rather than revolution, it had evolution. The Reform Act of 1832 gave the middle class a stake in the system; later reforms gave workers incremental improvements. Know this as 'reform instead of revolution.'"},

  // Romanticism
  {cat:"Romanticism",q:"What was Romanticism, and what was it reacting against?",a:"Romanticism (c. 1790s–1850s) was a broad cultural movement reacting against <strong>Enlightenment rationalism</strong> (which Romantics saw as cold and mechanical) and against the dislocation of industrialization and revolution. It celebrated: <strong>emotion over reason</strong>; <strong>nature over industry</strong>; <strong>the individual genius</strong> over universal rules; <strong>the past and tradition</strong> (medieval especially) over rational progress; <strong>the supernatural and mysterious</strong> over scientific certainty. It was both politically radical (some Romantics inspired by revolution) and politically conservative (others defending tradition against rationalist destruction).",tip:"Romanticism has two political valences on the AP — radical (inspiring revolution and nationalism) and conservative (Burke's organic tradition). Both are Romantic. The key is what they share: rejection of Enlightenment rationalism. Know the Romantic reaction as having both progressive and reactionary versions — the AP rewards this nuance."},
  {cat:"Romanticism",q:"Who were the major Romantic poets, and what themes did they develop?",a:"<strong>William Wordsworth</strong> (England) — nature as spiritual teacher, the ordinary person as worthy subject; broke from neoclassical formalism. <strong>Lord Byron</strong> — the 'Byronic hero' (brooding, rebellious, passionate); died fighting for Greek independence, embodying Romantic nationalism. <strong>Percy Bysshe Shelley</strong> — radical politics, revolt against tyranny (<em>Prometheus Unbound</em>). <strong>John Keats</strong> — beauty and mortality, sensuous imagery. In Germany, <strong>Goethe</strong>'s <em>Faust</em> explored the restless human striving for transcendent knowledge.",tip:"Know at least three Romantic poets and their distinctive themes. Byron is most AP-relevant because he connects Romanticism to nationalism (Greek independence) and political radicalism. Wordsworth is most relevant for the nature theme. Goethe's Faust is relevant for the Romantic individual's unlimited aspirations — which also connects to the chapter's themes of revolutionary ambition."},
  {cat:"Romanticism",q:"How did Romanticism manifest in visual art, music, and architecture?",a:"In painting: <strong>Eugène Delacroix</strong> (France) depicted emotional, dramatic historical scenes (<em>Liberty Leading the People</em>, 1830 — an allegory of revolution). <strong>J.M.W. Turner</strong> (Britain) captured the sublime power of nature and, later, industry. In music: <strong>Beethoven</strong> broke classical forms with emotional intensity; his <em>Ninth Symphony</em> premiered in 1824. <strong>Chopin, Liszt, Schubert</strong> expressed intense emotion through piano music. Gothic Revival architecture celebrated the medieval past over classical rationality.",tip:"Art and music examples are AP evidence for cultural arguments. Know: Delacroix (painting, political Romanticism), Turner (nature/sublime), Beethoven (musical Romanticism, emotional intensity). Liberty Leading the People is especially useful — it's a Romantic painting of a liberal-nationalist revolution, connecting art and politics directly."},
  {cat:"Romanticism",q:"How did Romanticism connect to nationalism, and how did it serve political purposes?",a:"Romantic nationalism celebrated the unique <strong>spirit of each people (Volksgeist)</strong> — expressed in their language, folk tales, music, and history. German Romantics like the <strong>Brothers Grimm</strong> collected folk tales to document German cultural identity; composers like <strong>Chopin</strong> and <strong>Smetana</strong> drew on national folk traditions. This cultural nationalism gave emotional and aesthetic content to political nationalism — people needed to feel their nation before they could fight for it.",tip:"Romantic nationalism is the cultural dimension of political nationalism. The Brothers Grimm collecting German fairy tales is as much a nationalist project as a literary one. Know: Volksgeist (spirit of a people), folk culture as national identity, Romantic artists as nationalist consciousness-builders. This connects directly to the revolutions of 1848 — Romantic nationalism provided the emotional fuel."},

  // Broader Themes
  {cat:"Broader Themes",q:"What is the 'springtime of peoples,' and what does it reveal about the relationship between liberalism and nationalism in 1848?",a:"The revolutions of 1848 were called the 'springtime of peoples' because liberal and nationalist aspirations seemed simultaneously achievable — constitutional government AND national self-determination. But the revolutions revealed the tension: different ethnic groups (within Austria, for example) had incompatible national claims; and liberal middle classes feared working-class social revolution more than they feared conservative repression. <strong>The alliance of liberalism and nationalism was real but unstable</strong> — after 1848, nationalism increasingly divorced from liberalism.",tip:"'Springtime of peoples' is a key AP concept for 1848. The ideological alliance of liberal + nationalist movements is the political force driving the revolutions. Its collapse — liberals choosing order over democracy; nationalists fighting each other — explains the failure. After 1848, Bismarck showed that nationalism could succeed through authoritarian means without liberal allies."},
  {cat:"Broader Themes",q:"How does this period (1815–1850) set up the later 19th century?",a:"The period's failures and successes shaped what came next: <strong>conservatism's partial success</strong> meant the old order survived but increasingly on borrowed time; <strong>liberalism's partial victory</strong> (Britain, Belgium, France after 1830) showed constitutional government was achievable; <strong>nationalism's frustration</strong> in 1848 shifted tactics from popular revolution to state-building through war (Cavour in Italy, Bismarck in Germany); and <strong>Romanticism's emotional nationalism</strong> provided the cultural fuel for nation-building projects. The 1850s–1870s would see nationalism succeed through 'blood and iron' rather than revolution.",tip:"This synthesis card bridges Ch. 11 to Ch. 12 (nationalism and unification). The key insight: nationalism didn't die in 1848 — it changed its method. The failed revolutions taught nationalist leaders that popular uprisings couldn't defeat great-power armies. The solution (Bismarck, Cavour): use state power and war, not liberal revolution. Know this as a major turning point in political strategy."}
];

const VOCAB = [
  {cat:"Conservatism",term:"Conservatism (19th century)",pos:"noun",def:"The political ideology defending <strong>traditional institutions</strong> (monarchy, Church, aristocracy, property), organic social order, and gradual change against revolutionary transformation. Associated with Edmund Burke (intellectual), Metternich (practitioner). Feared the French Revolution's destruction of accumulated social wisdom.",tip:"19th-century conservatism is NOT the same as modern conservatism. It defended monarchy, aristocratic privilege, and state religion — things modern conservatives don't necessarily support. Know it as the ideology of the post-1815 settlement: preserve what exists, suppress revolution, restore legitimacy."},
  {cat:"Conservatism",term:"Metternich",pos:"noun (proper)",def:"Austrian foreign minister and state chancellor (1809–1848), architect of the <strong>Concert of Europe</strong> and the post-1815 conservative settlement. Suppressed liberal and nationalist movements through the Congress System, Carlsbad Decrees, and Austrian military intervention. Forced to resign by the Viennese Revolution (March 1848).",tip:"Metternich is the face of post-Napoleonic conservatism. His fall in 1848 symbolizes the collapse of the system he built. Know: Concert of Europe, Congress System, Carlsbad Decrees (1819), Austrian interventions in Italy, and his resignation in 1848. He's a useful foil for any essay on liberalism or nationalism."},
  {cat:"Conservatism",term:"Concert of Europe",pos:"noun (proper)",def:"The system of great-power cooperation established at Vienna (1815) in which Britain, Austria, Prussia, Russia, and France agreed to meet periodically to manage European affairs and suppress revolutionary threats. Operated through Congresses (Aix-la-Chapelle, Troppau, Laibach, Verona) until British withdrawal weakened it.",tip:"The Concert of Europe is the conservative order's international mechanism. Know it as the predecessor of modern multilateral diplomacy — the first real attempt at collective great-power management. Its failure to suppress the 1848 revolutions permanently shows its limits. It evolved into the 'balance of power' system that collapsed in 1914."},
  {cat:"Conservatism",term:"Edmund Burke",pos:"noun (proper)",def:"British statesman and political philosopher (1729–1797) whose <em>Reflections on the Revolution in France</em> (1790) is the founding text of modern conservatism. He argued that society is an organic partnership between the dead, the living, and the unborn; existing institutions embody accumulated wisdom; and revolutionary change destroys what cannot be rebuilt.",tip:"Burke is the intellectual father of conservatism. Know: Reflections on the Revolution in France (1790), organic society metaphor, critique of abstract rights, defense of tradition and gradual change. He's the conservative counter to Paine's Rights of Man — know both for comparative AP essays."},
  {cat:"Conservatism",term:"Carlsbad Decrees (1819)",pos:"noun (proper)",def:"Metternich's package of repressive measures pushed through the German Confederation: <strong>banned student nationalist organizations</strong> (Burschenschaften), imposed press censorship, and established a commission to investigate revolutionary activity. Silenced liberal and nationalist agitation in German universities for a generation.",tip:"The Carlsbad Decrees are your specific evidence for Metternich's repressive apparatus. Know: 1819, triggered by assassination of Kotzebue, targeted student nationalists, imposed censorship. They show conservatism as actively repressive, not merely passive. Also shows universities as centers of nationalist agitation."},
  {cat:"Liberalism & Nationalism",term:"Liberalism (19th century)",pos:"noun",def:"The political ideology of the educated middle class demanding <strong>constitutional government, civil liberties</strong> (press, religion, speech), <strong>representative government</strong> (with property qualifications — not universal suffrage), and <strong>free markets</strong>. Opposed both aristocratic privilege and radical democracy.",tip:"19th-century liberalism ≠ universal democracy. Property-based voting = only men with property can vote. This is the crucial distinction that separates liberals from radicals. Most liberals feared the propertyless working class as much as they feared the aristocracy. Know this class basis of 19th-century liberalism."},
  {cat:"Liberalism & Nationalism",term:"Nationalism",pos:"noun",def:"The political ideology holding that people sharing a common language, culture, history, or ethnicity form a natural community (a 'nation') deserving political self-determination — their own sovereign state. In the period 1815–1848, usually allied with liberalism against conservative dynastic empires.",tip:"Nationalism has multiple forms: liberal nationalism (1815–1848, allied with constitutionalism) and authoritarian nationalism (after 1848, used by Bismarck and Cavour). The AP may ask you to trace nationalism's evolution — it starts liberal and becomes the tool of conservative statecraft by the 1860s."},
  {cat:"Liberalism & Nationalism",term:"Volksgeist",pos:"noun (German)",def:"'Spirit of the people' — the Romantic nationalist concept that each ethnic group has a unique collective soul expressed in its language, folk traditions, history, and culture. Associated with German Romantic philosopher <strong>Johann Gottlieb Herder</strong> and nationalists like Fichte.",tip:"Volksgeist is the philosophical foundation of ethnic nationalism. It implies that nations are natural, not artificial — that they exist before states and deserve states of their own. This idea powered the nationalist movements of 1848 and nation-building projects of the 1860s–1870s."},
  {cat:"Liberalism & Nationalism",term:"Johann Gottlieb Fichte",pos:"noun (proper)",def:"German Romantic philosopher (1762–1814) whose <em>Addresses to the German Nation</em> (1807–1808), delivered in Napoleon-occupied Berlin, argued for the <strong>unique cultural identity of the German people</strong> and the necessity of national education to cultivate German national consciousness.",tip:"Fichte is your go-to figure for early German cultural nationalism. His Addresses were delivered under French occupation — making them simultaneously a cultural and political statement. Know: Addresses to the German Nation (1807–08), reaction to Napoleon's conquest, cultural-linguistic basis of national identity."},
  {cat:"Liberalism & Nationalism",term:"Chartism",pos:"noun",def:"A British working-class movement (1838–1857) demanding six democratic reforms in the <strong>People's Charter</strong>: universal male suffrage, secret ballot, no property qualification for MPs, payment of MPs, equal electoral districts, and annual parliaments. The first mass working-class political movement in British history.",tip:"Chartism is Britain's equivalent of continental radicalism. The six points are worth knowing — they represent a complete democratic program. Parliament rejected the Charter three times (1839, 1842, 1848), but most of its demands were eventually enacted over the next century. Chartism shows that workers pushed for political democracy, not just economic reform."},
  {cat:"Liberalism & Nationalism",term:"Toussaint L'Ouverture",pos:"noun (proper)",def:"Leader of the Haitian Revolution (1791–1804), a former enslaved man who led the revolt in Saint-Domingue, defeated French, British, and Spanish forces, and established Haitian independence as the world's <strong>first Black republic</strong>. Captured by the French and died in prison (1803).",tip:"Toussaint L'Ouverture is the AP's key figure for connecting the French Revolution to global liberation movements. His revolution was the most radical application of Revolutionary ideals — it extended liberty to enslaved people, which France itself refused. Know his significance: first Black republic, only successful slave revolt in history, model for later liberation movements."},
  {cat:"Revolutions",term:"Revolutions of 1830",pos:"noun (proper)",def:"A second wave of liberal-nationalist revolts: France (July Revolution replacing Charles X with Louis-Philippe); <strong>Belgium</strong> (successfully independence from Netherlands); Poland (crushed by Russia); Italy and Germany (suppressed by Austria). Atlantic-coast constitutional monarchies succeeded; central and eastern European revolts failed.",tip:"1830 revolutions show the geographic pattern of conservative order: it holds in the east and center (where Austria and Russia project power) but cannot control the Atlantic states. Belgium's independence is particularly significant — it creates a new constitutionally governed state and is guaranteed by the great powers."},
  {cat:"Revolutions",term:"Revolutions of 1848",pos:"noun (proper)",def:"A massive wave of liberal-nationalist revolts across Europe (France, Austria, Prussia, Hungary, Italy, Bohemia, and elsewhere) triggered by economic distress and political frustration. The <strong>'Springtime of Peoples.'</strong> Most ultimately failed — conservative forces regrouped, liberals feared radicals, nationalities competed. Long-term impact: abolition of Austrian feudalism, nationalist momentum, collapse of the Concert system.",tip:"1848 is the chapter's climax. Know: causes (economic crisis + political frustration), scope (nearly all of Europe), why they failed (liberal fear of radicals, military defeat, nationalist divisions), and long-term consequences (serfdom abolished in Austria, nationalism survives, Concert of Europe effectively dead). 'Why did 1848 fail?' is an almost guaranteed AP question."},
  {cat:"Revolutions",term:"June Days (1848)",pos:"noun (proper)",def:"The violent suppression of a Parisian workers' uprising (June 1848) by the French republican government under General Cavaignac. Workers demanding socialist economic policies (national workshops) were crushed by the military — approximately 3,000 killed, 12,000 arrested. Revealed the class conflict within the 1848 revolution.",tip:"The June Days is the AP's clearest example of class conflict within the 1848 revolution. The bourgeois republicans — who had made the February Revolution — crushed the workers who wanted to extend it into economic democracy. This 'betrayal' is exactly what Marx predicted: liberal revolution serves bourgeois interests, not proletarian ones."},
  {cat:"Revolutions",term:"Decembrist Revolt (1825)",pos:"noun (proper)",def:"A failed <strong>military officers' uprising</strong> in Russia after Tsar Alexander I's death, led by liberal and nationalist officers who hoped to establish a constitutional monarchy. Quickly suppressed by Nicholas I, who became violently hostile to liberalism and nationalism as a result.",tip:"The Decembrist Revolt is the AP's example of failed Russian liberalism in the early period. Know: 1825, military officers (not peasants), constitutional demands, quickly crushed. Nicholas I's response (extreme repression) set the tone for Russian conservatism throughout his reign (1825–1855)."},
  {cat:"Revolutions",term:"Repeal of the Corn Laws (1846)",pos:"noun (proper)",def:"British legislation abolishing protective tariffs on imported grain. The Corn Laws had kept bread prices high to protect landed aristocrats' grain profits. Their repeal — pushed by the <strong>Anti-Corn Law League</strong> (Cobden, Bright) — represented a victory for free trade and the industrial middle class over the landed aristocracy.",tip:"The Corn Laws repeal is Britain's key economic reform of the period. It shows the industrial middle class defeating the landed aristocracy on a crucial economic question. Free trade (no tariffs) was the economic dimension of liberalism. Know: 1846, Corn Laws kept bread prices high, repeal = cheap bread + free trade victory."},
  {cat:"Romanticism",term:"Romanticism",pos:"noun",def:"A broad cultural movement (c. 1790–1850) reacting against Enlightenment rationalism and industrialization by celebrating <strong>emotion, nature, the individual genius, the medieval past, the supernatural, and national folk culture</strong>. Politically ambiguous: some Romantics were liberal nationalists; others were conservative defenders of tradition.",tip:"Romanticism is culturally important but also politically significant: it provided the emotional vocabulary for nationalism (folk culture, historical myth, language). Know its core characteristics and its political ambiguity — it fed both revolutionary nationalism (Byron, Delacroix) and conservative nostalgia (Burke's organic society)."},
  {cat:"Romanticism",term:"Lord Byron",pos:"noun (proper)",def:"British Romantic poet (1788–1824) known for the 'Byronic hero' (brooding, passionate, rebellious). Died fighting for Greek independence. Embodied Romantic engagement with nationalist political causes and the idea of the heroic individual sacrificing for freedom.",tip:"Byron is Romanticism's political celebrity — he turned Romantic emotion into political action by dying for Greek independence. He's your best evidence for Romanticism's connection to liberal nationalism. The 'Byronic hero' is the Romantic ideal of the heroic individual — relevant for understanding the cult of revolutionary leaders."},
  {cat:"Romanticism",term:"Eugène Delacroix",pos:"noun (proper)",def:"French Romantic painter (1798–1863) known for dramatic, emotionally intense historical scenes. <em>Liberty Leading the People</em> (1830) depicted the July Revolution as a heroic allegory — the allegorical figure of Liberty leading workers and bourgeois over barricades.",tip:"Delacroix and Liberty Leading the People is the AP's paradigmatic intersection of Romanticism and political revolution. Know the painting, its date (1830), and what it represents: Romantic style (dramatic, emotional, allegorical) in service of liberal-nationalist politics. It's also useful for DBQs on artistic responses to political events."},
  {cat:"Romanticism",term:"Ludwig van Beethoven",pos:"noun (proper)",def:"German composer (1770–1827) whose work bridges Classical and Romantic periods. His <strong>Ninth Symphony</strong> (1824, premiered while he was completely deaf) with its choral finale ('Ode to Joy') expressed Romantic ideals of human brotherhood and transcendence. His music broke Classical formal constraints with emotional power.",tip:"Beethoven is the musician of Romanticism. Know: bridges Classical to Romantic, Ninth Symphony (1824), 'Ode to Joy,' composed while deaf (itself a Romantic triumph of spirit over physical limitation). The Ninth's 'Ode to Joy' became the European Union's anthem — its ideals of brotherhood proved enduringly powerful."},
  {cat:"Romanticism",term:"Brothers Grimm",pos:"noun (proper)",def:"Jacob and Wilhelm Grimm, German scholars who collected and published <strong>German folk tales</strong> (<em>Grimm's Fairy Tales</em>, 1812) as an act of nationalist cultural preservation — documenting the unique folk spirit (Volksgeist) of the German people. Also produced the first scientific German dictionary.",tip:"The Brothers Grimm collecting folk tales is both a literary and a nationalist project. They weren't just children's authors — they were cultural nationalists preserving German identity. This is how Romanticism served nationalism: folk culture (songs, tales, language) became the evidence of a nation's unique spirit deserving political independence."},
  {cat:"Romanticism",term:"Gothic Revival",pos:"noun",def:"An architectural movement (19th century) that deliberately revived <strong>medieval Gothic styles</strong> (pointed arches, vaulted ceilings, decorative stonework) rather than classical forms. Associated with Romantic nostalgia for the medieval past and seen as authentically national (especially in Britain and Germany). Notable examples: Houses of Parliament (London), Cologne Cathedral completion.",tip:"Gothic Revival is Romanticism's architectural expression — it rejects classical rationalism (Enlightenment architecture) for emotional, historical, nationally-rooted forms. The Houses of Parliament in Gothic style is telling: British democracy housed in medieval forms = tradition and progress combined. Good evidence for Romanticism's cultural conservatism."},
  {cat:"Romanticism",term:"Simón Bolívar",pos:"noun (proper)",def:"Venezuelan military and political leader (1783–1830) known as 'El Libertador,' who led independence movements across <strong>Venezuela, Colombia, Ecuador, Peru, and Bolivia</strong>. Influenced by Enlightenment ideas and inspired by the American and French Revolutions. Attempted to create a united Latin American federation but failed.",tip:"Bolívar is the AP's key figure for Latin American independence. Know: 'El Libertador,' Venezuela/Colombia/Ecuador/Peru/Bolivia, influenced by Enlightenment and French Revolution, failed to unite Latin America. His failure to create unity foreshadowed the continent's political fragmentation and instability — caudillo rule rather than liberal democracy."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
