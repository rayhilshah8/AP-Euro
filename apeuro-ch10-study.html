<script>
const CONCEPTS = [
  // Origins in Britain
  {cat:"Origins in Britain",q:"Why did the Industrial Revolution begin in Britain rather than elsewhere in Europe?",a:"Britain had a unique convergence of advantages: <strong>natural resources</strong> (coal and iron close together, fast-moving rivers for water power); <strong>colonial empire</strong> providing raw materials (cotton from India and America) and markets for finished goods; a <strong>parliamentary government</strong> protecting property rights and patents, encouraging investment; an <strong>agricultural revolution</strong> that freed rural labor for industrial work; a large domestic market unified by no internal tariffs; and a culture of practical invention rewarded by profit.",tip:"This is the AP's most common causation question for this chapter. Use the acronym CARPET: Colonies, Agriculture (freed labor), Resources (coal, iron), Parliament (property rights), Entrepreneurs, Technology. Multi-causal answers always score better than single-cause explanations. Note: France had coal too, but lacked the political stability and market integration Britain had."},
  {cat:"Origins in Britain",q:"What were the key technological innovations of the early Industrial Revolution, and what problems did each solve?",a:"The <strong>spinning jenny</strong> (Hargreaves, 1764) and <strong>water frame</strong> (Arkwright, 1769) mechanized cotton spinning; the <strong>power loom</strong> (Cartwright, 1785) mechanized weaving. The <strong>steam engine</strong> (Watt's improved version, 1769) solved the problem of pumping water from coal mines, then became a universal power source for factories, locomotives, and ships. <strong>Coke-smelting</strong> (Abraham Darby) made iron production more efficient and scalable.",tip:"Know each invention, its inventor, approximate date, and what problem it solved. The steam engine is the most AP-essential: it's not just a machine but the master technology that powered everything else. Watt's improvements (separate condenser, rotary motion) made it practical for factories, not just mines."},
  {cat:"Origins in Britain",q:"How did transportation and communication changes accelerate industrialization?",a:"The <strong>canal network</strong> (1760s–1830s) cheapened bulk transport of coal and raw materials. <strong>Steam-powered railways</strong> (Stephenson's Rocket, 1829; Liverpool-Manchester Railway, 1830) revolutionized speed and cost of moving goods and people — reducing the cost of transport by 50–80%. The <strong>electric telegraph</strong> (1840s) enabled near-instantaneous communication across distances. Together, these created a national market where goods, labor, and capital could move efficiently.",tip:"Transportation = the infrastructure of industrialization. Without cheap bulk transport, factories couldn't get raw materials or ship finished goods economically. The railway is the most AP-relevant innovation after the steam engine — it also created massive demand for iron and coal, driving those industries."},
  {cat:"Origins in Britain",q:"What was the factory system, and how did it transform work?",a:"The factory system replaced cottage industry (home-based production) with centralized production in factories where workers operated <strong>machines owned by capitalists</strong>. It imposed new disciplines: fixed hours (work bells, fines for lateness), division of labor (each worker performing one repetitive task), supervision, and a strict separation between work and home life. Workers lost control over the pace and rhythm of their work — a fundamental change in human labor.",tip:"The factory system's transformation of work is as important as its economic efficiency. The AP often asks about the social impact — not just productivity gains, but loss of worker autonomy, destruction of craft skills, child labor, and the discipline of industrial time. These changes produced the working-class consciousness that drove labor movements."},

  // Spread of Industrialization
  {cat:"Spread of Industrialization",q:"How and why did industrialization spread from Britain to the Continent, and which areas industrialized first?",a:"Continental industrialization began in the 1820s–1850s, led by <strong>Belgium</strong> (coal, iron, textiles — the first continental nation to fully industrialize), then northeastern <strong>France</strong>, the <strong>German Rhineland</strong>, and parts of the Austrian Empire. Rulers actively promoted industrialization through state investment in railways, protective tariffs, and technical education. Britain tried to protect its industrial lead by prohibiting export of machinery and emigration of skilled workers — but both leaked out.",tip:"Belgium first, then France and Germany — know this sequence. Continental industrialization differed from Britain's: more state involvement, later start, faster pace (learning from Britain). The role of the state is key: continental governments actively promoted industrialization where Britain's happened more organically through private enterprise."},
  {cat:"Spread of Industrialization",q:"Why was industrialization slow to reach Eastern Europe and Russia?",a:"Multiple obstacles: <strong>serfdom</strong> (until 1861 in Russia) bound agricultural labor to the land, preventing the free movement of workers to factories; <strong>lack of capital</strong> and underdeveloped banking systems; poor <strong>transportation infrastructure</strong>; a conservative noble class resistant to economic change; and small domestic markets. When Russian industrialization finally came (1880s–1890s), it was largely state-directed, funded by foreign capital, and concentrated in a few industrial centers.",tip:"East-West industrialization divergence is a continuity thread from Ch. 1 (Black Death serfdom) through Ch. 8 (serfdom persisting) to Ch. 10. Serfdom is the single most important obstacle to Eastern European industrialization — it prevented both labor mobility and capital formation. Know the contrast: Britain (organic, private) vs. Russia (state-directed, delayed, serfs freed 1861)."},
  {cat:"Spread of Industrialization",q:"How did colonialism shape the Industrial Revolution's global impact?",a:"Britain and other industrial powers used colonial relationships to secure <strong>cheap raw materials</strong> (cotton from India and Egypt; rubber, copper, and palm oil from Africa; wool from Australia) and <strong>captive markets</strong> for manufactured goods. This often <strong>de-industrialized</strong> colonial regions — British machine-made textiles destroyed India's traditional textile industry, for example. Colonialism thus simultaneously enabled European industrialization and prevented non-European industrialization.",tip:"The global dimension of industrialization is increasingly AP-tested. Don't treat the Industrial Revolution as a purely European story. Colonial relationships were essential to its supply chain and markets, and actively hindered industrialization in colonized regions. India's textile de-industrialization is the paradigmatic example."},

  // Social Impact
  {cat:"Social Impact",q:"What were the social consequences of rapid urbanization during the Industrial Revolution?",a:"Cities grew explosively and dangerously: <strong>overcrowding</strong> in hastily-built slums; contaminated water supplies (cholera epidemics killed tens of thousands — London 1832, 1848); no sanitation systems; child labor; 14-16 hour workdays; factory accidents. Engels documented Manchester's conditions in <em>The Condition of the Working Class in England</em> (1845). The crisis eventually forced government intervention in public health (Public Health Act, Britain, 1848).",tip:"Urbanization's dark side is AP-essential. The cholera epidemics are your specific evidence — they proved that rapid urbanization without infrastructure was deadly. They also drove the first public health legislation, showing how crisis forced state action. Know: cholera, overcrowding, child labor, no sanitation."},
  {cat:"Social Impact",q:"What was the new industrial middle class (bourgeoisie), and what were its values?",a:"The industrial middle class included factory owners, merchants, bankers, lawyers, and managers — people who owned or managed capital rather than worked with their hands. Their values: <strong>self-help</strong> (success through individual effort and thrift), <strong>respectability</strong> (moral conduct, sobriety, domesticity), free markets and limited government, and education as the path to advancement. They dominated Victorian culture and were politically dominant after the Reform Act of 1832.",tip:"The industrial middle class is the social embodiment of laissez-faire liberalism. Their values (self-help, respectability, free market) directly opposed working-class interests (unions, government regulation, collective action). This class conflict is the social basis of the political conflicts of the 19th century."},
  {cat:"Social Impact",q:"What was the condition of the industrial working class, and how did it change over the 19th century?",a:"Early industrial workers faced: <strong>12–16 hour workdays</strong>, dangerous conditions, child labor (children as young as 5–6 in mines and factories), low wages, and complete insecurity (no insurance, pensions, or sick pay). Conditions gradually improved through the second half of the 19th century: Factory Acts (1833, 1844, 1847 in Britain) limited hours and child labor; real wages rose after 1850; trade unions slowly gained legal rights. But improvement was slow, uneven, and bitterly contested.",tip:"Working class conditions is a favorite AP topic for DBQs and SAQs because primary sources on this topic are abundant. Know the specific abuses (hours, child labor, safety) and the mechanisms of improvement (Factory Acts, trade unions). The AP rewards knowing both the problem and the reform response."},
  {cat:"Social Impact",q:"How did industrialization transform the family structure and the role of women?",a:"Before industrialization, the family was a <strong>productive economic unit</strong> — cottage industry meant all members worked together at home. Industrialization separated work from home: men went to factories; middle-class women became domestic managers ('the angel in the house'); working-class women and children also worked in factories but for lower wages. The <strong>separate spheres ideology</strong> (home = female, work = male) became culturally dominant, though working-class women always worked outside the home out of necessity.",tip:"Industrialization changed gender roles in class-specific ways. Middle-class women → domestic sphere + moral authority; working-class women → factories + domestic labor. The 'separate spheres' ideology was primarily a middle-class ideal that masked working-class women's double burden. AP essays on gender and industrialization must distinguish by class."},
  {cat:"Social Impact",q:"What was the population explosion of the 19th century, and what drove it?",a:"Europe's population grew from ~190 million (1800) to ~420 million (1900). Causes: continued decline of epidemic disease; improved nutrition (food from colonial sources + American crops still spreading); early improvements in sanitation (gradually reducing infant mortality); and possibly earlier marriage enabled by factory wages. Population growth provided the labor supply for industrialization while also creating the social pressure — overcrowding, unemployment — that drove reform movements.",tip:"Population growth is the demographic engine of industrialization. More people → more labor (for factories) + more demand (for goods). But also more poverty and urban crowding if growth outpaces job creation. Malthus's pessimistic predictions (population always outstrips food supply) were a major intellectual framework — know him as the context for debates about poverty."},

  // Responses & Reform
  {cat:"Responses & Reform",q:"What were the major ideological responses to industrialization, and how did they differ?",a:"Three main responses: <strong>Liberalism</strong> (middle class) — free markets, limited government, individual rights; trust in capitalism to improve conditions over time. <strong>Socialism/Utopian socialism</strong> — collective ownership of production; reformers like Owen, Saint-Simon proposed model communities. <strong>Marxism</strong> (scientific socialism) — Marx and Engels argued capitalism inevitably produces class conflict; the proletariat would overthrow the bourgeoisie and create a classless society. Luddism and trade unionism addressed immediate conditions without broader ideology.",tip:"The ideological debate over industrialization is the AP's key intellectual content for this chapter. Know all three: liberalism (status quo, free market), utopian socialism (idealistic reform), Marxism (revolutionary analysis). Each provides a different diagnosis and prescription for industrial society's problems."},
  {cat:"Responses & Reform",q:"What was Marxism, and what were its core claims about industrial capitalism?",a:"Karl Marx (with Engels, <em>Communist Manifesto</em>, 1848) argued that history is driven by <strong>class struggle</strong>; under capitalism, the bourgeoisie (capitalist class) exploits the proletariat (working class) by extracting surplus value from their labor; capitalism would inevitably produce increasing misery and class conflict; the proletariat would rise in revolution and create a communist society with no private property and no classes. This was 'scientific socialism' — claiming to be based on historical analysis, not moral idealism.",tip:"Marx's Communist Manifesto (1848) is a landmark AP document. Know its core claims: class struggle, bourgeoisie vs. proletariat, surplus value exploitation, inevitable revolution. Know it was published the same year as the revolutions of 1848 — the timing is not coincidental. Marx's analysis shaped all subsequent left-wing politics."},
  {cat:"Responses & Reform",q:"What were the major legislative reforms in Britain in response to industrialization, and what do they reveal about the role of government?",a:"Key reforms: <strong>Factory Acts</strong> (1833 — children under 9 banned from textile mills; 1847 — Ten Hours Act limiting women and children to 10-hour days); <strong>Mines Act</strong> (1842 — no women or children underground); <strong>Public Health Act</strong> (1848 — local boards of health); <strong>Reform Act</strong> (1832 — extended voting rights to middle class, ending rotten boroughs). Together they show the gradual expansion of government responsibility for workers' welfare — a retreat from pure laissez-faire toward what later became the welfare state.",tip:"Reform Acts show the AP's key theme: how societies respond to the problems capitalism creates. The Factory Acts are your evidence for state intervention overriding market principles. Note: each reform was bitterly resisted by industrialists citing laissez-faire; each eventually passed when conditions became intolerable. This pattern repeats throughout 19th-century history."},
  {cat:"Responses & Reform",q:"What were trade unions and Luddism, and what do they reveal about working-class responses to industrialization?",a:"<strong>Luddites</strong> (1811–1816) were skilled artisans who destroyed machinery that threatened their livelihoods — not opponents of technology per se, but of technology used to undermine skilled labor's wages and status. <strong>Trade unions</strong> organized workers to collectively bargain for wages and conditions; they were illegal in Britain until 1824 (Combination Acts repealed) and faced hostility throughout the 19th century. Both represent workers seeking agency in a system that treated them as interchangeable units of labor.",tip:"Luddism is often misunderstood as anti-technology; it was actually about economic power — who controls technology and who benefits. Trade unions are more sustained and ultimately more effective. Both show that working-class response to industrialization was active resistance, not passive suffering — an important AP nuance."},

  // Broader Themes
  {cat:"Broader Themes",q:"Was the Industrial Revolution a force for human progress or human suffering — or both?",a:"Both — and the AP rewards nuance. Progress: unprecedented increase in productive capacity; long-run rise in living standards; technological innovations improving life; expansion of middle class. Suffering: child labor; dangerous factories; cholera-ridden slums; destruction of traditional crafts and communities; exploitation of colonized peoples. Historians debate when real wages began to rise for ordinary workers — the 'optimist vs. pessimist' debate about the standard of living. Most current historians see both dimensions simultaneously.",tip:"The 'standard of living debate' (optimists: Ashton, McCloskey; pessimists: Thompson, Hobsbawm) is a historiographical question the AP may raise in DBQs. Know both sides: optimists point to rising real wages after 1850; pessimists emphasize the brutality of conditions in the 1800–1850 period. The most sophisticated answer is: it depends on when, where, and for whom."},
  {cat:"Broader Themes",q:"How did the Industrial Revolution reshape European society's class structure?",a:"The Industrial Revolution created two new classes: the <strong>industrial bourgeoisie</strong> (factory owners, merchants, financiers) and the <strong>industrial proletariat</strong> (factory workers). It weakened the old landed aristocracy (wealth increasingly came from industry, not land) and accelerated the decline of the peasantry and artisan class. The result was a more complex, fluid class structure where wealth from industry competed with landed privilege — a competition played out in 19th-century politics.",tip:"Class structure transformation is the sociological core of the Industrial Revolution. The bourgeoisie and proletariat are Marx's two categories, but they're also analytically accurate descriptions of new social groups. Their conflict — over wages, hours, unions, voting rights — drives 19th-century political history. Know these two classes cold."},
  {cat:"Broader Themes",q:"How did Romanticism respond to industrialization, and what does the art of this period reveal?",a:"Romantic artists and writers reacted against industrialization's mechanization, urbanization, and rationalism by <strong>celebrating nature, emotion, the past, and the individual</strong>. Painters like Constable and Turner depicted unspoiled landscapes or the sublime power of nature against industrial encroachment. Poets (Wordsworth, Blake — 'dark Satanic mills') mourned what industrialization destroyed. Later, Realism (Courbet, Dickens) turned the artistic lens directly on industrial society's grim realities.",tip:"Art responds to industrialization in two ways: Romanticism (flee from it into nature and emotion) and Realism (confront it directly). Both are critiques of industrial society but from opposite directions. The AP may ask you to connect art movements to their social context — always ask: what is this art responding to?"}
];

const VOCAB = [
  {cat:"Technology",term:"Steam engine",pos:"noun",def:"A machine converting steam pressure into mechanical work, improved by <strong>James Watt</strong> (1769) with a separate condenser and rotary motion, making it practical for factories, locomotives, and ships. The master technology of the Industrial Revolution — it powered textile mills, railways, and ships.",tip:"The steam engine is the most important technology of the Industrial Revolution. Know: Watt's improvements (separate condenser = efficiency; rotary motion = factory application), approximate date (1769), and applications (pumping mines → factories → railways → ships). Without it, industrialization was constrained by water power's geography."},
  {cat:"Technology",term:"Spinning jenny",pos:"noun",def:"A multi-spindle spinning frame invented by <strong>James Hargreaves</strong> (c. 1764) that allowed one worker to spin multiple threads simultaneously, dramatically increasing cotton thread production. One of the first mechanical innovations in the textile industry.",tip:"The spinning jenny is the first step in textile mechanization. Know: Hargreaves, 1764, cotton spinning. It was operated by hand (not water or steam-powered), so it could be used in homes — but it multiplied output dramatically and began displacing traditional spinners."},
  {cat:"Technology",term:"Water frame",pos:"noun",def:"A water-powered spinning machine invented by <strong>Richard Arkwright</strong> (1769) that produced stronger cotton thread than the spinning jenny. Because it required water power, it moved textile production out of homes and into mills — the beginning of the factory system.",tip:"The water frame is crucial because it drove production out of homes into factories — the key institutional shift of industrialization. Arkwright is your factory system pioneer. Know: water-powered, stronger thread, factory-based production, 1769."},
  {cat:"Technology",term:"Railway",pos:"noun",def:"A steam-powered transportation system running on iron rails. <strong>George Stephenson's</strong> Rocket (1829) and the Liverpool-Manchester Railway (1830) launched the railway age. Railways reduced transport costs by 50–80%, unified national markets, and drove massive demand for coal, iron, and engineering.",tip:"The railway is the second most important technology after the steam engine. It's not just transport — it's an economic multiplier driving coal, iron, and engineering industries. The AP may ask about the railway's social and economic effects: national market integration, class travel, urbanization acceleration."},
  {cat:"Technology",term:"Power loom",pos:"noun",def:"A mechanized weaving machine invented by <strong>Edmund Cartwright</strong> (1785), eventually allowing steam-powered weaving to complement mechanized spinning. Completed the mechanization of cotton textile production and was the final blow to the handloom weaving trade.",tip:"The power loom completes the textile mechanization sequence: spinning jenny → water frame → power loom. Together, these three innovations moved the entire cotton production process from home-based craft to factory machine production. Know Cartwright and 1785."},
  {cat:"Technology",term:"Coke smelting",pos:"noun",def:"A method developed by <strong>Abraham Darby</strong> (c. 1709) for smelting iron using coke (processed coal) instead of charcoal. This removed the dependence on scarce woodland and made large-scale iron production possible, providing the iron for machinery, railways, and construction.",tip:"Coke smelting solved the iron industry's fuel problem. Britain had coal (for coke) in abundance; charcoal (from wood) was scarce and expensive. Without coke smelting, there's no cheap iron; without cheap iron, no machinery or railways. Know Darby and why coke > charcoal."},
  {cat:"Economics",term:"Laissez-faire",pos:"noun/adjective (French)",def:"'Let it be' — the economic principle that <strong>government should not interfere in markets</strong>. Associated with Adam Smith (Wealth of Nations) and 19th-century liberalism: free trade, no tariffs, no regulation of working conditions, no government support for the poor beyond minimal assistance. The dominant economic ideology of the early Industrial Revolution.",tip:"Laissez-faire is the ideological framework that resisted Factory Acts, unions, and public health measures. Middle-class industrialists cited it to oppose regulation. Its erosion over the 19th century (through Factory Acts, public health legislation) marks the beginning of the welfare state concept. Know it as the ideology that had to be overcome for workers to gain protections."},
  {cat:"Economics",term:"Capitalism",pos:"noun",def:"An economic system in which <strong>private individuals own the means of production</strong> (factories, machines, land), invest capital for profit, hire wage laborers, and compete in markets. The Industrial Revolution was capitalism's decisive institutional triumph — factory ownership replaced landed wealth as the primary form of capital.",tip:"Capitalism as an economic system (not just a political insult) is the foundational concept for understanding industrialization. Know: private ownership of means of production, profit motive, wage labor, market competition. All the ideological responses (liberalism, socialism, Marxism) are responses to capitalism as a system."},
  {cat:"Economics",term:"Factory Acts (Britain)",pos:"noun (plural)",def:"A series of British laws regulating factory conditions: <strong>1833</strong> — children under 9 banned from textile mills, inspectors appointed; <strong>1844</strong> — 12-hour day for women; <strong>1847 (Ten Hours Act)</strong> — 10-hour workday for women and children in textiles. Each act was bitterly resisted by factory owners citing laissez-faire principles.",tip:"The Factory Acts are the AP's primary evidence for state intervention in the economy. Know the key dates and provisions. The appointment of factory inspectors (1833) is especially significant — the state now had agents monitoring private businesses, a major breach of laissez-faire principles."},
  {cat:"Economics",term:"Luddites",pos:"noun (plural)",def:"Skilled artisans (mainly framework knitters and weavers) who <strong>destroyed labor-saving machinery</strong> in Britain (1811–1816), protesting not technology itself but its use to undercut skilled workers' wages and autonomy. Named after the legendary Ned Ludd. Suppressed militarily by the government.",tip:"Luddism ≠ anti-technology in general. It was a specific economic protest by skilled workers whose livelihoods were being destroyed. This distinction is important for the AP — Luddites were not irrational; they were defending their economic position against a real threat. The term is now used (incorrectly) to mean anti-technology generally."},
  {cat:"Economics",term:"Trade unions",pos:"noun (plural)",def:"Organizations of workers who collectively bargain with employers for wages, hours, and working conditions. Illegal in Britain under the Combination Acts (1799–1800); legalized in 1824. Grew through the 19th century; the Trades Union Congress (TUC) founded 1868. Represent <strong>collective action</strong> against individual workers' powerlessness.",tip:"Trade unions are the institutional expression of working-class collective action. Know: illegal under Combination Acts → legalized 1824 → gradual growth. They're the alternative to Marxist revolution — working within capitalism to improve conditions. Their legalization is one of the 19th century's most important political changes."},
  {cat:"Economics",term:"Reform Act of 1832",pos:"noun (proper)",def:"British legislation that <strong>extended voting rights to the middle class</strong> (£10 householders), eliminated 'rotten boroughs' (depopulated constituencies with MPs), and gave new industrial cities (Manchester, Birmingham) parliamentary representation for the first time. The first significant democratization of the British political system.",tip:"The Reform Act of 1832 is the political consequence of industrialization: the new industrial middle class demanded political power to match their economic power. It extended voting rights to about 1 in 7 adult males — hardly democracy, but a significant breach in the old landed oligarchy's monopoly. Know it as the middle class's political victory."},
  {cat:"Social Classes",term:"Industrial bourgeoisie",pos:"noun",def:"The <strong>factory-owning, merchant, and professional middle class</strong> created by industrialization. Distinct from the landed aristocracy (wealth from land, not industry) and from the earlier commercial bourgeoisie. Values: individual achievement, self-help, thrift, respectability, free markets.",tip:"The industrial bourgeoisie is the social class of industrialization — they own the factories and employ the workers. Their values (self-help, free market) are the social ideology of laissez-faire. Their political rise (Reform Act 1832) tracks their economic dominance. Know them as distinct from the aristocracy (old money, land) and the proletariat (workers)."},
  {cat:"Social Classes",term:"Proletariat",pos:"noun",def:"Marx's term for the <strong>industrial working class</strong> — those who own no means of production and must sell their labor to survive. Distinguished from the peasantry (who have land access) and artisans (who own their tools). The class Marx predicted would overthrow capitalism.",tip:"Proletariat is Marx's analytical category for the industrial working class. Know: own no means of production, sell labor power, concentrated in factories, subject to exploitation (surplus value extraction). The proletariat's concentration in factories made them, in Marx's theory, uniquely positioned for collective revolutionary action."},
  {cat:"Social Classes",term:"Bourgeoisie",pos:"noun (French)",def:"Marx's term for the <strong>capitalist class</strong> — those who own the means of production (factories, machines, capital). In Marx's analysis, the bourgeoisie extracts surplus value from the proletariat and uses the state to protect its interests. Also used more broadly to describe the middle class.",tip:"Bourgeoisie in Marxist analysis means specifically the capitalist class (owners of production), not just the middle class generally. Marx's core argument: the bourgeoisie and proletariat are in irreconcilable conflict because their interests are structurally opposed — the bourgeoisie profits from paying workers as little as possible."},
  {cat:"Social Classes",term:"Separate spheres",pos:"noun phrase",def:"The 19th-century ideology dividing social life into a <strong>public sphere</strong> (work, politics, commerce — male) and a <strong>private/domestic sphere</strong> (home, child-rearing, moral life — female). Became the dominant middle-class gender ideology during industrialization, used to justify women's exclusion from public life.",tip:"Separate spheres was an ideology (a set of cultural beliefs about what was 'natural'), not a description of reality. Working-class women always worked outside the home. Middle-class women were confined to the domestic sphere but gained cultural authority within it. AP essays on gender and industrialization must distinguish by class."},
  {cat:"Ideology",term:"Socialism",pos:"noun",def:"The economic and political doctrine that the <strong>means of production should be collectively owned</strong> (by the state, workers, or communities) rather than by private individuals. Emerged in response to industrial capitalism's inequalities. Utopian socialists (Owen, Saint-Simon) proposed model communities; Marxist socialism proposed revolutionary class overthrow.",tip:"Socialism is the collective-ownership alternative to capitalism. Know the distinction: utopian socialism (moral, community-based, non-revolutionary — Owen's New Lanark) vs. Marxist socialism (scientific, historical-materialist, revolutionary). Both respond to the same problem (industrial inequality) with different diagnoses and prescriptions."},
  {cat:"Ideology",term:"Marxism (Scientific Socialism)",pos:"noun",def:"The political-economic theory of <strong>Karl Marx</strong> and Friedrich Engels (<em>Communist Manifesto</em>, 1848; <em>Das Kapital</em>, 1867): history is driven by class struggle; capitalism is the exploitation of the proletariat by the bourgeoisie; capitalism will inevitably collapse through its own contradictions; the proletariat will revolution and create a communist classless society.",tip:"Marxism is arguably the most consequential ideology of the 19th–20th centuries. Know: Communist Manifesto (1848), Das Kapital (1867), class struggle, bourgeoisie vs. proletariat, historical materialism, inevitable revolution. The AP may ask about Marxism's intellectual origins (Enlightenment + Industrial Revolution) and its historical impact (Russian Revolution, etc.)."},
  {cat:"Ideology",term:"Utopian socialism",pos:"noun",def:"Early socialist thought that proposed <strong>model communities or social arrangements</strong> as alternatives to capitalism — without Marx's revolutionary class analysis. Key figures: <strong>Robert Owen</strong> (New Lanark — model factory community in Scotland with good conditions, schools, no child labor); <strong>Henri de Saint-Simon</strong> (technocratic industrial planning); <strong>Charles Fourier</strong> (communes/phalansteries).",tip:"Utopian socialists are the optimistic, non-revolutionary response to industrialization. Owen's New Lanark is the AP's key example — a real experiment proving good conditions + profit were compatible. Marx dismissed utopian socialists as naive; their importance is showing that alternatives to exploitation were thinkable before Marxism."},
  {cat:"Ideology",term:"Liberalism (19th century)",pos:"noun",def:"The dominant political and economic ideology of the 19th-century middle class: <strong>individual rights, free markets, limited government, representative institutions, and free trade</strong>. Based on Locke's political theory and Smith's economics. Opposed both aristocratic privilege (from the right) and socialist regulation (from the left).",tip:"19th-century liberalism ≠ modern American liberalism. It means classical liberalism: free markets, individual rights, limited government, no special privileges. It's the ideology of the industrial middle class. Know it as both a political theory (constitutional government, civil liberties) and an economic theory (free trade, laissez-faire)."},
  {cat:"Ideology",term:"Malthus",pos:"noun (proper)",def:"Thomas Robert Malthus, British economist (1766–1834) whose <em>Essay on the Principle of Population</em> (1798) argued that <strong>population always tends to grow faster than food supply</strong>, condemning the poor to permanent misery. Used to argue against poor relief (which would just encourage more births). Influenced Darwin's concept of natural selection.",tip:"Malthus is the intellectual framework for pessimism about poverty relief. His argument: helping the poor just produces more poor people (they have more children). This 'Malthusian' reasoning was used to oppose the Poor Laws and worker welfare. Know him as context for 19th-century debates about poverty and population."},
  {cat:"People",term:"James Watt",pos:"noun (proper)",def:"Scottish engineer (1736–1819) who improved the steam engine with a <strong>separate condenser</strong> (1769), dramatically increasing efficiency, and later added <strong>rotary motion</strong>, making it applicable to factories and not just pumps. His partnership with entrepreneur Matthew Boulton commercialized the steam engine.",tip:"Watt's improvements are what made the steam engine universally applicable. The separate condenser is the technical key: it prevented heat loss and hugely increased efficiency. Know his name, dates, the separate condenser, and that his commercialization (with Boulton) shows the entrepreneur-inventor partnership essential to British industrialization."},
  {cat:"People",term:"Robert Owen",pos:"noun (proper)",def:"Welsh industrialist and social reformer (1771–1858) who demonstrated at his <strong>New Lanark mills</strong> in Scotland that workers could be treated humanely (decent conditions, schools, no child labor) while maintaining profitability. Later proposed utopian communities and advocated for trade unions.",tip:"Owen is the AP's paradigmatic utopian socialist — a capitalist who showed that exploitation wasn't economically necessary. New Lanark is his evidence. Know him both as a reformer within the system (New Lanark) and as a socialist visionary (utopian communities). He bridges the gap between reform and radical alternatives."},
  {cat:"People",term:"Karl Marx",pos:"noun (proper)",def:"German philosopher and economist (1818–1883) who, with Friedrich Engels, wrote the <em>Communist Manifesto</em> (1848) and later <em>Das Kapital</em> (1867). His analysis of capitalism — class struggle, surplus value exploitation, inevitable proletarian revolution — became the foundational text of socialist and communist movements worldwide.",tip:"Marx is one of the most important thinkers in the AP Euro curriculum. Know: Communist Manifesto (1848, with Engels), Das Kapital (1867), class struggle as the motor of history, bourgeoisie vs. proletariat, inevitable revolution. His ideas shaped the Russian Revolution (1917) and Cold War — knowing him well pays dividends across multiple chapters."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
