<script>
const CONCEPTS = [
  // Outbreak of War
  {cat:"Outbreak of War",q:"How did the assassination of Franz Ferdinand trigger a world war in the summer of 1914?",a:"On June 28, 1914, Austro-Hungarian Archduke Franz Ferdinand was assassinated in Sarajevo by <strong>Gavrilo Princip</strong>, a Bosnian Serb nationalist linked to the Black Hand secret society. Austria-Hungary, blaming Serbia, issued an ultimatum; Serbia's partial compliance was rejected. Austria-Hungary declared war on Serbia (July 28). Russia mobilized in Serbia's defense; Germany declared war on Russia (August 1) and France (August 3). Germany's invasion of Belgium (Schlieffen Plan) brought Britain into the war (August 4). Within six weeks, a regional Balkan dispute had become a European — then global — war.",tip:"The July Crisis sequence is AP-essential. Know: assassination (June 28) → Austrian ultimatum → Russian mobilization → German declarations → Belgian invasion → British entry. The key analytical point: the alliance system transformed a local assassination into a world war. Each step was driven by military timetables (mobilization schedules) and alliance obligations, not rational choice."},
  {cat:"Outbreak of War",q:"What was the Schlieffen Plan, and why did it fail?",a:"Germany's war plan required defeating France rapidly (within 6 weeks) through a massive flanking attack through neutral Belgium and Luxembourg, then turning east to face Russia before it could fully mobilize. It failed because: <strong>Belgian resistance</strong> delayed the German advance; <strong>France rushed troops by taxi to the Marne</strong> (Battle of the Marne, September 1914), stopping the German advance; and Britain's entry (triggered by Belgian invasion) added unexpected force. The plan's failure condemned Germany to the two-front war it was designed to prevent, producing the trench stalemate.",tip:"The Schlieffen Plan's failure is the crucial early decision that determined the war's character. Know: through Belgium → France fast → then Russia; it failed at the Marne (September 1914); its failure = trench warfare = four years of stalemate. The plan also brought Britain in (Belgian neutrality guaranteed by 1839 treaty), transforming a continental into a world war."},
  {cat:"Outbreak of War",q:"Who bears primary responsibility for WWI, and what does the historiographical debate reveal?",a:"Historians have assigned responsibility variously: the <strong>Fischer thesis</strong> (1961) blamed Germany — arguing German leaders deliberately chose war for expansionist aims ('September Program'). Others emphasize Austria-Hungary's aggression against Serbia, Russia's premature mobilization, or the shared responsibility of all great powers trapped in an inflexible alliance system and military timetables. The 1919 'war guilt clause' assigned sole blame to Germany; most historians now see <strong>shared responsibility</strong> with Germany's militarism as the most significant factor.",tip:"The war guilt question is historiographically rich and AP-relevant. Know: Fischer thesis (Germany primarily responsible), shared responsibility view, war guilt clause in Versailles (Germany forced to accept sole blame). The debate matters because the war guilt clause's injustice became a major grievance fueling the rise of the Nazis."},

  // The War Itself
  {cat:"The War",q:"What was trench warfare, and what were its human consequences?",a:"Trench warfare developed after the Schlieffen Plan's failure left opposing armies facing each other across a fixed line from the English Channel to Switzerland. Both sides dug defensive trenches — protected by barbed wire and machine guns — that made frontal assault suicidal. Conditions were horrific: mud, rats, disease (trench foot), constant shelling. Artillery barrages announced attacks, eliminating surprise. Machine guns mowed down advancing troops. The Western Front moved only miles over four years, at a cost of millions of lives.",tip:"Trench warfare is the war's defining experience on the Western Front. Know: static front, machine guns + barbed wire + artillery = defensive superiority, horrific conditions. Its psychological consequence: shell shock (PTSD) destroyed soldiers' mental health. The gap between generals' tactics (mass infantry assault) and military technology (defensive machine gun) explains the catastrophic casualties."},
  {cat:"The War",q:"What were the major battles of the Western Front, and what did they reveal about WWI?",a:"<strong>Battle of the Marne</strong> (September 1914) — France stopped the German advance, triggering the trench stalemate. <strong>Battle of Verdun</strong> (1916) — Germany tried to 'bleed France white'; ~700,000 casualties on both sides, no decisive result. <strong>Battle of the Somme</strong> (1916) — Britain's major offensive; first day saw ~57,000 British casualties (the worst single day in British military history); ~1 million total casualties, minimal territorial gain. These battles showed that industrial-scale warfare could produce industrial-scale casualties without producing decision.",tip:"Know the three major battles and what each reveals: Marne (stopped Schlieffen Plan, created stalemate), Verdun (attrition warfare, mutual destruction), Somme (scale of casualties, failure of offensive tactics). The Somme's first day is the statistic: 57,000 British casualties on July 1, 1916. These battles destroyed the illusion that the war would be short and glorious."},
  {cat:"The War",q:"What new military technologies defined WWI, and how did they shape the conflict?",a:"Industrial warfare introduced: <strong>machine guns</strong> (gave defenders enormous advantage, making offensive assault suicidal); <strong>artillery</strong> (heavy bombardment preceded attacks but eliminated surprise and churned ground); <strong>poison gas</strong> (first used by Germany at Ypres, 1915 — caused panic but could blow back; gas masks mitigated over time); <strong>tanks</strong> (Britain introduced 1916, eventually broke trench deadlock); <strong>airplanes</strong> (from reconnaissance to aerial combat — 'dogfights'; strategic bombing); <strong>submarines</strong> (German U-boats threatened British supply lines — nearly decisive).",tip:"Technology of WWI is AP-tested as evidence for 'total war' and industrialized conflict. Know: machine gun (defense > offense), gas (chemical warfare), tank (eventually broke stalemate), U-boat (strategic weapon threatening Britain). The mismatch between offensive tactics (mass assault) and defensive technology (machine gun + barbed wire + artillery) explains the casualty catastrophe."},
  {cat:"The War",q:"What was 'total war,' and how did it transform European societies?",a:"Total war mobilized the entire resources of nations — economic, human, and psychological. Governments took control of economies: <strong>war production prioritized</strong> (munitions over consumer goods), food rationed, propaganda deployed to maintain civilian morale. <strong>Women entered the workforce</strong> in unprecedented numbers, taking factory jobs, driving buses, nursing — transforming gender roles and strengthening suffrage claims. <strong>Civil liberties were curtailed</strong> (censorship, imprisonment of dissenters). Colonial subjects were recruited as soldiers (African, Indian, Indochinese troops). Nothing in civil life remained separate from the war effort.",tip:"Total war is the most important analytical concept in the chapter. Know its dimensions: economic mobilization (government control), women in workforce, propaganda, civil liberties restrictions, colonial troops. Its consequences: women's suffrage (wartime service justified it), government intervention in economies (precedent for welfare state expansion), psychological trauma across society."},

  // Russian Revolution
  {cat:"Russian Revolution",q:"What caused the February Revolution of 1917 in Russia?",a:"Multiple pressures converged: <strong>military catastrophe</strong> — 5–7 million Russian casualties by 1917; <strong>economic collapse</strong> — food shortages in cities, supply breakdowns; <strong>political dysfunction</strong> — Tsar Nicholas II's incompetent personal command of the army, Tsarina Alexandra's dependence on Rasputin; <strong>worker strikes</strong> in Petrograd over bread shortages. When troops ordered to suppress demonstrations refused to fire and joined the protesters (February/March 1917), the Tsar abdicated. A Provisional Government of liberals was established.",tip:"The February Revolution's causes: military failure + economic collapse + political dysfunction + popular protest + army mutiny. The key moment: troops refused to fire on protesters. Know: Nicholas II abdicates, Provisional Government formed (liberal/moderate), simultaneously the Petrograd Soviet (workers' and soldiers' council) established — creating 'dual power.'"},
  {cat:"Russian Revolution",q:"What was 'dual power,' and why did it doom the Provisional Government?",a:"After the February Revolution, Russia was governed by two competing authorities: the <strong>Provisional Government</strong> (composed of liberals and moderate socialists, committed to constitutional democracy) and the <strong>Petrograd Soviet</strong> (council of workers' and soldiers' representatives, more radical). The Soviet issued <strong>Order No. 1</strong>, which effectively transferred military authority from officers to soldiers' committees — undermining the Provisional Government's ability to maintain military discipline. Dual power meant neither authority could govern effectively.",tip:"Dual power is the structural reason the Provisional Government failed. It tried to govern but the Soviet had the actual loyalty of soldiers and workers. Its fatal decision: continuing the war (to honor Allied commitments), which Lenin exploited by promising 'Peace, Land, Bread.' Know: Provisional Government vs. Petrograd Soviet, Order No. 1 (military authority to soviets), Provisional Government's war continuation."},
  {cat:"Russian Revolution",q:"How did Lenin and the Bolsheviks seize power in October 1917?",a:"Lenin returned to Russia from exile in Switzerland (April 1917, in Germany's 'sealed train' — Germany hoped he'd destabilize Russia). His <strong>April Theses</strong> demanded immediate peace, land to the peasants, and Soviet power — rejecting cooperation with the Provisional Government. After a failed July uprising (July Days), the Bolsheviks rebuilt. In October (November by the Western calendar), Trotsky organized the <strong>Military Revolutionary Committee</strong>, which seized key Petrograd locations. The Provisional Government fell almost without resistance. The Bolsheviks proclaimed Soviet power.",tip:"The October Revolution is a coup, not a mass uprising — know this distinction. Key: April Theses (peace/land/bread/Soviet power), German-facilitated return, July Days (premature failed uprising), October coup (MRC under Trotsky). Lenin's genius: identifying what the masses wanted (peace, land) and promising it, while the Provisional Government continued an unpopular war."},
  {cat:"Russian Revolution",q:"What were Lenin's April Theses, and why were they politically decisive?",a:"Lenin's April Theses (April 1917) argued: <strong>no support for the Provisional Government</strong> (which represented bourgeois interests); immediate end to the 'imperialist war'; transfer of power to the Soviets; nationalization of land and banks; and movement toward a Soviet Republic. Summarized as '<strong>Peace, Land, Bread</strong>.' These positions were to the left of most socialists but corresponded exactly to what soldiers (who wanted peace), peasants (who wanted land), and urban workers (who wanted bread) most desperately wanted.",tip:"April Theses = the political program that won the Bolsheviks power. Know: Peace (end WWI), Land (give peasants land), Bread (feed urban workers), Soviet power. The Provisional Government's failure: it promised none of these (it continued the war and deferred land reform). Lenin read the political situation with genius — or ruthlessness. The theses are the clearest statement of how to win a revolution by promising what people most need."},
  {cat:"Russian Revolution",q:"What was the Treaty of Brest-Litovsk (1918), and what did it cost Russia?",a:"To fulfill Lenin's peace promise, Russia signed the Treaty of Brest-Litovsk with Germany (March 1918). Russia lost: <strong>Finland, the Baltic states, Poland, Ukraine, and the Caucasus</strong> — territories containing a third of Russia's population, half its industry, and 90% of its coal. The Bolsheviks accepted these humiliating terms because they needed peace to consolidate power and fight the civil war against White Army counterrevolutionaries. Germany's collapse later (November 1918) rendered the treaty null — but Russia had already lost enormous territory.",tip:"Brest-Litovsk reveals the Bolsheviks' priority: hold power in Russia even at enormous territorial cost. Know: March 1918, massive territorial losses (Finland, Baltics, Poland, Ukraine), justified by need for peace and civil war focus. Its significance: it showed the Bolsheviks would sacrifice Russian state interests for revolutionary power — and that Germany's war aims were catastrophically expansionist (undermining its claim to fight a defensive war)."},
  {cat:"Russian Revolution",q:"What was the Russian Civil War (1918–1921), and how did the Bolsheviks win?",a:"After October 1917, Russia descended into civil war between the <strong>Red Army</strong> (Bolsheviks, led by Trotsky) and the <strong>White Armies</strong> (counter-revolutionary coalition of monarchists, liberals, and Socialist Revolutionaries, backed by foreign intervention from Britain, France, USA, Japan). The Bolsheviks won because: they held the most populated areas; the Red Army was more ideologically unified; foreign intervention was limited and poorly coordinated; and peasants feared White victory would mean restoration of landlords.",tip:"The civil war is critical context for understanding why the Bolshevik regime became so brutal and centralized. War Communism (confiscating grain to feed the army) alienated peasants; the Cheka (secret police) suppressed all opposition; Red Terror answered White Terror. Foreign intervention gave the Bolsheviks a nationalist argument ('defend Russia from foreign imperialism'). Know: Red vs. White, Trotsky's Red Army, foreign intervention, Bolshevik victory by 1921."},

  // Peace Settlement
  {cat:"Peace Settlement",q:"What were Wilson's Fourteen Points, and how did they conflict with Allied war aims?",a:"President Woodrow Wilson's Fourteen Points (January 1918) proposed: <strong>self-determination</strong> for European peoples (each nation governs itself); open diplomacy (no secret treaties); freedom of the seas; disarmament; and a <strong>League of Nations</strong> to maintain peace. These idealistic principles conflicted with France's demand for security and reparations (Raymond Poincaré, Georges Clemenceau), Britain's desire to maintain its empire and naval supremacy, and Italy's and Japan's territorial ambitions. The peace conference at Paris (1919) was a collision between Wilsonian idealism and European Realpolitik.",tip:"Wilson's Fourteen Points vs. Allied aims is a classic AP analytical tension. Know: self-determination (idealistic), League of Nations (Wilson's centerpiece), vs. French security demands (Clemenceau), British empire interests, Italian territorial promises. The resulting Treaty of Versailles satisfied none of these fully — too harsh for Germany, too lenient for France, too idealistic for the U.S. Senate."},
  {cat:"Peace Settlement",q:"What were the key terms of the Treaty of Versailles (1919), and why were they controversial?",a:"Germany accepted: <strong>War Guilt Clause</strong> (Article 231 — sole responsibility for the war); <strong>reparations</strong> (ultimately set at $33 billion — later revised); loss of territories (Alsace-Lorraine to France; Poland Corridor separating Germany from East Prussia; colonies taken as 'mandates'); military restrictions (army limited to 100,000, no air force or submarines); and the <strong>Rhineland</strong> demilitarized and occupied. The treaty satisfied almost no one: Germany was humiliated and burdened; France felt insufficiently protected; the USA Senate rejected it; new states were created on shaky ethnic lines.",tip:"The Treaty of Versailles is arguably the most consequential document of the 20th century — its terms directly contributed to the conditions enabling Nazism and WWII. Know: War Guilt Clause (Article 231), reparations ($33 billion), territorial losses, military restrictions. The 'stab in the back' myth (blaming Germany's loss on internal betrayal rather than military defeat) exploited German resentment of these terms."},
  {cat:"Peace Settlement",q:"What was the League of Nations, and why did it fail as a peacekeeping institution?",a:"Wilson's centerpiece proposal, the League of Nations was created to maintain peace through <strong>collective security</strong>: member states would collectively confront any aggressor. Its fatal weaknesses: the <strong>United States never joined</strong> (Senate rejected the treaty twice, 1919–1920 — fearing loss of sovereignty); Germany was initially excluded; the League had <strong>no army</strong> of its own; decisions required unanimity; and Britain and France dominated it but were often unwilling to act decisively. When Japan invaded Manchuria (1931) and Italy invaded Ethiopia (1935), the League proved impotent.",tip:"The League of Nations' failure is a direct cause of WWII. Know: US Senate rejection (key weakness), no army, unanimity required, Britain/France dominant but passive. Its impotence in the 1930s (Manchuria, Ethiopia) taught Hitler that collective security was a fiction. Wilson's idealism collapsed against Senate nationalism and European power politics."},
  {cat:"Peace Settlement",q:"What new states were created at the Paris Peace Conference, and what problems did they face?",a:"The collapse of four empires (German, Austro-Hungarian, Russian, Ottoman) produced new states based on self-determination: <strong>Poland</strong> (restored), <strong>Czechoslovakia</strong> (Czechs + Slovaks + Germans in Sudetenland), <strong>Yugoslavia</strong> (South Slavs — Serbs, Croats, Slovenes), <strong>Austria, Hungary</strong> (separated). Problems: <strong>ethnic minorities</strong> were inevitably included in the 'wrong' state (3 million Germans in Czechoslovakia; Hungarians in Romania); economic viability was questionable for small states; and the 'national self-determination' principle was applied inconsistently (Germans in Austria couldn't join Germany; colonial peoples were ignored entirely).",tip:"The new states problem is crucial context for understanding the 1930s and WWII. Know: Poland, Czechoslovakia, Yugoslavia as new creations; ethnic minorities in 'wrong' states (Sudeten Germans, Hungarians abroad). The inconsistent application of self-determination — granting it to European peoples but denying it to colonized peoples — was a glaring hypocrisy that weakened Versailles's moral authority."},

  // Broader Themes
  {cat:"Broader Themes",q:"What was the psychological and cultural impact of WWI on European civilization?",a:"WWI shattered the pre-war confidence in progress, science, and civilization. The <strong>'Lost Generation'</strong> of young men was physically decimated (an estimated 10 million military deaths, 7 million civilian deaths). Survivors experienced profound disillusionment — <strong>shell shock</strong> (PTSD), grief, and loss of faith in the ideals that had sent men to die. Literature (Owen, Sassoon, Remarque's <em>All Quiet on the Western Front</em>) expressed the horror and futility. The war accelerated modernist cultural trends — if civilization produced this slaughter, what value did it have?",tip:"Cultural impact of WWI is an AP favorite for DBQs (many poetic and literary primary sources). Know: Lost Generation, shell shock (PTSD), disillusionment, war literature (Owen — 'Dulce et Decorum Est,' Remarque). The pre-war confidence (Social Darwinism, nationalism, progress) gave way to post-war despair. This cultural shock set the context for the anxious 1920s–1930s and the appeal of radical ideologies."},
  {cat:"Broader Themes",q:"How did WWI change the balance of global power?",a:"WWI fundamentally restructured global power: <strong>European empires weakened</strong> — colonial soldiers fought for their masters, then demanded independence; Ottoman, Austro-Hungarian, German, and Russian empires collapsed entirely. The <strong>United States emerged as the world's largest creditor</strong> and economic power (European nations borrowed heavily to finance the war). <strong>Japan</strong> expanded in Asia while Europe was distracted. The war accelerated European decolonization movements — colonized peoples who fought for self-determination could not be permanently denied it. The era of unchallenged European global dominance was over.",tip:"Global power shift is the war's big-picture consequence. Know: four empires collapsed (German, Austro-Hungarian, Ottoman, Russian), USA became world's largest creditor, Japan expanded, colonized peoples demanded independence. The AP may ask about the war's global consequences — always frame it as the end of European dominance and the beginning of the American century."},
  {cat:"Broader Themes",q:"What is the relationship between WWI, the Russian Revolution, and the rise of fascism in the 1920s–1930s?",a:"WWI created the conditions for both: it demonstrated that existing governments and ideologies had produced catastrophe; it created massive economic dislocation, veterans' grievances, and social breakdown; the <strong>Russian Revolution</strong> offered a radical left alternative that terrified European elites. The <strong>fear of communism</strong> made middle classes and elites willing to support far-right movements (fascism) as bulwarks against revolution. The Treaty of Versailles created German resentment that fascists exploited. WWI is thus not just one event but the opening act of a 30-year European crisis (1914–1945).",tip:"The WWI → Russian Revolution → fascism causal chain is the most important synthesis argument in the course. Know: WWI creates conditions (economic dislocation, resentment, fear of communism) → Russian Revolution provides left-wing alternative → fear of revolution pushes elites toward fascism → Versailles resentment enables Hitler. This chain explains WWII as a direct consequence of WWI's unresolved problems."}
];

const VOCAB = [
  {cat:"WWI: Outbreak",term:"Assassination of Franz Ferdinand",pos:"noun (proper)",def:"The killing of Austro-Hungarian Archduke Franz Ferdinand and his wife Sophie in Sarajevo (June 28, 1914) by Gavrilo Princip, a Bosnian Serb nationalist. The <strong>immediate trigger of WWI</strong> — Austria-Hungary's ultimatum to Serbia launched the July Crisis that brought all the great powers into war within six weeks.",tip:"The assassination is the spark — know it cold: Sarajevo, June 28, 1914, Gavrilo Princip, Black Hand connection. But the AP rewards distinguishing it from underlying causes (MAIN). The assassination was the trigger; the alliance system, militarism, nationalism, and imperialism were the underlying causes. Without the underlying conditions, the assassination would have been just another Balkan incident."},
  {cat:"WWI: Outbreak",term:"Schlieffen Plan",pos:"noun (proper)",def:"Germany's war plan: defeat France rapidly (within 6 weeks) through a massive right-wing flanking attack through neutral Belgium, then shift forces east to face Russia. <strong>Failed at the Battle of the Marne</strong> (September 1914), producing the trench stalemate and condemning Germany to the two-front war the plan was designed to prevent.",tip:"The Schlieffen Plan's failure is the single most important military decision of the war — it determined that the war would be long and attritional, not short and decisive. Know: through Belgium (which brought Britain in), France fast then Russia, failed at Marne (September 1914). Its failure = four years of trench warfare."},
  {cat:"WWI: Outbreak",term:"July Crisis (1914)",pos:"noun (proper)",def:"The five-week diplomatic escalation (June 28 – August 4, 1914) from the assassination of Franz Ferdinand to the British declaration of war. Each step — Austrian ultimatum, Serbian partial compliance, Austrian declaration of war, Russian mobilization, German declarations of war, Belgian invasion, British entry — was driven by alliance obligations and military timetables.",tip:"The July Crisis sequence is AP-essential. Know each step and its actor. The key analytical point: military timetables (mobilization schedules could not be halted once begun) and alliance obligations transformed diplomatic failures into automatic war declarations. Leaders felt they had no choice — the machine was running."},
  {cat:"WWI: Conduct",term:"Trench warfare",pos:"noun",def:"The dominant form of combat on the Western Front: both sides dug elaborate systems of <strong>defensive trenches</strong> protected by barbed wire and machine guns, making offensive assault suicidal. The front barely moved for four years at a cost of millions of lives. Conditions involved mud, rats, disease (trench foot), and constant artillery bombardment.",tip:"Trench warfare is the defining experience of WWI. Know: machine gun + barbed wire + artillery = defensive superiority over offense, static front, horrific conditions. Its psychological consequence: shell shock (PTSD). Its strategic consequence: attrition warfare (wearing down the enemy) replaced maneuver warfare. Both sides tried to break the deadlock with new technologies (gas, tanks, planes)."},
  {cat:"WWI: Conduct",term:"Battle of the Somme (1916)",pos:"noun (proper)",def:"A British offensive (July–November 1916) intended to relieve pressure on France at Verdun. The first day (July 1, 1916) saw <strong>~57,000 British casualties</strong> — the worst single day in British military history. Total casualties: ~1 million on both sides. Territorial gain: a few miles. Introduced the tank (September 1916).",tip:"The Somme is the AP's paradigm for the futility of WWI offensives. Know: 1916, 57,000 British casualties on the first day, ~1 million total casualties, minimal territorial gain. It destroyed the illusion that traditional offensive tactics could succeed against industrial defensive technology. It also introduced the tank — the eventual solution to the trench deadlock."},
  {cat:"WWI: Conduct",term:"Total war",pos:"noun",def:"A form of warfare mobilizing the <strong>entire resources — economic, human, psychological — of a nation</strong>. Governments controlled economies, rationed food, deployed propaganda, recruited women into the workforce, and conscripted colonial subjects. Civilians became targets and participants. The distinction between military and civilian was eliminated.",tip:"Total war is the war's most transformative concept for the AP. Know its dimensions: government economic control (war industries prioritized), women in workforce, propaganda, civil liberties curtailed, colonial troops recruited. Its consequences: women's suffrage (wartime service justified it), government intervention normalized, psychological trauma for all of society."},
  {cat:"WWI: Conduct",term:"Shell shock",pos:"noun",def:"The psychological trauma suffered by soldiers exposed to prolonged artillery bombardment, combat stress, and witnessing death — now called PTSD (post-traumatic stress disorder). Manifested as paralysis, mutism, uncontrollable shaking, nightmares. Initially dismissed as cowardice; eventually recognized as a genuine medical condition requiring treatment.",tip:"Shell shock is the war's most revealing human consequence — it proves the psychological toll of industrialized warfare. Know: psychological trauma from artillery/combat, originally called cowardice, eventually recognized as medical. Its cultural significance: the 'Lost Generation' wasn't just physically decimated but psychologically damaged. War literature (Remarque, Owen, Sassoon) documents this trauma."},
  {cat:"WWI: Conduct",term:"U-boat warfare",pos:"noun",def:"Germany's campaign of unrestricted submarine (Unterseeboot) warfare against Allied shipping, particularly targeting Britain's supply routes. The sinking of the <em>Lusitania</em> (1915, 1,198 dead including 128 Americans) and Germany's 1917 resumption of unrestricted submarine warfare both played key roles in drawing the United States into the war.",tip:"U-boat warfare nearly starved Britain into surrender — by 1917, Britain had only weeks of food supplies left. Know: Lusitania (1915), unrestricted submarine warfare resumed 1917, key factor in US entry. The AP connection: Germany's resumption of unrestricted submarine warfare + the Zimmermann Telegram were the immediate causes of US entry in April 1917."},
  {cat:"WWI: Conduct",term:"Zimmermann Telegram (1917)",pos:"noun (proper)",def:"A secret German diplomatic telegram (intercepted by British intelligence) proposing a military alliance with Mexico against the United States: Mexico would help Germany and in return receive Texas, New Mexico, and Arizona. Published in March 1917, it outraged American public opinion and strengthened support for US entry into the war.",tip:"The Zimmermann Telegram is the immediate political cause of American public support for entering WWI. Know: German foreign secretary Arthur Zimmermann to German ambassador in Mexico, Mexico offered US Southwest territory, intercepted by British, published March 1917. Combined with resumed U-boat warfare, it made US neutrality politically impossible. Wilson asked Congress for war declaration on April 2, 1917."},
  {cat:"Russian Revolution",term:"February Revolution (1917)",pos:"noun (proper)",def:"The popular uprising (February/March 1917 in the Western calendar) that overthrew Tsar Nicholas II. Triggered by bread shortages and war weariness in Petrograd; when troops refused to fire on demonstrators and joined them, the Tsar abdicated. A <strong>Provisional Government</strong> of liberals replaced him; simultaneously the <strong>Petrograd Soviet</strong> formed — creating 'dual power.'",tip:"The February Revolution is a spontaneous uprising, not a Bolshevik coup — know this distinction. Key: bread shortages → Petrograd protests → soldiers join protesters → Nicholas II abdicates → Provisional Government + Petrograd Soviet = dual power. The Bolsheviks were a minority in February; their October seizure of power was quite different."},
  {cat:"Russian Revolution",term:"Petrograd Soviet",pos:"noun (proper)",def:"The council of workers' and soldiers' representatives established in Petrograd after the February Revolution. Issued <strong>Order No. 1</strong>, which transferred military authority from officers to elected soldiers' committees — effectively giving the Soviet control over the army and making the Provisional Government unable to enforce military discipline.",tip:"The Petrograd Soviet is the institutional expression of dual power. Know: workers' and soldiers' council, Order No. 1 (military authority to soldiers' committees), more radical than Provisional Government. Its significance: the Provisional Government had formal authority but the Soviet had the army. Without the army's loyalty, the Provisional Government couldn't govern. This dual power structure made the Bolshevik October coup possible."},
  {cat:"Russian Revolution",term:"April Theses",pos:"noun (proper)",def:"Lenin's political program (April 1917), upon his return to Russia, demanding: <strong>no support for the Provisional Government</strong>; immediate end to the war; transfer of power to the Soviets; nationalization of land and banks. Summarized as 'Peace, Land, Bread.' Positioned the Bolsheviks to the left of all other parties.",tip:"April Theses = the program that won the Bolsheviks mass support. Know: Peace (end war), Land (peasants), Bread (workers), Soviet power (no Provisional Government cooperation). Lenin's genius: he promised exactly what Russians most desperately wanted. The Provisional Government's fatal error: continuing the unpopular war. Lenin's theses made the Bolsheviks the only major party promising peace."},
  {cat:"Russian Revolution",term:"October Revolution (1917)",pos:"noun (proper)",def:"The Bolshevik seizure of power in Petrograd (October 25 by the Russian calendar, November 7 by the Western calendar). <strong>Leon Trotsky's</strong> Military Revolutionary Committee seized key locations (telegraph office, railroad stations, bridges) overnight. The Provisional Government was arrested. It was a coup, not a mass uprising — the Bolsheviks had minority support but faced minimal resistance.",tip:"The October Revolution is a coup, not a popular revolution — this distinction is AP-critical. Know: Trotsky organized it (Military Revolutionary Committee), key locations seized overnight, Provisional Government arrested, minimal resistance. The Bolsheviks proclaimed Soviet power — but they were a minority. They then had to win the civil war to actually consolidate power."},
  {cat:"Russian Revolution",term:"Vladimir Lenin",pos:"noun (proper)",def:"Leader of the Bolshevik Party (1870–1924) who returned to Russia in April 1917, issued the April Theses, directed the October coup, signed the Treaty of Brest-Litovsk, won the Civil War, and established the Soviet state. His <em>What Is to Be Done?</em> (1902) outlined a vanguard party of professional revolutionaries to lead the working class.",tip:"Lenin is the most important individual in the Russian Revolution. Know: Bolshevik leader, April Theses, October coup, Brest-Litovsk, New Economic Policy (NEP). His vanguard party concept — a disciplined elite leading the masses — distinguishes Bolshevism from democratic socialism. Know his death in 1924 and the succession struggle (Stalin vs. Trotsky) that followed."},
  {cat:"Russian Revolution",term:"New Economic Policy (NEP)",pos:"noun (proper)",def:"Lenin's pragmatic policy (1921) partially restoring <strong>market economics</strong> after War Communism's failures — allowing peasants to sell surplus grain on the market, permitting small private businesses, while the state retained control of large industries, banking, and foreign trade. A tactical retreat from communist economics to stabilize the economy after civil war devastation.",tip:"The NEP is Lenin's 'Thermidorean moment' — recognizing that War Communism (forced grain requisitioning) had alienated the peasantry and nearly collapsed the economy. Know: 1921, partial market restoration, peasants can sell surplus, small private business allowed, state retains 'commanding heights.' Stalin later reversed it with forced collectivization (1929). The NEP shows Lenin's pragmatism over ideological purity."},
  {cat:"Russian Revolution",term:"War Communism",pos:"noun",def:"The Bolshevik economic policy during the Civil War (1918–1921): <strong>forced requisitioning of grain</strong> from peasants to feed the Red Army and urban workers; nationalization of all industry; suppression of market exchange. It won the civil war but caused widespread famine and peasant resistance — replaced by the NEP in 1921.",tip:"War Communism is the brutal wartime economy that kept the Bolsheviks alive but alienated the peasantry. Know: forced grain requisitioning, nationalization, no markets, civil war context. Its consequences: famine (1921–22 killed ~5 million), peasant revolts (Tambov Rebellion), Kronstadt sailors' mutiny — all forcing Lenin to introduce the NEP."},
  {cat:"Peace Settlement",term:"Fourteen Points",pos:"noun (proper)",def:"President Woodrow Wilson's January 1918 program for the postwar world: <strong>national self-determination, open diplomacy, freedom of the seas, disarmament</strong>, and a League of Nations. Germany agreed to the armistice (November 1918) believing peace would be based on the Fourteen Points. The subsequent Versailles Treaty departed significantly from them.",tip:"The Fourteen Points are Wilson's idealistic peace program. Know: self-determination, no secret treaties, League of Nations. Their significance: Germany surrendered expecting them to be the basis of peace — the gap between Wilson's promises and Versailles's harshness is a source of German grievance ('stab in the back,' war guilt). Wilson's failure to get the Senate to ratify the treaty made his idealism ultimately ineffective."},
  {cat:"Peace Settlement",term:"Treaty of Versailles (1919)",pos:"noun (proper)",def:"The peace treaty ending WWI with Germany: <strong>War Guilt Clause</strong> (Article 231); reparations (~$33 billion); territorial losses (Alsace-Lorraine, Polish Corridor, colonies); military restrictions (army of 100,000, no air force or submarines); and Rhineland occupation. Germany signed under protest ('diktat'). Never ratified by the U.S. Senate.",tip:"The Treaty of Versailles is the most consequential document in the chapter — its terms directly enabled Hitler's rise. Know: Article 231 (War Guilt), reparations, territorial losses, military restrictions. The 'stab in the back' myth exploited German resentment. Keynes (The Economic Consequences of the Peace, 1919) predicted it would cause economic collapse — he was largely right."},
  {cat:"Peace Settlement",term:"War Guilt Clause (Article 231)",pos:"noun (proper)",def:"The clause in the Treaty of Versailles (1919) requiring Germany to <strong>accept sole responsibility</strong> for causing WWI — the legal basis for demanding reparations. Germans across the political spectrum found it humiliating and unjust. It became the central grievance exploited by nationalist and later Nazi politicians.",tip:"Article 231 is the most politically consequential clause in Versailles. Know: sole responsibility, basis for reparations, Germans called it a 'diktat' (dictated peace). It was both historically questionable (shared responsibility was more accurate) and politically catastrophic — providing ammunition for German nationalists for two decades. Hitler's success depended partly on exploiting this grievance."},
  {cat:"Peace Settlement",term:"League of Nations",pos:"noun (proper)",def:"The international organization created at Paris (1919) to maintain peace through <strong>collective security</strong>: member states would collectively confront aggressors. Wilson's centerpiece proposal. Fatal weaknesses: <strong>the US never joined</strong> (Senate rejected it twice); no independent military force; decisions required unanimity; dominated by Britain and France who were often passive.",tip:"The League's failure is a direct cause of WWII. Know: US never joined (Senate rejection is the key weakness), no army, unanimity required, impotent in 1930s crises (Manchuria, Ethiopia). It's the lesson that shaped the United Nations (1945) — the UN was designed to overcome Versailles's failures with Security Council veto power and more realistic enforcement mechanisms."},
  {cat:"Peace Settlement",term:"National self-determination",pos:"noun phrase",def:"Wilson's principle that <strong>each national/ethnic group should govern itself</strong> in its own sovereign state — the ideological basis for redrawing Europe's map at Paris. Applied inconsistently: granted to Poles, Czechs, and Hungarians but denied to Germans in Austria (forbidden to unite with Germany), colonized peoples, and many ethnic minorities trapped in new states.",tip:"Self-determination is the moral principle that made the Paris peace look just — and that exposed its hypocrisies. Know: Wilson's principle, applied to European peoples, denied to colonial subjects. The inconsistent application (Germans in Sudetenland and Austria denied self-determination) planted the seeds for Hitler's revisionist demands in the 1930s. 'Self-determination for Europeans but not Africans or Asians' was a contradiction that undermined Versailles's legitimacy."},
  {cat:"Peace Settlement",term:"John Maynard Keynes",pos:"noun (proper)",def:"British economist (1883–1946) who attended the Paris Peace Conference as a British representative and resigned in protest. His <em>The Economic Consequences of the Peace</em> (1919) predicted that Versailles's reparations would cause economic collapse and another war. His analysis proved prescient — and influenced later economists to advocate for the Marshall Plan after WWII.",tip:"Keynes at Versailles is important for two reasons: his contemporary critique (The Economic Consequences of the Peace, 1919) showed that the reparations were economically unsound, and his ideas later shaped the more generous post-WWII settlement (Marshall Plan = learning from Versailles's mistakes). Know: resigned in protest, predicted economic disaster, was largely right."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
