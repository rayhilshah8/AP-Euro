<script>
const CONCEPTS = [
  // Cold War Structure
  {cat:"Cold War",q:"How did the Cold War divide Europe, and what institutions defined each bloc?",a:"The Iron Curtain divided Europe into two armed camps: <strong>Western bloc</strong> — NATO (North Atlantic Treaty Organization, 1949) as the military alliance; Marshall Plan and then the Common Market (EEC, 1957) as economic ties; the USA as dominant partner. <strong>Eastern bloc</strong> — the Warsaw Pact (1955) as military alliance; COMECON (Council for Mutual Economic Assistance) as economic integration; Soviet Union as dominant power controlling satellite states through the Communist Party and threat of military intervention (as in Hungary, 1956).",tip:"NATO vs. Warsaw Pact + Marshall Plan/EEC vs. COMECON = the two-bloc structure of the Cold War. Know the founding dates: NATO (1949), EEC (1957), Warsaw Pact (1955). The asymmetry is important: NATO members were genuinely allied but independent; Warsaw Pact members were Soviet satellites with little real sovereignty — as Hungary (1956) and Czechoslovakia (1968) demonstrated."},
  {cat:"Cold War",q:"What were the major early Cold War crises, and what patterns did they establish?",a:"Key early crises: <strong>Berlin Blockade</strong> (1948–1949 — Soviet blocked land access to West Berlin; Western airlift supplied the city for 11 months until the blockade was lifted); <strong>Korean War</strong> (1950–1953 — NATO forces under U.S. command defended South Korea from North Korean invasion, establishing the precedent of 'limited war' to avoid nuclear escalation); <strong>Suez Crisis</strong> (1956 — Britain and France's last imperial venture, vetoed by the USA — demonstrating European powers' subordination to American will).",tip:"Know the three early crises and what each established: Berlin Blockade (Soviet pressure failed, Western resolve shown), Korean War (limited war precedent, avoiding WWIII), Suez (European powers must defer to USA — the definitive end of British/French great-power status). Suez is particularly AP-significant because it demonstrated that the USA and USSR — not Britain and France — were now the world's powers."},
  {cat:"Cold War",q:"What was Khrushchev's 'de-Stalinization,' and what were its consequences?",a:"After Stalin's death (1953), Nikita Khrushchev emerged as Soviet leader and delivered his <strong>'Secret Speech'</strong> at the 20th Party Congress (February 1956), denouncing Stalin's cult of personality, purges, and crimes. This de-Stalinization had dangerous consequences: it raised hopes in Eastern Europe for genuine liberalization. <strong>Hungary</strong> (October 1956) revolted, attempting to withdraw from the Warsaw Pact — crushed by Soviet tanks; ~2,500 Hungarians killed. The revolt's suppression showed that 'peaceful coexistence' applied to great-power relations, not satellite states' right to independence.",tip:"De-Stalinization's unintended consequence — raising hopes it couldn't fulfill — is the AP's key analytical point. Know: Secret Speech (February 1956), de-Stalinization, Hungarian Revolution (October–November 1956), Soviet suppression (~2,500 killed). The Hungarian revolt is evidence that Eastern Europeans wanted independence, not just liberalization. The West's failure to intervene showed that 'rollback' was rhetoric — NATO wasn't going to fight for Eastern Europe."},

  // Eastern Europe
  {cat:"Eastern Europe",q:"What was life like behind the Iron Curtain, and how did Soviet control operate?",a:"Soviet satellite states (Poland, East Germany, Czechoslovakia, Hungary, Romania, Bulgaria) shared features: <strong>single-party communist rule</strong>; state-owned economy with centralized planning (COMECON); state-controlled media and education; secret police (Stasi in East Germany, AVH in Hungary) monitoring citizens; and the constant threat of Soviet military intervention. Living standards improved from the devastation of WWII but lagged far behind Western Europe. Consumer goods were scarce; political freedoms non-existent. The <strong>Berlin Wall</strong> (built August 1961) physically embodied the bloc's imprisoning nature.",tip:"Eastern European life under Soviet control is AP-testable as evidence for totalitarianism's persistence into the Cold War. Know: single-party rule, central planning, secret police (Stasi), Berlin Wall (1961 — built to prevent East Germans from fleeing to the West). The Wall's construction is self-indicting: a regime that must wall its citizens in to keep them from leaving is one people reject given the choice."},
  {cat:"Eastern Europe",q:"What was the Berlin Wall, why was it built, and what did it symbolize?",a:"The Berlin Wall was built by East Germany (on Soviet orders) beginning <strong>August 13, 1961</strong>, to stop the mass emigration of East Germans to West Berlin — approximately 3.5 million had fled since 1945 (many of them skilled workers and professionals). The Wall transformed Berlin into a divided city, with guards ordered to shoot escapees. It became the Cold War's most powerful symbol: the <strong>physical embodiment of the Iron Curtain</strong> — a regime so illegitimate it had to imprison its own citizens.",tip:"The Berlin Wall is the Cold War's defining image. Know: built August 13, 1961, to stop emigration (3.5 million had left since 1945), shoot-to-kill orders, 155 km of concrete and wire. Its construction was both a practical measure (stop the brain drain) and a propaganda disaster for communism — it proved that given the choice, East Germans chose the West. Kennedy's 'Ich bin ein Berliner' speech (1963) responded to this symbolism."},

  // Western Europe Recovery
  {cat:"Western Europe",q:"What was the 'economic miracle' of Western Europe, and what produced it?",a:"Western European economies grew at unprecedented rates in the 1950s–1960s: West Germany's GNP doubled in the 1950s (the <em>Wirtschaftswunder</em>); France grew at ~5% annually; Italy industrialized rapidly. Causes: <strong>Marshall Plan</strong> provided the initial capital injection; <strong>low-cost American technology</strong> diffused rapidly; <strong>stable political environments</strong> (Christian Democratic governments in Germany, Italy, France); <strong>free trade</strong> (EEC lowered tariffs); and massive pent-up demand from wartime deprivation. The economic miracle created the consumer society that transformed European life.",tip:"The economic miracle is the AP's most important postwar economic development. Know: 1950s–60s, West Germany (Wirtschaftswunder), Marshall Plan + American technology + EEC + political stability + pent-up demand. Its consequences: rising living standards, growth of the middle class, consumer culture, and the social stability that prevented communist parties from exploiting poverty (exactly Marshall Plan's goal)."},
  {cat:"Western Europe",q:"What was the welfare state, and how did Western European governments build it?",a:"The postwar welfare state provided <strong>'cradle to grave' social security</strong>: national health systems (Britain's National Health Service, 1948 — free healthcare for all), unemployment insurance, old-age pensions, family allowances, and public education. Built primarily by social democratic and Labour governments (Britain's Attlee government nationalized key industries and created the NHS). The welfare state was the political compromise that prevented communist parties from gaining power: capitalism was reformed enough to provide security without eliminating private ownership.",tip:"The welfare state is the postwar political settlement's social dimension. Know: National Health Service (Britain, 1948, Attlee government), 'cradle to grave' security, social democratic governments built it. Its political logic: give workers security and they won't turn to communism. It's the domestic equivalent of the Marshall Plan — generous support prevents radicalization. The AP may ask you to compare the welfare state to earlier reform movements."},
  {cat:"Western Europe",q:"How did European integration develop in the postwar period, and what motivated it?",a:"Motivated by the desire to prevent another war through economic interdependence and Franco-German reconciliation: <strong>ECSC</strong> (European Coal and Steel Community, 1951 — France, West Germany, Italy, Benelux pooled coal and steel); <strong>Treaty of Rome</strong> (1957 — created the European Economic Community/Common Market; eliminated tariffs among members, coordinated economic policy, eventually aimed at political union). Key architects: Robert Schuman (France), Jean Monnet (France), Konrad Adenauer (West Germany). By 1965 the EEC had become the world's largest trading bloc.",tip:"European integration is the postwar era's most constructive development. Know: ECSC (1951), Treaty of Rome (1957), EEC/Common Market, Schuman + Monnet + Adenauer as architects. Its motivation: make another Franco-German war economically impossible. Its consequence: unprecedented Western European prosperity and stability. The AP may ask about the origins of what became the EU — always trace it to this postwar commitment to economic integration as war prevention."},

  // Decolonization
  {cat:"Decolonization",q:"What caused the wave of decolonization after WWII, and how did it unfold?",a:"Decolonization was driven by: <strong>weakened European empires</strong> (WWII's economic and military toll left Britain, France, Netherlands unable to maintain empire); <strong>colonial nationalism</strong> (educated colonized elites organized mass independence movements, often using the Allies' own self-determination language against them); <strong>superpower pressure</strong> (both USA and USSR opposed colonial empires for different ideological reasons); and <strong>economic calculation</strong> (maintaining colonies was increasingly costly). Britain transferred power relatively peacefully in most cases; France fought bitter wars in Indochina (1946–1954) and Algeria (1954–1962).",tip:"Decolonization is one of the postwar era's most sweeping transformations — it ended 500 years of European imperial dominance. Know the causes (weakened empires + colonial nationalism + superpower pressure), and the contrast between British (relatively peaceful) and French (violent — Indochina, Algeria) decolonization. The Algerian War (1954–1962) was particularly traumatic — it nearly caused civil war in France and brought de Gaulle back to power."},
  {cat:"Decolonization",q:"What was the Suez Crisis (1956), and why was it a turning point in European history?",a:"Britain and France secretly colluded with Israel to attack Egypt after President Nasser nationalized the Suez Canal. When Britain and France intervened militarily (October 1956), both the USA (threatening economic sanctions against Britain) and the USSR (threatening missile strikes) demanded they withdraw. Britain and France capitulated humiliatingly. The Suez Crisis definitively proved that <strong>Britain and France were no longer great powers</strong> independent of American will — a devastating psychological blow to European imperial pretensions.",tip:"Suez is the decisive demonstration of European power's postwar limits. Know: 1956, Nasser nationalizes canal, Anglo-French (with Israel) attack Egypt, USA and USSR both demand withdrawal, Britain and France capitulate. Its AP significance: it shows the new world order — European great powers must now defer to the superpowers. British Prime Minister Eden resigned in humiliation. France drew the lesson that Europe needed to build its own power (later fueling de Gaulle's independent foreign policy)."},
  {cat:"Decolonization",q:"How did African and Asian decolonization unfold, and what were its main patterns?",a:"Sub-Saharan Africa decolonized primarily in <strong>1957–1965</strong> (Ghana first, 1957; most by 1965). Mostly peaceful British transfers; French Africa gained independence en masse (1960 — 'Year of Africa'). The Belgian Congo became chaotic (civil war 1960–65); Portuguese colonies fought long wars (Angola, Mozambique, Guinea-Bissau — not independent until 1974–75). In Asia, India and Pakistan (1947), Indonesia (1949), and Indochina (after French defeat at Dien Bien Phu, 1954) gained independence. The Middle East saw continued conflict over Israel (founded 1948) and oil resources.",tip:"Decolonization's patterns vary by colonial power. Know: Britain (mostly peaceful), France (violent — Algeria, Indochina), Belgium (chaotic — Congo), Portugal (delayed until 1974). The 'Year of Africa' (1960 — 17 countries independent) is the single most dramatic year. Ghana (1957, first sub-Saharan African independence) under Kwame Nkrumah is the paradigm. The connection to Cold War: newly independent states became Cold War battlegrounds (Soviet vs. U.S. influence)."},

  // Society & Culture
  {cat:"Society & Culture",q:"How did postwar Western society change structurally, and what new consumer culture emerged?",a:"Postwar Western society saw: <strong>massive suburbanization</strong> (car ownership, refrigerators, televisions became widespread — American consumer culture exported to Europe); <strong>growth of the middle class</strong> (economic miracle raised living standards, expanded white-collar employment); <strong>baby boom</strong> (post-war birth rate spike creating the large generation that became the 1960s counterculture); <strong>American cultural influence</strong> (jazz, rock and roll, Hollywood, blue jeans — both eagerly adopted and anxiously resisted by European intellectuals). Television became the defining medium of the new consumer society.",tip:"Postwar consumer society is a major AP social history topic. Know: suburbanization, television, American cultural exports (rock and roll, Hollywood, consumer goods), baby boom, middle-class growth. The tension between American popular culture (welcomed by ordinary Europeans) and European intellectual resistance (de Gaulle's 'Americanization' critique, Frankfurt School's critique of 'culture industry') is analytically rich."},
  {cat:"Society & Culture",q:"What was the postwar welfare state's impact on European social structure and women's lives?",a:"The welfare state transformed European society: universal healthcare, free secondary and university education, unemployment insurance, and pensions gave ordinary Europeans security they had never had. <strong>Women</strong> gained formal legal equality in most Western states (right to vote, equal property rights) and entered the paid workforce in growing numbers — though gender wage gaps and the 'second shift' (domestic work in addition to paid work) persisted. The contraceptive pill (approved in the USA 1960, gradually spreading) would transform women's reproductive autonomy.",tip:"Women in the postwar period follow a pattern of formal gains + persistent inequality. Know: voting rights gained across Western Europe by 1950, workforce participation rising, contraceptive pill (1960s) as transformative technology, second wave feminism beginning in the 1960s. The AP may ask about continuities in gender inequality despite formal rights — the 'second shift' and wage gap are your evidence."},
  {cat:"Society & Culture",q:"What were the major intellectual and cultural developments of the postwar era?",a:"Postwar culture was shaped by: <strong>Existentialism</strong> (Sartre, Camus — meaning must be created in an absurd world; immensely popular in postwar France, where collaboration and resistance raised urgent moral questions); <strong>Vatican II</strong> (1962–1965 — Catholic Church's modernizing council under John XXIII; Mass in vernacular, ecumenism, engagement with modern world — the Church's greatest self-transformation since the Council of Trent); <strong>Absurdist theater</strong> (Beckett's <em>Waiting for Godot</em> — characters waiting for meaning that never arrives); and the explosion of <strong>popular culture</strong> (rock and roll, cinema as art — Italian Neorealism, French New Wave).",tip:"Vatican II is particularly AP-relevant as evidence of institutional change in response to historical forces. Know: 1962–65, John XXIII, Mass in vernacular, ecumenism, engagement with modern world. Compare to the Council of Trent (1545–63) — both councils defined Catholicism's response to its era's challenges. Existentialism (Sartre, Camus) is the philosophical context: in a world that produced Auschwitz and Hiroshima, how does one find meaning?"},

  // Broader Themes
  {cat:"Broader Themes",q:"How did the Cold War paradoxically both stabilize and destabilize the postwar world?",a:"The Cold War stabilized Europe: the two superpowers' nuclear deterrence prevented direct military conflict between them ('long peace' — no major European war since 1945, the longest such period in centuries); the Marshall Plan rebuilt Western Europe; NATO provided security without European rearmament causing fear. But it destabilized the rest of the world: proxy wars in Korea, Vietnam, Angola, and elsewhere killed millions; decolonization conflicts were often worsened by superpower interference; and the constant threat of nuclear war created existential anxiety.",tip:"The Cold War's double effect — stability in Europe, instability elsewhere — is a sophisticated AP argument. Know: 'long peace' in Europe (nuclear deterrence), Marshall Plan stabilization, BUT proxy wars in the developing world, decolonization conflicts worsened by superpower rivalry. The AP may ask about the Cold War's global consequences — always note that the stability Europeans experienced came partly at the expense of people in Korea, Vietnam, and Africa."},
  {cat:"Broader Themes",q:"What does the postwar period reveal about the relationship between state economic intervention and political stability?",a:"The postwar 'golden age' (1945–1973) showed that <strong>managed capitalism</strong> — combining private ownership with significant state intervention (welfare state, nationalized industries, Keynesian demand management) — could produce unprecedented economic growth and social stability. This contradicted both classical liberals (who said state intervention distorts markets) and Marxists (who said capitalism couldn't reform itself). The 'mixed economy' model became Western Europe's political consensus, marginalizing both communist parties and laissez-faire conservatives.",tip:"The managed capitalism lesson is the postwar era's most important political-economic conclusion. Know: welfare state + Keynesian economics + mixed economy = 'golden age' growth + political stability. This contradicted both laissez-faire liberalism and revolutionary Marxism. The AP may ask you to compare the postwar Western model with earlier economic ideologies — it's a deliberate middle path between free-market capitalism and socialism."}
];

const VOCAB = [
  {cat:"Cold War",term:"NATO",pos:"noun (proper)",def:"North Atlantic Treaty Organization — a <strong>military alliance of Western states</strong> (founded April 4, 1949) committing members to collective defense (an attack on one is an attack on all). Original members: USA, Canada, Britain, France, Belgium, Netherlands, Luxembourg, Norway, Denmark, Iceland, Portugal, Italy. West Germany joined 1955.",tip:"NATO is the Western military structure of the Cold War. Know: founded 1949, collective defense (Article 5), US-dominated, West Germany joined 1955 (triggering Warsaw Pact). Its continued existence after the Cold War makes it relevant to current events. Know: NATO = defensive alliance vs. Warsaw Pact = Soviet-controlled instrument."},
  {cat:"Cold War",term:"Warsaw Pact (1955)",pos:"noun (proper)",def:"The Soviet-led military alliance of Eastern European satellite states (Poland, East Germany, Czechoslovakia, Hungary, Romania, Bulgaria, Albania) formed in 1955, partly in response to West Germany joining NATO. Unlike NATO, it was largely <strong>a Soviet instrument to maintain control</strong> over Eastern Europe.",tip:"Warsaw Pact vs. NATO comparison: NATO was a genuine alliance of sovereign states; Warsaw Pact was largely a Soviet command structure. The difference was demonstrated when the USSR used it to justify interventions in Hungary (1956) and Czechoslovakia (1968) — NATO never intervened in member states' domestic affairs. Know: 1955, response to West German NATO membership, Soviet dominated."},
  {cat:"Cold War",term:"COMECON",pos:"noun (proper)",def:"Council for Mutual Economic Assistance — the Soviet bloc's economic organization, integrating Eastern European economies under Soviet guidance. Provided Soviet raw materials (especially oil) to Eastern European states in exchange for manufactured goods. Its integration was designed to make Eastern European economies dependent on the Soviet Union.",tip:"COMECON is the Eastern bloc's economic counterpart to the Western EEC. Know: Soviet-led, Eastern European economies integrated under Soviet guidance, raw materials (USSR) for manufactures (satellites). Its integration was coercive — states had little choice. Compare with the EEC (voluntary, market-based) to understand why Western economies vastly outperformed Eastern ones by the 1970s–80s."},
  {cat:"Cold War",term:"Berlin Blockade (1948–1949)",pos:"noun (proper)",def:"The Soviet closure of all land routes to West Berlin (June 1948), attempting to force Western powers out of the city. The Western response: the <strong>Berlin Airlift</strong> — supplying 2 million West Berliners entirely by air for 11 months. The blockade ended (May 1949) when it failed. Established Western resolve to defend Berlin and the pattern of Soviet pressure/Western resistance.",tip:"The Berlin Blockade is the Cold War's first major confrontation. Know: 1948–49, Soviet land blockade, Western airlift (2 million people supplied by air), blockade ended without war. Its significance: proved Western resolve and Soviet willingness to back down when confronted. The airlift's success made West Berliners pro-Western and embarrassed the Soviet Union internationally."},
  {cat:"Cold War",term:"Berlin Wall (1961)",pos:"noun (proper)",def:"The concrete barrier built by East Germany (August 13, 1961) to stop the mass emigration of East Germans to West Berlin. It divided Berlin for 28 years (1961–1989). Guards had shoot-to-kill orders; approximately 140 people were killed trying to cross. Symbol of the Iron Curtain and communist regimes' illegitimacy.",tip:"The Berlin Wall is the Cold War's most powerful symbol. Know: August 13, 1961, built to prevent emigration (3.5 million had fled since 1945), shoot-to-kill, 28 years. Its symbolic significance: a regime that must wall its citizens in has lost their consent. Kennedy's 'Ich bin ein Berliner' (1963) and Reagan's 'Tear down this wall!' (1987) both used it as the symbol of freedom vs. tyranny. Its fall (November 9, 1989) = symbolic end of the Cold War."},
  {cat:"Cold War",term:"Hungarian Revolution (1956)",pos:"noun (proper)",def:"A nationwide revolt in Hungary (October–November 1956) against Soviet domination, triggered by Khrushchev's de-Stalinization. Hungarians demanded withdrawal from the Warsaw Pact and free elections. <strong>Soviet tanks crushed the revolt</strong> (November 4, 1956); ~2,500 Hungarians killed, ~200,000 fled as refugees. The West did not intervene.",tip:"The Hungarian Revolution shows the limits of de-Stalinization and Western 'rollback' rhetoric. Know: October–November 1956, de-Stalinization raised hopes, Soviet tanks crushed the revolt, ~2,500 killed, West didn't intervene. Its lesson: the USSR would use military force to preserve the Eastern bloc; NATO wouldn't fight for Eastern Europe. This established the Cold War's tacit rules: each superpower could do as it wished within its own sphere."},
  {cat:"Cold War",term:"Khrushchev",pos:"noun (proper)",def:"Soviet leader (1953–1964) who succeeded Stalin, delivered the 'Secret Speech' denouncing Stalinism (1956), pursued 'peaceful coexistence' with the West, crushed the Hungarian Revolution (1956), built the Berlin Wall (1961), and backed down in the Cuban Missile Crisis (1962). Ultimately removed by Communist Party colleagues.",tip:"Khrushchev is the AP's key Soviet figure for the period 1953–1964. Know: de-Stalinization (Secret Speech 1956), peaceful coexistence, Hungarian suppression (1956), Berlin Wall (1961), Cuban Missile Crisis (1962 — backed down). His tenure shows the contradictions of Soviet power: de-Stalinizing rhetoric + continued coercive control of Eastern Europe."},
  {cat:"Cold War",term:"Suez Crisis (1956)",pos:"noun (proper)",def:"The international crisis when Britain and France secretly coordinated with Israel to attack Egypt after Nasser nationalized the Suez Canal. Both <strong>the USA and USSR demanded withdrawal</strong>; Britain and France capitulated. Definitively demonstrated that European great powers were subordinate to the superpowers.",tip:"Suez = the death of British and French great-power status. Know: 1956, Nasser nationalizes canal, secret British-French-Israeli coordination, USA + USSR demand withdrawal, capitulation. Eden resigned. The AP significance: Europe could no longer act as independent great powers — they needed American support or faced veto. France drew the lesson of building European independence (de Gaulle's later policies)."},
  {cat:"Western Europe",term:"Economic miracle (Wirtschaftswunder)",pos:"noun",def:"The unprecedented economic growth of Western European economies in the 1950s–1960s. West Germany's GNP doubled in the 1950s; France and Italy grew at similar rates. Driven by Marshall Plan capital, American technology transfer, EEC free trade, stable governments, and massive pent-up consumer demand.",tip:"The economic miracle is the positive story of postwar Western Europe. Know: 1950s–60s, West Germany's Wirtschaftswunder, Marshall Plan + EEC + American technology + pent-up demand. Its consequences: consumer society (cars, televisions, refrigerators became widely affordable), middle-class expansion, social stability preventing communist parties from gaining power. The contrast with Eastern European economic stagnation is AP-significant."},
  {cat:"Western Europe",term:"Welfare state",pos:"noun",def:"The postwar system of comprehensive social programs providing <strong>'cradle to grave' security</strong>: national health systems, unemployment insurance, old-age pensions, family allowances, free education. Established primarily by social democratic governments. Britain's National Health Service (1948) is the paradigm.",tip:"The welfare state is the postwar political settlement's social dimension. Know: 'cradle to grave,' NHS (Britain, 1948, Attlee), social democratic governments. Its political logic: secure workers won't turn to communism. Compare to Bismarck's social insurance laws (1880s) — the same logic, more comprehensive implementation. The AP may ask about the welfare state's origins and justification."},
  {cat:"Western Europe",term:"National Health Service (NHS)",pos:"noun (proper)",def:"Britain's universal free healthcare system, established by the Labour government under Clement Attlee (1948). All British citizens receive comprehensive medical care at no direct cost, funded by general taxation. Became the model for universal healthcare across Western Europe.",tip:"The NHS is the welfare state's most concrete and popular expression. Know: 1948, Attlee's Labour government, universal, free at point of use, funded by taxation. Its political context: Labour's 1945 landslide election victory (defeating Churchill despite his wartime leadership) showed that British voters wanted social reform, not a return to prewar inequality. The NHS remains deeply popular and is a defining feature of British identity."},
  {cat:"Western Europe",term:"European Economic Community (EEC)",pos:"noun (proper)",def:"The 'Common Market' established by the Treaty of Rome (1957) among France, West Germany, Italy, Belgium, the Netherlands, and Luxembourg. Members eliminated tariffs among themselves, adopted common external tariffs, coordinated agricultural policy, and ultimately aimed at political union. Became the world's largest trading bloc and the foundation of the later European Union.",tip:"EEC = the economic foundation of European integration. Know: Treaty of Rome (1957), six founding members (France, West Germany, Italy, Benelux), free trade area, common external tariff. Its motivation: economic interdependence to prevent war + economic recovery. Britain stayed out initially (joined 1973) — an important AP fact showing Britain's ambivalence about European integration."},
  {cat:"Western Europe",term:"Konrad Adenauer",pos:"noun (proper)",def:"West Germany's first Chancellor (1949–1963), known as 'Der Alte' (the Old Man). Rebuilt West German democracy, achieved reintegration into the Western alliance (NATO membership 1955), presided over the economic miracle, and pursued Franco-German reconciliation as the foundation of European integration.",tip:"Adenauer is West Germany's founding father — as important as de Gaulle for France or Attlee for Britain. Know: CDU (Christian Democratic Union), 1949–1963, NATO membership, economic miracle, Franco-German reconciliation with de Gaulle. His partnership with de Gaulle (Élysée Treaty, 1963) formally reconciled the two nations that had fought three wars in 70 years — the foundation of European integration."},
  {cat:"Western Europe",term:"Keynesian economics",pos:"noun",def:"Economic theory developed by John Maynard Keynes advocating <strong>government intervention</strong> — deficit spending to stimulate demand during recessions, progressive taxation to reduce inequality — to maintain full employment and smooth the business cycle. Became the dominant economic theory of postwar Western governments until the 1970s stagflation.",tip:"Keynesian economics is the economic theory of the welfare state era. Know: Keynes, government spending during recessions (demand stimulation), full employment goal, deficit spending acceptable. It contrasts with laissez-faire economics (no intervention) and justifies the mixed economy. Its practical collapse in the 1970s (stagflation — inflation + unemployment simultaneously, which Keynes's model couldn't explain) opened the door for Thatcherism and supply-side economics."},
  {cat:"Decolonization",term:"Decolonization",pos:"noun",def:"The process by which European colonial empires granted independence to their overseas territories, primarily between 1945 and 1975. Driven by colonial nationalism, weakened European powers, superpower pressure, and the contradiction between Allied self-determination rhetoric and colonial reality. Nearly 70 new states emerged.",tip:"Decolonization is the postwar era's most sweeping geopolitical transformation. Know: 1945–1975, ~70 new states, driven by colonial nationalism + weakened empires + superpower pressure. Patterns vary: British (mostly peaceful), French (violent — Algeria, Indochina), Belgian (chaotic — Congo), Portuguese (delayed, violent — 1974–75). The AP increasingly asks about decolonization's causes and consequences from both European and colonial perspectives."},
  {cat:"Decolonization",term:"Algerian War (1954–1962)",pos:"noun (proper)",def:"France's brutal colonial war to suppress Algerian independence. Algeria (unlike other French colonies) was legally part of France and had over 1 million European settlers. The war involved widespread torture of Algerians by French forces, FLN terrorism, and nearly caused civil war in France — <strong>bringing de Gaulle to power (1958)</strong>. France ultimately granted independence (Évian Accords, 1962).",tip:"The Algerian War is France's most traumatic postwar experience. Know: 1954–1962, nearly caused French civil war, brought de Gaulle back to power (1958), French torture of Algerians (a major moral controversy), Évian Accords (1962). Its AP significance: it shows the most violent end of decolonization and the domestic political consequences for a colonial power. It also reveals how decolonization could threaten metropolitan democracy."},
  {cat:"Society",term:"Baby boom",pos:"noun",def:"The sharp increase in birth rates in Western countries after WWII (c. 1946–1964), producing an exceptionally large generation. Baby boomers became the 1960s counterculture, the first generation to grow up with television and rock and roll, and eventually the largest voting bloc in Western democracies.",tip:"The baby boom is a demographic cause of 1960s social upheaval. Know: post-WWII birth spike, ~1946–1964, created a large generation that came of age in the 1960s. The '60s counterculture (student revolts, sexual revolution, antiwar movement) was partly a product of this large cohort asserting itself culturally and politically. The baby boom's aging is still reshaping Western politics and economics."},
  {cat:"Society",term:"Second-wave feminism",pos:"noun",def:"The feminist movement of the 1960s–1970s that went beyond the first wave's legal equality demands to challenge <strong>social and cultural inequality</strong>: workplace discrimination, domestic roles, sexual freedom, reproductive rights (the pill, abortion access), and representation in public life. Associated with Betty Friedan (<em>The Feminine Mystique</em>, 1963) and Simone de Beauvoir (<em>The Second Sex</em>, 1949).",tip:"Second-wave feminism is the 1960s–70s feminist movement. Know: de Beauvoir (The Second Sex, 1949), Friedan (The Feminine Mystique, 1963), the pill (reproductive autonomy), workplace equality, cultural challenges to gender roles. Distinguished from first-wave (which focused on legal rights like voting): second-wave challenged the social and cultural norms that persisted despite formal equality."},
  {cat:"Society",term:"Vatican II (1962–1965)",pos:"noun (proper)",def:"The Second Vatican Council called by Pope John XXIII — the Catholic Church's major modernizing reform: <strong>Mass in the vernacular</strong> (not Latin), ecumenism (dialogue with other Christian denominations), religious freedom, and engagement with the modern world. The Church's most significant self-transformation since the Council of Trent.",tip:"Vatican II is the AP's evidence for institutional religious change in the postwar era. Know: 1962–1965, John XXIII, Mass in vernacular, ecumenism, engagement with modernity. Compare to the Council of Trent (1545–63) — both councils defined Catholicism's response to its era's challenges. Vatican II's modernization alienated traditionalists (leading to ongoing divisions) while making the Church more accessible to ordinary Catholics."},
  {cat:"Society",term:"Existentialism (postwar)",pos:"noun",def:"Jean-Paul Sartre and Simone de Beauvoir's postwar philosophical movement asserting that <strong>existence precedes essence</strong> — humans have no fixed nature or purpose and must create their own meaning through choices and action. Particularly resonant in postwar France, where collaboration and resistance had raised urgent questions about individual moral responsibility.",tip:"Postwar existentialism is both philosophy and cultural mood. Know: Sartre ('existence precedes essence,' 'bad faith,' committed intellectual), de Beauvoir (applied existentialism to gender in The Second Sex). Its postwar resonance: in a world that had produced Auschwitz and Hiroshima, what could justify action? Sartre's answer: radical freedom + radical responsibility. Connect to Camus's absurdism (The Stranger, The Plague) — similar questions, slightly different answers."},
  {cat:"Society",term:"Simone de Beauvoir",pos:"noun (proper)",def:"French existentialist philosopher and feminist (1908–1986) whose <em>The Second Sex</em> (1949) argued that women's subordination was not biological but socially constructed — 'One is not born, but rather becomes, a woman.' <strong>Founded second-wave feminism's theoretical framework</strong>; long-term partner of Sartre.",tip:"De Beauvoir is the AP's key figure for postwar feminism. Know: The Second Sex (1949), 'one is not born but becomes a woman' (social construction of gender), existentialist feminist (freedom and self-creation apply to women too), Sartre's partner. Her analysis — that femininity is imposed by culture, not biology — is the foundation of gender studies and second-wave feminism."}
];

const DECKS = [CONCEPTS, VOCAB, [...CONCEPTS, ...VOCAB]];
let currentDeck = 0, activeCat = "All", deck = [], idx = 0, revealed = false;

function getCats(cards) { return ["All", ...[...new Set(cards.map(c => c.cat))]]; }
function buildFilterRow() {
  const fr = document.getElementById("filter-row");
  fr.innerHTML = "";
  getCats(DECKS[currentDeck]).forEach(cat => {
    const b = document.createElement("button");
    b.className = "cat-btn" + (cat === activeCat ? " active" : "");
    b.textContent = cat;
    b.onclick = () => {
      activeCat = cat;
      document.querySelectorAll(".cat-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      buildDeck();
    };
    fr.appendChild(b);
  });
}
function buildDeck() {
  const source = DECKS[currentDeck];
  deck = activeCat === "All" ? [...source] : source.filter(c => c.cat === activeCat);
  idx = 0; revealed = false; render();
}
function switchDeck(n) {
  currentDeck = n; activeCat = "All";
  document.querySelectorAll(".deck-tab").forEach((t, i) => t.classList.toggle("active", i === n));
  buildFilterRow(); buildDeck();
}
function render() {
  const c = deck[idx];
  const isVocab = c.term !== undefined;
  document.getElementById("cat-tag").textContent = c.cat;
  document.getElementById("card-q").innerHTML = isVocab ? c.term : c.q;
  document.getElementById("card-pos").textContent = isVocab ? c.pos : "";
  document.getElementById("flip-hint").textContent = revealed ? "" : "click to reveal";
  const existing = document.getElementById("answer-area");
  if (existing) existing.remove();
  if (revealed) {
    const area = document.createElement("div");
    area.id = "answer-area"; area.className = "answer-area";
    area.innerHTML = `<p class="answer-text">${isVocab ? c.def : c.a}</p>
      <div class="context-box"><p class="context-label">${isVocab ? "why it matters" : "exam angle"}</p>${c.tip}</div>`;
    document.getElementById("card").appendChild(area);
  }
  document.getElementById("prev-btn").disabled = idx === 0;
  document.getElementById("next-btn").disabled = idx === deck.length - 1;
  document.getElementById("progress-label").textContent = `${idx + 1} / ${deck.length}`;
  document.getElementById("progress-fill").style.width = ((idx + 1) / deck.length * 100) + "%";
}
function flip() { revealed = !revealed; render(); }
function move(d) { idx += d; revealed = false; render(); }
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; revealed = false; render();
}
buildFilterRow();
buildDeck();
</script>
